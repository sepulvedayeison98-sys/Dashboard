<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>INDUCASOS · Montacargas v8</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#070b14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8edf5;overflow-x:hidden;}
  #root{min-height:100vh;}
  input,select{font-family:inherit;}
  ::-webkit-scrollbar{width:0;height:0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const C={
  bg0:"#070b14",bg1:"#0d1320",bg2:"#131b2e",bg3:"#1a2438",
  b0:"#1f2b42",b1:"#2a3854",
  t1:"#e8edf5",t2:"#a8b5cc",t3:"#6b7a96",t4:"#46546e",
  teal:"#2dd4bf",accent:"#3b82f6",green:"#22c55e",yellow:"#eab308",
  orange:"#f97316",red:"#ef4444",purple:"#a855f7",
};

// ═══════════ SUPABASE con retry ═══════════
const SUPA_URL="https://rfysmwpdzlxmadobdvzh.supabase.co";
const SUPA_KEY="sb_publishable_LHZWmeFFmnua2j3y8dqqdw_rx0u3vad";
const _H={apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`,"Content-Type":"application/json"};
const _go=async(url,opts={})=>{
  for(let i=0;i<3;i++){
    try{
      const res=await fetch(url,{headers:_H,...opts});
      if(res.ok){const t=await res.text();return{data:t?JSON.parse(t):null,error:null};}
      if([400,403,404,409].includes(res.status)){const t=await res.text();return{data:null,error:{status:res.status,message:t}};}
      if(i<2)await new Promise(ok=>setTimeout(ok,(i+1)*2000));
      else{const t=await res.text();return{data:null,error:{status:res.status,message:t}};}
    }catch(err){
      if(i<2)await new Promise(ok=>setTimeout(ok,(i+1)*2000));
      else return{data:null,error:err};
    }
  }
};
const sb={
  from:(table)=>{
    const base=`${SUPA_URL}/rest/v1/${table}`;
    return{
      insert:(body)=>_go(base,{method:"POST",headers:{..._H,Prefer:"return=minimal"},body:JSON.stringify(body)}),
      update:(body)=>({
        eq:(col,val)=>_go(`${base}?${col}=eq.${encodeURIComponent(val)}`,{method:"PATCH",headers:{..._H,Prefer:"return=minimal"},body:JSON.stringify(body)}),
      }),
    };
  },
};
const fetchTurnos=()=>_go(`${SUPA_URL}/rest/v1/turnos?order=fecha_solicitud.asc`,{headers:_H});

// ═══════════ HELPERS ═══════════
const CALLE_NOM={B:"Calle 1",C:"Calle 2",D:"Calle 3",E:"Calle 4"};
const CALLE_ORD={B:1,C:2,D:3,E:4};
const esMDE=c=>{const x=String(c||"").toUpperCase().trim();return x==="MDE"||x.includes("MEDELL")||x==="ITAGUI"||x==="ITAGÜI"||x.includes("ITAGU");};
const fmtHora=ts=>{if(!ts)return"";const d=new Date(ts);return d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});};
const ordenarPos=arr=>[...(arr||[])].sort((a,b)=>(CALLE_ORD[a.calleLetra]||9)-(CALLE_ORD[b.calleLetra]||9)||(a.modulo||0)-(b.modulo||0));
const beep=()=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o.start();o.stop(ctx.currentTime+0.4);}catch(e){}};

// ═══════════ LOGIN ═══════════
function LoginForm({onLogin}){
  const [nombre,setNombre]=useState("");
  const [cargando,setCargando]=useState(false);
  const submit=async()=>{const n=nombre.trim();if(!n||cargando)return;setCargando(true);await onLogin(n);};
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",padding:24,background:C.bg0}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#a855f7,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px"}}>🏗️</div>
          <div style={{fontWeight:800,fontSize:22,letterSpacing:0.5,color:C.t1}}>MONTACARGAS</div>
          <div style={{color:C.t3,fontSize:12,marginTop:4}}>INDUCASOS · CEDI ITAGUÍ</div>
        </div>
        <div style={{background:C.bg2,borderRadius:16,padding:24,border:`1px solid ${C.b0}`}}>
          <div style={{color:C.t2,fontSize:13,fontWeight:700,marginBottom:14}}>¿Cómo te llamas?</div>
          <input value={nombre} onChange={e=>setNombre(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="Tu nombre..." autoFocus
            style={{width:"100%",background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:10,padding:"12px 14px",fontSize:15,color:C.t1,outline:"none",marginBottom:14}}/>
          <button onClick={submit} disabled={!nombre.trim()||cargando}
            style={{width:"100%",padding:"13px",background:nombre.trim()?`linear-gradient(135deg,#a855f7,#3b82f6)`:C.bg3,border:"none",borderRadius:10,color:nombre.trim()?C.bg0:C.t4,fontWeight:800,fontSize:14,cursor:nombre.trim()?"pointer":"not-allowed",transition:"all .2s"}}>
            {cargando?"Conectando...":"Ver cola de turnos →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════ COMPONENTE PRINCIPAL ═══════════
function MontacargasApp(){
  const [operario,setOperario]=useState(null);
  const [turnos,setTurnos]=useState([]);
  const [tab,setTab]=useState("pendiente");
  const [expandido,setExpandido]=useState({});
  const [procesando,setProcesando]=useState({});
  const [ultimaAct,setUltimaAct]=useState(null);
  const [alertaCancelacion,setAlertaCancelacion]=useState([]);
  const [reportando,setReportando]=useState({});
  const [reportandoPos,setReportandoPos]=useState({}); // {turnoId-posIdx: true}
  const timerRef=useRef(null);
  const prevPendRef=useRef(0);
  const misEnProcesoRef=useRef(new Set());

  const refrescar=useCallback(async()=>{
    const{data}=await fetchTurnos();
    if(!data)return;

    // Notificación nuevos pendientes
    const nPend=data.filter(t=>t.estado==="pendiente").length;
    if(nPend>prevPendRef.current&&prevPendRef.current>=0){
      beep();
      try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch(e){}
      document.title=`(${nPend}) MONTACARGAS · nuevo turno`;
    } else {
      document.title="INDUCASOS · Montacargas";
    }
    prevPendRef.current=nPend;

    // Detectar cancelaciones por admin
    if(operario){
      const misActualesIds=new Set(data.filter(t=>t.montacarguista===operario&&t.estado==="en_proceso").map(t=>t.id));
      const cancelados=[];
      misEnProcesoRef.current.forEach(id=>{
        const t=data.find(x=>x.id===id);
        if(!t||(t.estado!=="en_proceso"&&t.montacarguista!==operario)){
          const ant=turnos.find(x=>x.id===id);
          if(ant)cancelados.push(ant.picking||id);
        }
      });
      if(cancelados.length>0)setAlertaCancelacion(c=>[...c,...cancelados]);
      misEnProcesoRef.current=misActualesIds;
    }

    setTurnos(data);
    setUltimaAct(new Date());
  },[operario,turnos]);

  useEffect(()=>{
    if(!operario)return;
    prevPendRef.current=-1;
    refrescar();
    timerRef.current=setInterval(refrescar,15000);
    return()=>clearInterval(timerRef.current);
  },[operario]);

  const tomarTurno=async(id)=>{
    setProcesando(p=>({...p,[id]:true}));
    await sb.from("turnos").update({estado:"en_proceso",montacarguista:operario}).eq("id",id);
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };

  const completarTurno=async(id)=>{
    setProcesando(p=>({...p,[id]:true}));
    const turno=turnos.find(t=>t.id===id);
    const ts=new Date().toISOString();
    if(turno){
      const nuevasPos=turno.posiciones.map(p=>p.bajada?p:{...p,bajada:true,bajada_ts:ts});
      await sb.from("turnos").update({posiciones:nuevasPos,estado:"completado",montacarguista:operario,fecha_completado:ts}).eq("id",id);
    } else {
      await sb.from("turnos").update({estado:"completado",montacarguista:operario,fecha_completado:ts}).eq("id",id);
    }
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };

  // Marcar posición individual como bajada a piso
  const marcarBajada=async(turnoId,posIdx)=>{
    const turno=turnos.find(t=>t.id===turnoId);
    if(!turno)return;
    const key=`${turnoId}-pos-${posIdx}`;
    setProcesando(p=>({...p,[key]:true}));
    const ts=new Date().toISOString();
    const nuevasPos=turno.posiciones.map((p,i)=>i===posIdx?{...p,bajada:true,bajada_ts:ts}:p);
    await sb.from("turnos").update({posiciones:nuevasPos}).eq("id",turnoId);
    // Auto-completar si todas bajadas
    if(nuevasPos.every(p=>p.bajada)){
      await sb.from("turnos").update({estado:"completado",montacarguista:operario,fecha_completado:new Date().toISOString()}).eq("id",turnoId);
    }
    await refrescar();
    setProcesando(p=>({...p,[key]:false}));
  };

  const reportarFallo=async(id,motivo)=>{
    setProcesando(p=>({...p,[id]:true}));
    await sb.from("turnos").update({estado:"fallido",motivo_fallo:motivo,fecha_completado:new Date().toISOString()}).eq("id",id);
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
    setReportando(r=>({...r,[id]:false}));
  };

  const marcarFalloPosicion=async(turnoId,posIdx,motivo)=>{
    const turno=turnos.find(t=>t.id===turnoId);
    if(!turno)return;
    const key=`${turnoId}-pos-${posIdx}`;
    setProcesando(p=>({...p,[key]:true}));
    const ts=new Date().toISOString();
    const nuevasPos=turno.posiciones.map((p,i)=>i===posIdx?{...p,fallo:true,motivo_fallo:motivo,fallo_ts:ts}:p);
    await sb.from("turnos").update({posiciones:nuevasPos}).eq("id",turnoId);
    if(nuevasPos.every(p=>p.bajada||p.fallo)){
      await sb.from("turnos").update({estado:"completado",montacarguista:operario,fecha_completado:new Date().toISOString()}).eq("id",turnoId);
    }
    await refrescar();
    setProcesando(p=>({...p,[key]:false}));
    setReportandoPos(r=>({...r,[key]:false}));
  };

  const limpiarCompletados=async()=>{
    if(!window.confirm("¿Eliminar todos los turnos completados y fallidos?\nNo se puede deshacer."))return;
    const{data:doneT}=await _go(`${SUPA_URL}/rest/v1/turnos?estado=in.(completado,fallido)&select=id,picking`,{headers:_H});
    if(!doneT?.length)return;
    await _go(`${SUPA_URL}/rest/v1/turnos?estado=in.(completado,fallido)`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
    const picklist=doneT.map(t=>encodeURIComponent(t.picking)).join(",");
    if(picklist)await _go(`${SUPA_URL}/rest/v1/asignaciones?picking=in.(${picklist})`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
    await refrescar();
  };

  const porEstado=est=>turnos
    .filter(t=>t.estado===est)
    .sort((a,b)=>{
      const au=a.es_mde?1:0,bu=b.es_mde?1:0;
      if(au!==bu)return bu-au;
      const pa=ordenarPos(a.posiciones||[])[0]||{};
      const pb=ordenarPos(b.posiciones||[])[0]||{};
      return (CALLE_ORD[pa.calleLetra]||9)-(CALLE_ORD[pb.calleLetra]||9)
        ||(pa.modulo||0)-(pb.modulo||0)
        ||(pa.nivel||0)-(pb.nivel||0)
        ||new Date(a.fecha_solicitud)-new Date(b.fecha_solicitud);
    });

  const agrupadoPorUBI=useMemo(()=>{
    const pend=turnos.filter(t=>t.estado==="pendiente").sort((a,b)=>(a.es_mde?0:1)-(b.es_mde?0:1));
    const map={};
    pend.forEach(t=>{
      (t.posiciones||[]).forEach(pos=>{
        if(!map[pos.ubi])map[pos.ubi]={ubi:pos.ubi,calleLetra:pos.calleLetra,modulo:pos.modulo,nivel:pos.nivel,turnos:[]};
        map[pos.ubi].turnos.push({id:t.id,picking:t.picking,cliente:t.cliente,urgente:t.es_mde||t.prioridad==="urgente",skus:pos.skus||[],totalSaldo:pos.totalSaldo});
      });
    });
    return Object.values(map).sort((a,b)=>b.turnos.length-a.turnos.length||(CALLE_ORD[a.calleLetra]||9)-(CALLE_ORD[b.calleLetra]||9)||(a.modulo||0)-(b.modulo||0));
  },[turnos]);

  // Cuántos turnos pendientes necesitan cada UBI (para priorizar posiciones compartidas)
  const demandaMap=useMemo(()=>{
    const m={};
    turnos.filter(t=>t.estado==="pendiente").forEach(t=>{
      (t.posiciones||[]).forEach(p=>{m[p.ubi]=(m[p.ubi]||0)+1;});
    });
    return m;
  },[turnos]);

  if(!operario)return(
    <LoginForm onLogin={async(nombre)=>{
      setOperario(nombre);
      try{
        await _go(`${SUPA_URL}/rest/v1/usuarios?nombre=eq.${encodeURIComponent(nombre)}&rol=eq.montacarguista`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
        await sb.from("usuarios").insert({nombre,rol:"montacarguista",activo:true,fecha_login:new Date().toISOString()});
      }catch(e){}
    }}/>
  );

  const nPend=porEstado("pendiente").length;
  const nProc=porEstado("en_proceso").length;
  const listaRaw=tab==="agrupado"?[]:porEstado(tab);
  const unaHoraAtras=Date.now()-3600000;
  const lista=tab==="completado"
    ?listaRaw.filter(t=>!t.fecha_completado||new Date(t.fecha_completado).getTime()>unaHoraAtras)
    :listaRaw;
  const nOcultos=tab==="completado"?listaRaw.length-lista.length:0;

  return(
    <div style={{minHeight:"100vh",paddingBottom:24}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:10,background:C.bg1,borderBottom:`1px solid ${C.b0}`,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#a855f7,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏗️</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15}}>MONTACARGAS</div>
            <div style={{color:C.t3,fontSize:10}}>CEDI ITAGUÍ · {operario}{ultimaAct?` · act. ${fmtHora(ultimaAct)}`:""}</div>
          </div>
          <button onClick={refrescar} style={{background:C.bg3,border:`1px solid ${C.b0}`,color:C.t3,borderRadius:8,padding:"7px 11px",fontSize:13,cursor:"pointer"}}>↻</button>
          <button onClick={()=>{setOperario(null);setTurnos([]);prevPendRef.current=0;misEnProcesoRef.current=new Set();}} style={{background:C.bg3,border:`1px solid ${C.b0}`,color:C.t3,borderRadius:8,padding:"7px 10px",fontSize:11}}>⇦</button>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[
            {key:"pendiente",lbl:"⏳ Pend.",n:nPend,col:C.yellow},
            {key:"en_proceso",lbl:"🔄 En curso",n:nProc,col:C.orange},
            {key:"agrupado",lbl:"📊 Ruta",n:agrupadoPorUBI.length,col:C.purple},
            {key:"completado",lbl:"✅ Listo",n:null,col:C.green},
          ].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"8px 2px",borderRadius:9,border:`1px solid ${tab===t.key?t.col:C.b0}`,background:tab===t.key?`${t.col}18`:C.bg2,color:tab===t.key?t.col:C.t3,fontWeight:700,fontSize:10,position:"relative"}}>
              {t.lbl}
              {t.n>0&&<span style={{position:"absolute",top:-5,right:-3,background:t.col,color:C.bg0,borderRadius:"50%",width:16,height:16,fontSize:8,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.n}</span>}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 12px 0"}}>

        {/* Banner cancelación */}
        {alertaCancelacion.length>0&&(
          <div style={{background:`${C.red}18`,border:`1px solid ${C.red}40`,borderRadius:11,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",animation:"fadeUp .3s ease"}}>
            <div>
              <div style={{color:C.red,fontWeight:800,fontSize:12}}>⚠️ Turno cancelado por Admin</div>
              <div style={{color:C.t3,fontSize:10,marginTop:2}}>Picking: {alertaCancelacion.join(", ")}</div>
            </div>
            <button onClick={()=>setAlertaCancelacion([])} style={{background:"none",border:"none",color:C.t3,fontSize:18,cursor:"pointer",padding:"0 4px"}}>✕</button>
          </div>
        )}

        {/* ── TURNOS (pendiente / en_proceso / completado) ── */}
        {tab!=="agrupado"&&(
          <>
            {tab==="completado"&&listaRaw.length>0&&(
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,padding:"0 2px"}}>
                {nOcultos>0
                  ?<div style={{fontSize:10,color:C.t3}}>+{nOcultos} oculto{nOcultos!==1?"s":""} (&gt;1h)</div>
                  :<div/>
                }
                <button onClick={limpiarCompletados}
                  style={{background:`${C.red}15`,border:`1px solid ${C.red}35`,color:C.red,borderRadius:8,padding:"6px 13px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:".3px"}}>
                  🗑 Limpiar todo
                </button>
              </div>
            )}
            {lista.length===0&&(
              <div style={{textAlign:"center",color:C.t3,padding:"50px 20px"}}>
                <div style={{fontSize:40,marginBottom:12}}>{tab==="pendiente"?"🎉":tab==="en_proceso"?"⚙️":"📋"}</div>
                <div style={{fontSize:14}}>
                  {tab==="pendiente"?"Sin turnos pendientes · actualiza cada 15s":tab==="en_proceso"?"No hay turnos en proceso":nOcultos>0?`${nOcultos} turno${nOcultos!==1?"s":""} oculto${nOcultos!==1?"s":""} (>1h) · usa Limpiar para eliminar`:"Sin completados hoy"}
                </div>
              </div>
            )}
            {lista.map((t,ti)=>{
              const posiciones=ordenarPos(t.posiciones.map((p,i)=>({...p,_origIdx:i})));
              const exp=!!expandido[t.id];
              const proc=!!procesando[t.id];
              const urgente=t.es_mde||t.prioridad==="urgente";
              const accentCol=urgente?C.red:C.purple;
              const nBaj=posiciones.filter(p=>p.bajada).length;
              const nFalloPosicion=posiciones.filter(p=>p.fallo).length;
              const nHecho=nBaj+nFalloPosicion;
              const todosDone=posiciones.length>0&&nHecho===posiciones.length;
              const todosBajados=todosDone&&nFalloPosicion===0;
              const totalUnids=posiciones.reduce((s,p)=>(p.skus||[]).reduce((u,k)=>u+k.cant,s),0);
              const totalSKUs=posiciones.reduce((s,p)=>s+(p.skus||[]).length,0);
              return(
                <div key={t.id} style={{background:C.bg2,borderRadius:13,marginBottom:10,border:`1px solid ${urgente?C.red+"40":C.b0}`,borderLeft:`4px solid ${accentCol}`,animation:"fadeUp .2s ease both"}}>

                  {/* Cabecera */}
                  <div onClick={()=>setExpandido(o=>({...o,[t.id]:!o[t.id]}))} style={{padding:"12px 14px",cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:`${accentCol}20`,color:accentCol,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{ti+1}</div>
                        <div style={{minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:15}}>{t.picking}</span>
                            {urgente&&<span style={{background:`${C.red}20`,color:C.red,border:`1px solid ${C.red}40`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:800}}>🚨 URGENTE</span>}
                            {t.estado==="en_proceso"&&(
                              todosBajados
                                ?<span style={{background:`${C.green}20`,color:C.green,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:800,animation:"pop .3s ease"}}>✅ Todo en piso</span>
                                :<span style={{background:`${C.orange}15`,color:C.orange,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>{nBaj}/{posiciones.length} en piso</span>
                            )}
                          </div>
                          <div style={{color:C.t2,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{t.cliente}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'JetBrains Mono',monospace",color:C.green,fontWeight:800,fontSize:15,lineHeight:1}}>{totalUnids}u</div>
                          <div style={{color:C.t4,fontSize:8}}>{totalSKUs} SKU{totalSKUs!==1?"s":""}</div>
                        </div>
                        <span style={{color:C.t3,fontSize:15,transform:exp?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:10,fontSize:10,color:C.t3,flexWrap:"wrap",marginBottom:exp?0:6}}>
                      <span>👷 {t.operario_solicitante}</span>
                      <span>📍 {t.ciudad}</span>
                      <span>🕐 {fmtHora(t.fecha_solicitud)}</span>
                      {t.montacarguista&&<span style={{color:C.teal}}>🏗️ {t.montacarguista}</span>}
                    </div>
                    {/* Barra de progreso (en_proceso) */}
                    {t.estado==="en_proceso"&&posiciones.length>0&&(()=>{
                      const pct=Math.round(nHecho/posiciones.length*100);
                      const col=todosBajados?C.green:todosDone?C.orange:nFalloPosicion>0?C.orange:C.orange;
                      const label=todosBajados?"✓ Todo en piso":todosDone?`✓ ${nBaj} bajados · ${nFalloPosicion} con fallo`:`${nBaj} bajados${nFalloPosicion>0?` · ${nFalloPosicion} fallo`:""} / ${posiciones.length}`;
                      return(
                        <div style={{marginTop:8,background:C.bg3,border:`1px solid ${todosDone?(todosBajados?C.green:C.orange)+"40":C.b0}`,borderRadius:10,padding:"8px 10px",transition:"border-color .4s"}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                            <div style={{fontSize:9,fontWeight:700,color:todosBajados?C.green:todosDone?C.orange:C.t3,letterSpacing:".4px",textTransform:"uppercase"}}>
                              {label}
                            </div>
                            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:900,color:col,lineHeight:1}}>
                              {pct}<span style={{fontSize:10,fontWeight:600,color:C.t3}}>%</span>
                            </div>
                          </div>
                          <div style={{height:7,background:C.b0,borderRadius:5,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,background:todosDone?col:`linear-gradient(90deg,${col}99,${col})`,borderRadius:5,transition:"width .5s cubic-bezier(.4,0,.2,1)",boxShadow:pct>0?`0 0 8px ${col}60`:"none"}}/>
                          </div>
                        </div>
                      );
                    })()}
                    {!exp&&t.estado!=="en_proceso"&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                      {posiciones.map((p,pi)=>(
                        <span key={pi} style={{fontFamily:"'JetBrains Mono',monospace",background:p.bajada?`${C.green}15`:C.bg3,border:`1px solid ${p.bajada?C.green+"40":C.b0}`,borderRadius:5,padding:"2px 7px",fontSize:9,color:p.bajada?C.green:C.teal}}>{p.ubi}{p.bajada?" ✓":""}</span>
                      ))}
                    </div>}
                  </div>

                  {/* Detalle expandido */}
                  {exp&&(
                    <div style={{borderTop:`1px solid ${C.b0}`,padding:"8px 14px 10px"}}>
                      {[...posiciones]
                        .sort((a,b)=>{
                          if(a.bajada&&!b.bajada)return 1;
                          if(!a.bajada&&b.bajada)return -1;
                          return(CALLE_ORD[a.calleLetra]||9)-(CALLE_ORD[b.calleLetra]||9)
                            ||(a.modulo||0)-(b.modulo||0)
                            ||(a.nivel||0)-(b.nivel||0)
                            ||(demandaMap[b.ubi]||0)-(demandaMap[a.ubi]||0);
                        })
                        .map((pos)=>{
                        const pi=pos._origIdx;
                        const keyBaj=`${t.id}-pos-${pi}`;
                        const bajando=!!procesando[keyBaj];
                        const esBajada=!!pos.bajada;
                        const esFalloPosicion=!!pos.fallo;
                        const reportandoEstePosicion=!!reportandoPos[keyBaj];
                        const demanda=(demandaMap[pos.ubi]||0);
                        const esPrioridad=!esBajada&&!esFalloPosicion&&demanda>1;
                        const borderCol=esBajada?C.green:esFalloPosicion?C.red:esPrioridad?C.yellow:C.purple;
                        const bgCol=esBajada?`${C.green}10`:esFalloPosicion?`${C.red}08`:esPrioridad?`${C.yellow}08`:C.bg3;
                        return(
                          <div key={pi} style={{background:bgCol,borderRadius:9,marginBottom:6,borderLeft:`3px solid ${borderCol}`,transition:"all .3s",overflow:"hidden"}}>
                            <div style={{padding:"8px 10px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:esBajada||esFalloPosicion?0:5}}>
                                <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0,flexWrap:"wrap"}}>
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:esBajada?C.green:esFalloPosicion?C.red:esPrioridad?C.yellow:C.teal,fontWeight:800,fontSize:14}}>{pos.ubi}</span>
                                  {esPrioridad&&<span style={{background:`${C.yellow}20`,color:C.yellow,border:`1px solid ${C.yellow}40`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:800,animation:"pop .3s ease"}}>⚡ {demanda} pedidos</span>}
                                  <span style={{fontSize:9,color:C.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{CALLE_NOM[pos.calleLetra]||pos.calleLetra} · Mód {pos.modulo} · Niv {pos.nivel}</span>
                                </div>
                                {t.estado==="en_proceso"
                                  ?esBajada
                                    ?<span style={{color:C.green,fontSize:11,fontWeight:800,flexShrink:0,animation:"pop .3s ease"}}>✅ En piso</span>
                                    :esFalloPosicion
                                      ?<span style={{color:C.red,fontSize:10,fontWeight:700,flexShrink:0}}>⚠ {pos.motivo_fallo}</span>
                                      :reportandoEstePosicion
                                        ?null
                                        :<div style={{display:"flex",gap:4,flexShrink:0}}>
                                           <button onClick={()=>marcarBajada(t.id,pi)} disabled={bajando}
                                             style={{padding:"5px 11px",background:bajando?C.bg2:`linear-gradient(135deg,${C.green},${C.teal})`,border:"none",borderRadius:7,color:bajando?C.t3:C.bg0,fontSize:11,fontWeight:800,cursor:bajando?"not-allowed":"pointer",fontFamily:"inherit"}}>
                                             {bajando?"...":"⬇ Bajar"}
                                           </button>
                                           <button onClick={()=>setReportandoPos(r=>({...r,[keyBaj]:true}))}
                                             style={{padding:"5px 9px",background:`${C.red}15`,border:`1px solid ${C.red}30`,borderRadius:7,color:C.red,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                                             ⚠
                                           </button>
                                         </div>
                                  :<span style={{fontFamily:"'JetBrains Mono',monospace",color:C.green,fontWeight:700,fontSize:12,flexShrink:0}}>{pos.totalSaldo}u</span>
                                }
                              </div>
                              {!esBajada&&!esFalloPosicion&&!reportandoEstePosicion&&(pos.skus||[]).map((s,si)=>{
                                const tipo=s.tipo||((s.desc||'').split(' ')[1]||'');
                                const modelo=(s.desc||'').match(/[A-Z]{2,5}-(\w+)/i)?.[1]||'';
                                return(
                                <div key={si} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",borderTop:si>0?`1px solid ${C.b0}`:"none"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                                    <span style={{fontSize:8,background:`${C.accent}20`,color:C.accent,borderRadius:3,padding:"1px 4px",fontWeight:800}}>SKU</span>
                                    <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.accent,fontSize:11,fontWeight:700}}>{s.ref}</span>
                                    {tipo&&<span style={{fontSize:8,background:`${C.purple}20`,color:C.purple,border:`1px solid ${C.purple}30`,borderRadius:3,padding:"1px 5px",fontWeight:800,letterSpacing:.3}}>{tipo}</span>}
                                    {modelo&&<span style={{fontSize:8,background:`${C.teal}15`,color:C.teal,border:`1px solid ${C.teal}30`,borderRadius:3,padding:"1px 5px",fontWeight:700}}>{modelo}</span>}
                                  </div>
                                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                                    <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.yellow,fontSize:11,fontWeight:700}}>{s.cant}u</span>
                                  </div>
                                </div>
                                );
                              })}
                              {esBajada&&<div style={{color:C.green,fontSize:9,marginTop:4,fontWeight:600}}>
                                {(pos.skus||[]).map(s=>`${s.ref} · ${s.cant}u`).join("  ·  ")}
                              </div>}
                              {esFalloPosicion&&<div style={{color:C.red,fontSize:9,marginTop:2,opacity:.7}}>{fmtHora(pos.fallo_ts)||""}</div>}
                            </div>
                            {/* Selector de motivo inline por posición */}
                            {reportandoEstePosicion&&(
                              <div style={{background:`${C.red}10`,borderTop:`1px solid ${C.red}20`,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:C.red,fontWeight:700,marginBottom:6}}>¿Qué pasó en {pos.ubi}?</div>
                                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                                  {["Caja no encontrada","Posición vacía","Caja dañada / mojada","Acceso bloqueado","Cantidad incorrecta","Otro"].map(m=>(
                                    <button key={m} onClick={()=>marcarFalloPosicion(t.id,pi,m)} disabled={bajando}
                                      style={{padding:"7px 10px",background:`${C.red}12`,border:`1px solid ${C.red}30`,borderRadius:7,color:C.red,fontSize:11,fontWeight:600,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                                      {m}
                                    </button>
                                  ))}
                                  <button onClick={()=>setReportandoPos(r=>({...r,[keyBaj]:false}))}
                                    style={{padding:"6px",background:C.bg3,border:`1px solid ${C.b0}`,borderRadius:7,color:C.t3,fontSize:10,cursor:"pointer",fontFamily:"inherit",marginTop:2}}>
                                    Cancelar
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                      {t.motivo_fallo&&<div style={{background:`${C.orange}10`,border:`1px solid ${C.orange}30`,borderRadius:8,padding:"6px 10px",marginTop:4}}>
                        <span style={{color:C.orange,fontSize:10,fontWeight:700}}>⚠️ Fallo: </span>
                        <span style={{color:C.t2,fontSize:10}}>{t.motivo_fallo}</span>
                      </div>}
                    </div>
                  )}

                  {/* Botones de acción */}
                  <div style={{borderTop:`1px solid ${C.b0}`}}>
                    {t.estado==="pendiente"&&(
                      <button onClick={()=>tomarTurno(t.id)} disabled={proc}
                        style={{width:"100%",padding:"12px",background:proc?C.bg3:`linear-gradient(135deg,${C.orange},${C.yellow})`,border:"none",borderRadius:"0 0 12px 12px",color:proc?C.t3:C.bg0,fontWeight:800,fontSize:13,cursor:proc?"not-allowed":"pointer",fontFamily:"inherit"}}>
                        {proc?"Procesando...":"🚜 Tomar turno"}
                      </button>
                    )}
                    {t.estado==="en_proceso"&&(
                      <button onClick={()=>completarTurno(t.id)} disabled={proc}
                        style={{width:"100%",padding:"12px",background:proc?C.bg3:todosBajados?`linear-gradient(135deg,${C.green},${C.teal})`:todosDone?`linear-gradient(135deg,${C.orange},${C.yellow})`:`${C.green}25`,border:"none",borderRadius:"0 0 12px 12px",color:proc?C.t3:todosDone?C.bg0:C.green,fontWeight:800,fontSize:12,cursor:proc?"not-allowed":"pointer",fontFamily:"inherit",transition:"all .3s"}}>
                        {proc?"Procesando...":todosBajados?"✅ Completar turno":todosDone?`⚠ ${nFalloPosicion} con fallo · Completar`:`⬇ ${nBaj}/${posiciones.length} bajadas · Completar`}
                      </button>
                    )}
                    {(t.estado==="completado"||t.estado==="fallido")&&(
                      <div style={{padding:"10px",textAlign:"center",color:t.estado==="fallido"?C.orange:C.green,fontSize:11,fontWeight:700}}>
                        {t.estado==="fallido"
                          ?`⚠️ Reportado: ${t.motivo_fallo||"problema"}`
                          :`✅ Completado a las ${fmtHora(t.fecha_completado)} · ${t.montacarguista}`
                        }
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* ── TAB RUTA AGRUPADA ── */}
        {tab==="agrupado"&&(
          <>
            {agrupadoPorUBI.length===0
              ?<div style={{textAlign:"center",color:C.t3,padding:"50px 20px"}}>
                <div style={{fontSize:40,marginBottom:12}}>🎉</div>
                <div style={{fontSize:14}}>Sin turnos pendientes</div>
              </div>
              :<div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  {[
                    {l:"Posiciones",v:agrupadoPorUBI.length,c:C.purple},
                    {l:"Pedidos únicos",v:new Set(agrupadoPorUBI.flatMap(u=>u.turnos.map(t=>t.picking))).size,c:C.teal},
                  ].map(k=>(
                    <div key={k.l} style={{background:C.bg2,borderRadius:9,padding:"10px",textAlign:"center",border:`1px solid ${C.b0}`}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
                      <div style={{fontSize:9,color:C.t4,fontWeight:700,textTransform:"uppercase",marginTop:4}}>{k.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:C.t3,marginBottom:8,textAlign:"center"}}>Un viaje por posición · baja para todos los pedidos de una sola vez</div>
                {agrupadoPorUBI.map((pos,pi)=>{
                  const isMultiPed=pos.turnos.length>1;
                  const tieneUrgente=pos.turnos.some(t=>t.urgente);
                  const totalUnids=pos.turnos.reduce((s,t)=>t.skus.reduce((u,k)=>u+k.cant,s),0);
                  const exp=!!expandido[`grup-${pos.ubi}`];
                  return(
                    <div key={pos.ubi} style={{background:C.bg2,borderRadius:12,marginBottom:8,border:`1px solid ${tieneUrgente?C.red+"40":isMultiPed?C.yellow+"40":C.b0}`,borderLeft:`4px solid ${tieneUrgente?C.red:isMultiPed?C.yellow:C.purple}`,animation:"fadeUp .2s ease both"}}>
                      <div onClick={()=>setExpandido(o=>({...o,[`grup-${pos.ubi}`]:!o[`grup-${pos.ubi}`]}))} style={{padding:"12px 14px",cursor:"pointer"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{width:28,height:28,borderRadius:"50%",background:`${isMultiPed?C.yellow:C.purple}20`,color:isMultiPed?C.yellow:C.purple,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,flexShrink:0}}>{pi+1}</div>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                                <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:16}}>{pos.ubi}</span>
                                {tieneUrgente&&<span style={{background:`${C.red}20`,color:C.red,borderRadius:4,padding:"1px 5px",fontSize:8,fontWeight:800}}>🚨</span>}
                                {isMultiPed&&<span style={{background:`${C.yellow}20`,color:C.yellow,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>{pos.turnos.length} pedidos</span>}
                              </div>
                              <div style={{color:C.t3,fontSize:9,marginTop:2}}>{CALLE_NOM[pos.calleLetra]} · Mód {pos.modulo} · Niv {pos.nivel}</div>
                            </div>
                          </div>
                          <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:8}}>
                            <div>
                              <div style={{fontFamily:"'JetBrains Mono',monospace",color:C.green,fontWeight:800,fontSize:15}}>{totalUnids}u</div>
                              <div style={{color:C.t4,fontSize:8}}>{pos.turnos.reduce((s,t)=>s+t.skus.length,0)} SKUs</div>
                            </div>
                            <span style={{color:C.t3,fontSize:14,transform:exp?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                          </div>
                        </div>
                        {!exp&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {pos.turnos.map((t,ti)=>(
                            <span key={ti} style={{fontFamily:"'JetBrains Mono',monospace",background:t.urgente?`${C.red}15`:C.bg3,border:`1px solid ${t.urgente?C.red+"40":C.b0}`,borderRadius:4,padding:"2px 6px",fontSize:9,color:t.urgente?C.red:C.teal}}>{t.picking}</span>
                          ))}
                        </div>}
                      </div>
                      {exp&&(
                        <div style={{borderTop:`1px solid ${C.b0}`,padding:"8px 14px 10px"}}>
                          {pos.turnos.map((t,ti)=>(
                            <div key={ti} style={{background:C.bg3,borderRadius:8,padding:"8px 10px",marginBottom:5,borderLeft:`3px solid ${t.urgente?C.red:C.teal}`}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                                <div style={{display:"flex",alignItems:"center",gap:5}}>
                                  {t.urgente&&<span style={{fontSize:9,color:C.red,fontWeight:800}}>🚨</span>}
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:12}}>{t.picking}</span>
                                </div>
                                <span style={{color:C.t3,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>{t.cliente}</span>
                              </div>
                              {t.skus.map((s,si)=>(
                                <div key={si} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderTop:si>0?`1px solid ${C.b0}`:"none"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                                    <span style={{fontSize:7,background:`${C.accent}20`,color:C.accent,borderRadius:2,padding:"0 3px",fontWeight:800}}>SKU</span>
                                    <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.accent,fontSize:10}}>{s.ref}</span>
                                  </div>
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.yellow,fontSize:10,fontWeight:700}}>{s.cant}u</span>
                                </div>
                              ))}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            }
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MontacargasApp/>);
</script>
</body>
</html>
