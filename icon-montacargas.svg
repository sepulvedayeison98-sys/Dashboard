<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0a1a"/>
      <stop offset="100%" stop-color="#160c28"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Mast vertical -->
  <rect x="100" y="120" width="32" height="240" rx="8" fill="url(#g)"/>
  <!-- Fork arms -->
  <rect x="132" y="300" width="190" height="24" rx="6" fill="url(#g)"/>
  <rect x="132" y="336" width="190" height="24" rx="6" fill="url(#g)"/>
  <!-- Pallet/load box -->
  <rect x="148" y="200" width="160" height="100" rx="10" fill="none" stroke="url(#g)" stroke-width="18"/>
  <line x1="148" y1="250" x2="308" y2="250" stroke="url(#g)" stroke-width="10"/>
  <!-- Wheel -->
  <circle cx="148" cy="390" r="36" fill="none" stroke="url(#g)" stroke-width="18"/>
  <circle cx="148" cy="390" r="10" fill="url(#g)"/>
  <!-- Counterweight body -->
  <rect x="68" y="300" width="64" height="120" rx="10" fill="none" stroke="url(#g)" stroke-width="14" opacity="0.55"/>
  <!-- Label -->
  <text x="370" y="420" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="52" font-weight="900" fill="url(#g)" text-anchor="middle" letter-spacing="2">MC</text>
</svg>
