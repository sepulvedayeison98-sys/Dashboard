<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>INDUCASOS · Admin v8</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#070b14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8edf5;overflow-x:hidden;}
  #root{min-height:100vh;}
  input,select{font-family:inherit;outline:none;}
  ::-webkit-scrollbar{width:0;height:0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const C={
  bg0:"#070b14",bg1:"#0d1320",bg2:"#131b2e",bg3:"#1a2438",
  b0:"#1f2b42",b1:"#2a3854",
  t1:"#e8edf5",t2:"#a8b5cc",t3:"#6b7a96",t4:"#46546e",
  teal:"#2dd4bf",accent:"#3b82f6",green:"#22c55e",yellow:"#eab308",
  orange:"#f97316",red:"#ef4444",purple:"#a855f7",
};

const SUPA_URL="https://rfysmwpdzlxmadobdvzh.supabase.co";
const SUPA_KEY="sb_publishable_LHZWmeFFmnua2j3y8dqqdw_rx0u3vad";
const _H={apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`,"Content-Type":"application/json"};
const _go=async(url,opts={})=>{
  for(let i=0;i<3;i++){
    try{
      const res=await fetch(url,{cache:'no-cache',headers:_H,...opts});
      if(res.ok){const t=await res.text();return{data:t?JSON.parse(t):null,error:null};}
      if([400,403,404,409].includes(res.status)){const t=await res.text();return{data:null,error:{status:res.status,message:t}};}
      if(i<2)await new Promise(ok=>setTimeout(ok,(i+1)*2000));
      else{const t=await res.text();return{data:null,error:{status:res.status,message:t}};}
    }catch(err){
      if(i<2)await new Promise(ok=>setTimeout(ok,(i+1)*2000));
      else return{data:null,error:err};
    }
  }
};

const api={
  turnos:    ()=>_go(`${SUPA_URL}/rest/v1/turnos?order=fecha_solicitud.desc`,{headers:_H}),
  asigs:     ()=>_go(`${SUPA_URL}/rest/v1/asignaciones?order=fecha_asignacion.desc`,{headers:_H}),
  usuarios:  ()=>_go(`${SUPA_URL}/rest/v1/usuarios?order=fecha_login.desc`,{headers:_H}),
  patchTurno:(id,body)=>_go(`${SUPA_URL}/rest/v1/turnos?id=eq.${id}`,{method:"PATCH",headers:{..._H,Prefer:"return=minimal"},body:JSON.stringify(body)}),
  deleteTurno:(id)=>_go(`${SUPA_URL}/rest/v1/turnos?id=eq.${id}`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}}),
  patchAsig: (id,body)=>_go(`${SUPA_URL}/rest/v1/asignaciones?id=eq.${id}`,{method:"PATCH",headers:{..._H,Prefer:"return=minimal"},body:JSON.stringify(body)}),
};

const CALLE_ORD={B:1,C:2,D:3,E:4};
const CALLE_NOM={B:"Calle 1",C:"Calle 2",D:"Calle 3",E:"Calle 4"};
const ordenarPos=arr=>[...(arr||[])].sort((a,b)=>(CALLE_ORD[a.calleLetra]||9)-(CALLE_ORD[b.calleLetra]||9)||(a.modulo||0)-(b.modulo||0));
const fmtHora=ts=>{if(!ts)return"—";const d=new Date(ts);return d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});};
const fmtFecha=ts=>{if(!ts)return"—";const d=new Date(ts);return`${d.getDate()}/${d.getMonth()+1} ${fmtHora(ts)}`;};
const hoy=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const transcurrido=ts=>{
  if(!ts)return"";
  const m=Math.round((new Date()-new Date(ts))/60000);
  if(m<1)return"<1m";
  if(m<60)return`${m}m`;
  const h=Math.floor(m/60);return`${h}h${m%60>0?` ${m%60}m`:""}`;
};

const estadoCol={pendiente:C.yellow,en_proceso:C.orange,completado:C.green,liberado:C.t3,fallido:C.red};
const estadoLbl={pendiente:"PEND",en_proceso:"EN PROC",completado:"COMP",liberado:"LIBRE",fallido:"FALLO"};

function AdminApp(){
  const [tab,setTab]=useState("operarios");
  const [turnos,setTurnos]=useState([]);
  const [asigs,setAsigs]=useState([]);
  const [usuarios,setUsuarios]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [ultimaAct,setUltimaAct]=useState(null);
  const [expandido,setExpandido]=useState({});
  const [editando,setEditando]=useState(null);
  const [procesando,setProcesando]=useState({});
  const [busca,setBusca]=useState("");
  const [filtroEst,setFiltroEst]=useState("todos");
  const [agendarModal,setAgendarModal]=useState(false);
  const timerRef=useRef(null);

  const autoLimpiar=async()=>{
    // Borrar turnos completados/fallidos con más de 8h
    const cutoff8h=new Date(Date.now()-8*60*60*1000).toISOString();
    const{data:viejos}=await _go(`${SUPA_URL}/rest/v1/turnos?estado=in.(completado,fallido)&fecha_completado=lt.${cutoff8h}&select=id,picking`);
    if(viejos?.length){
      const ids=viejos.map(t=>t.id).join(",");
      await _go(`${SUPA_URL}/rest/v1/turnos?id=in.(${ids})`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
      const picks=viejos.map(t=>t.picking).filter(Boolean).join(",");
      if(picks)await _go(`${SUPA_URL}/rest/v1/asignaciones?picking=in.(${picks})`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
    }
    // Auto-completar asignaciones en_proceso con más de 5h
    const cutoff5h=new Date(Date.now()-5*60*60*1000).toISOString();
    await _go(`${SUPA_URL}/rest/v1/asignaciones?estado=eq.en_proceso&fecha_asignacion=lt.${cutoff5h}`,{
      method:"PATCH",headers:{..._H,Prefer:"return=minimal"},
      body:JSON.stringify({estado:"completado",fecha_completado:new Date().toISOString()})
    });
  };

  const refrescar=useCallback(async()=>{
    await autoLimpiar();
    const [rT,rA,rU]=await Promise.all([api.turnos(),api.asigs(),api.usuarios()]);
    if(rT.data)setTurnos(rT.data);
    if(rA.data)setAsigs(rA.data);
    if(rU.data)setUsuarios(rU.data);
    setUltimaAct(new Date());
    setCargando(false);
  },[]);

  useEffect(()=>{
    refrescar();
    timerRef.current=setInterval(refrescar,30000);
    return()=>clearInterval(timerRef.current);
  },[refrescar]);

  const hoyCut=hoy();
  const nOperariosActivos=new Set(asigs.filter(a=>a.estado==="en_proceso").map(a=>a.operario)).size;
  const nPedidosEnCurso=asigs.filter(a=>a.estado==="en_proceso").length;
  const nTurnosPend=turnos.filter(t=>t.estado==="pendiente"&&!(t.picking||"").startsWith("UBI-")).length;
  const nCompletadosHoy=turnos.filter(t=>t.estado==="completado"&&t.fecha_completado&&new Date(t.fecha_completado)>=hoyCut).length;
  const nFallidos=turnos.filter(t=>t.estado==="fallido").length;
  const nUBI=turnos.filter(t=>(t.picking||"").startsWith("UBI-")&&(t.estado==="pendiente"||t.estado==="en_proceso")).length;
  const avgMinHoy=(()=>{
    const c=turnos.filter(t=>t.estado==="completado"&&t.fecha_completado&&t.fecha_solicitud&&new Date(t.fecha_completado)>=hoyCut);
    if(!c.length)return null;
    const avg=c.reduce((s,t)=>(new Date(t.fecha_completado)-new Date(t.fecha_solicitud))/60000+s,0)/c.length;
    return Math.round(avg);
  })();

  const crearTurno=async(data)=>{
    const {error}=await _go(`${SUPA_URL}/rest/v1/turnos`,{method:"POST",headers:{..._H,Prefer:"return=minimal"},body:JSON.stringify(data)});
    if(error){alert("Error al crear el turno: "+(error.message||JSON.stringify(error)));return;}
    setAgendarModal(false);
    await refrescar();
  };

  const priorizarTurno=async(id)=>{
    setProcesando(p=>({...p,[id]:true}));
    await api.patchTurno(id,{prioridad:"urgente",es_mde:true});
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };
  const cancelarTurno=async(id)=>{
    if(!window.confirm("¿Cancelar este turno?"))return;
    setProcesando(p=>({...p,[id]:true}));
    const turno=turnos.find(t=>t.id===id);
    await api.patchTurno(id,{estado:"completado",fecha_completado:new Date().toISOString(),montacarguista:"[Admin-cancelado]"});
    if(turno?.picking){
      await _go(`${SUPA_URL}/rest/v1/asignaciones?picking=eq.${encodeURIComponent(turno.picking)}`,
        {method:"PATCH",headers:{..._H,Prefer:"return=minimal"},body:JSON.stringify({estado:"liberado",fecha_completado:new Date().toISOString()})});
    }
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };
  const eliminarTurno=async(id)=>{
    if(!window.confirm("¿Eliminar este turno permanentemente?"))return;
    setProcesando(p=>({...p,[id]:true}));
    await api.deleteTurno(id);
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };
  const reintentarTurno=async(id)=>{
    setProcesando(p=>({...p,[id]:true}));
    await api.patchTurno(id,{estado:"pendiente",motivo_fallo:null,fecha_completado:null,montacarguista:null});
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };
  const limpiarTodo=async()=>{
    if(!window.confirm("¿Eliminar todos los turnos completados y fallidos?\nEsta acción no se puede deshacer."))return;
    const{data:doneT}=await _go(`${SUPA_URL}/rest/v1/turnos?estado=in.(completado,fallido)&select=id,picking`);
    await _go(`${SUPA_URL}/rest/v1/turnos?estado=in.(completado,fallido)`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
    if(doneT?.length){
      const picklist=doneT.map(t=>t.picking).join(",");
      if(picklist)await _go(`${SUPA_URL}/rest/v1/asignaciones?picking=in.(${picklist})`,{method:"DELETE",headers:{..._H,Prefer:"return=minimal"}});
    }
    await refrescar();
  };
  const liberarPedido=async(id)=>{
    setProcesando(p=>({...p,[id]:true}));
    await api.patchAsig(id,{estado:"liberado",fecha_completado:new Date().toISOString()});
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };
  const completarPedido=async(id)=>{
    setProcesando(p=>({...p,[id]:true}));
    await api.patchAsig(id,{estado:"completado",fecha_completado:new Date().toISOString()});
    await refrescar();
    setProcesando(p=>({...p,[id]:false}));
  };
  const completarVencidos=async()=>{
    const vencidas=asigs.filter(a=>a.estado==="en_proceso"&&(new Date()-new Date(a.fecha_asignacion))/3600000>5);
    if(!vencidas.length)return;
    if(!window.confirm(`¿Marcar como completados los ${vencidas.length} pedido${vencidas.length!==1?"s":""} con más de 5h en proceso?`))return;
    const ids=vencidas.map(a=>a.id).join(",");
    await _go(`${SUPA_URL}/rest/v1/asignaciones?id=in.(${ids})`,{
      method:"PATCH",headers:{..._H,Prefer:"return=minimal"},
      body:JSON.stringify({estado:"completado",fecha_completado:new Date().toISOString()})
    });
    await refrescar();
  };
  const reasignarPedido=async(id,nuevoOperario)=>{
    setProcesando(p=>({...p,[id]:true}));
    await api.patchAsig(id,{operario:nuevoOperario});
    await refrescar();
    setEditando(null);
    setProcesando(p=>({...p,[id]:false}));
  };

  const operariosActivos=(()=>{
    const map={};
    asigs.filter(a=>a.estado==="en_proceso").forEach(a=>{
      const key=(a.operario||"").toLowerCase().trim();
      if(!map[key])map[key]={nombre:a.operario,pedidos:[],turnosPend:0};
      map[key].pedidos.push(a);
    });
    turnos.filter(t=>t.estado==="pendiente").forEach(t=>{
      const key=(t.operario_solicitante||"").toLowerCase().trim();
      if(map[key])map[key].turnosPend++;
    });
    const recientes=usuarios.filter(u=>{
      const diff=(new Date()-new Date(u.fecha_login))/1000/60;
      return u.rol==="operario"&&diff<240;
    });
    recientes.forEach(u=>{
      const key=(u.nombre||"").toLowerCase().trim();
      if(!map[key])map[key]={nombre:u.nombre,pedidos:[],turnosPend:0,soloLogin:true};
    });
    return Object.values(map).sort((a,b)=>b.pedidos.length-a.pedidos.length);
  })();

  const montacarguistasActivos=(()=>{
    const map={};
    usuarios.forEach(u=>{
      if(u.rol!=="montacarguista")return;
      const diff=(new Date()-new Date(u.fecha_login))/1000/60;
      if(diff>=240)return;
      const key=(u.nombre||"").toLowerCase().trim();
      if(!map[key]||new Date(u.fecha_login)>new Date(map[key].fecha_login))map[key]=u;
    });
    return Object.values(map);
  })();

  if(cargando)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:14}}>
      <div style={{width:36,height:36,border:`3px solid ${C.b1}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{color:C.t3,fontSize:13}}>Cargando panel...</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",paddingBottom:24}}>

      {/* ── Header ── */}
      <div style={{position:"sticky",top:0,zIndex:10,background:C.bg1,borderBottom:`1px solid ${C.b0}`,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#3b82f6,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚙️</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15}}>PANEL ADMIN</div>
            <div style={{color:C.t3,fontSize:10}}>INDUCASOS · CEDI ITAGUÍ{ultimaAct?` · act. ${fmtHora(ultimaAct)}`:""}</div>
          </div>
          <button onClick={limpiarTodo} title="Eliminar completados y fallidos" style={{background:`${C.red}12`,border:`1px solid ${C.red}30`,color:C.red,borderRadius:8,padding:"7px 10px",fontSize:13,cursor:"pointer"}}>🗑</button>
          <button onClick={refrescar} style={{background:C.bg3,border:`1px solid ${C.b0}`,color:C.t3,borderRadius:8,padding:"7px 11px",fontSize:13,cursor:"pointer"}}>↻</button>
        </div>

        {/* KPIs — 2 filas de 3 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:5}}>
          {[
            {l:"Operarios",v:nOperariosActivos,c:C.teal,ico:"👷"},
            {l:"Pedidos",v:nPedidosEnCurso,c:C.accent,ico:"📦"},
            {l:"T. Pend.",v:nTurnosPend,c:nTurnosPend>0?C.yellow:C.t4,ico:"⏳"},
          ].map(k=>(
            <div key={k.l} style={{background:C.bg2,borderRadius:9,padding:"8px 4px",textAlign:"center",border:`1px solid ${C.b0}`}}>
              <div style={{fontSize:13}}>{k.ico}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:800,color:k.c,lineHeight:1.1}}>{k.v}</div>
              <div style={{fontSize:7,color:C.t4,fontWeight:700,textTransform:"uppercase",marginTop:2}}>{k.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
          {[
            {l:"Comp. Hoy",v:nCompletadosHoy,c:C.green,ico:"✅",sub:avgMinHoy!=null?`~${avgMinHoy}m prom.`:null},
            {l:"Fallidos",v:nFallidos,c:nFallidos>0?C.red:C.t4,ico:"⚠️",sub:null},
            {l:"UBI activas",v:nUBI,c:nUBI>0?C.purple:C.t4,ico:"⬇",sub:null},
          ].map(k=>(
            <div key={k.l} style={{background:C.bg2,borderRadius:9,padding:"8px 4px",textAlign:"center",border:`1px solid ${k.v>0?k.c+"30":C.b0}`}}>
              <div style={{fontSize:13}}>{k.ico}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:800,color:k.c,lineHeight:1.1}}>{k.v}</div>
              <div style={{fontSize:7,color:C.t4,fontWeight:700,textTransform:"uppercase",marginTop:2}}>{k.l}</div>
              {k.sub&&<div style={{fontSize:7,color:k.c,fontWeight:600,marginTop:1,opacity:.8}}>{k.sub}</div>}
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:5}}>
          {[
            {key:"operarios",lbl:"👷 Operarios"},
            {key:"turnos",lbl:"🏗️ Turnos"},
            {key:"asignaciones",lbl:"📋 Pedidos"},
            {key:"metricas",lbl:"📊 Métricas"},
          ].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:`1px solid ${tab===t.key?C.accent:C.b0}`,background:tab===t.key?`${C.accent}18`:C.bg2,color:tab===t.key?C.accent:C.t3,fontWeight:700,fontSize:10,cursor:"pointer"}}>
              {t.lbl}
            </button>
          ))}
        </div>
      </div>

      {/* ── Alerta demorados ── */}
      {(()=>{
        const demorados=turnos.filter(t=>t.estado==="pendiente"&&(new Date()-new Date(t.fecha_solicitud))/60000>20);
        if(!demorados.length)return null;
        return(
          <div style={{margin:"8px 12px 0",background:`${C.red}12`,border:`1px solid ${C.red}40`,borderRadius:11,padding:"10px 13px",animation:"fadeUp .2s ease both"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
              <span style={{fontSize:16}}>🚨</span>
              <span style={{fontSize:10,color:C.red,fontWeight:800,textTransform:"uppercase",letterSpacing:.5}}>
                {demorados.length} turno{demorados.length!==1?"s":""} demorado{demorados.length!==1?"s":""} (&gt;20 min)
              </span>
            </div>
            {demorados.map(t=>{
              const min=Math.round((new Date()-new Date(t.fecha_solicitud))/60000);
              const esUBI=(t.picking||"").startsWith("UBI-");
              return(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderTop:`1px solid ${C.red}20`}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {esUBI&&<span style={{background:`${C.purple}20`,color:C.purple,borderRadius:3,padding:"0 4px",fontSize:7,fontWeight:800}}>UBI</span>}
                    <span style={{fontFamily:"'JetBrains Mono',monospace",color:esUBI?C.purple:C.teal,fontWeight:700,fontSize:12}}>{t.picking}</span>
                    <span style={{fontSize:9,color:C.t3}}>👷 {t.operario_solicitante||"—"}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.red,fontWeight:800,fontSize:11}}>{min}m</span>
                    <button onClick={()=>{setTab("turnos");setFiltroEst("pendiente");}} style={{padding:"3px 7px",background:`${C.red}20`,border:`1px solid ${C.red}40`,borderRadius:5,color:C.red,fontSize:9,fontWeight:700,cursor:"pointer"}}>Ver</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      <div style={{padding:"12px 12px 0"}}>

        {/* ── TAB OPERARIOS ── */}
        {tab==="operarios"&&(
          <div>
            {montacarguistasActivos.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
                  <div style={{fontSize:10,color:C.purple,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>🏗️ Montacarguistas activos</div>
                  <div style={{fontSize:9,color:C.t4}}>{montacarguistasActivos.length} conectado{montacarguistasActivos.length!==1?"s":""}</div>
                </div>
                {montacarguistasActivos.map(u=>{
                  const nombre=u.nombre;
                  const enProceso=turnos.filter(t=>t.montacarguista===nombre&&t.estado==="en_proceso").sort((a,b)=>(b.es_mde?1:0)-(a.es_mde?1:0));
                  const completadosHoy=turnos.filter(t=>t.montacarguista===nombre&&t.estado==="completado"&&t.fecha_completado&&new Date(t.fecha_completado)>=hoyCut);
                  const avgMcMin=completadosHoy.length>0?Math.round(completadosHoy.filter(t=>t.fecha_solicitud).reduce((s,t)=>(new Date(t.fecha_completado)-new Date(t.fecha_solicitud))/60000+s,0)/completadosHoy.length):null;
                  const ultimoMcTs=completadosHoy.map(t=>t.fecha_completado).filter(Boolean).sort().pop();
                  const libre=enProceso.length===0;
                  const accentCol=libre?C.green:C.orange;
                  const expKey=`mc-${nombre}`;
                  const exp=!!expandido[expKey];
                  return(
                    <div key={nombre} style={{background:C.bg2,borderRadius:13,marginBottom:8,border:`1px solid ${libre?C.b0:C.orange+"30"}`,borderLeft:`4px solid ${accentCol}`,animation:"fadeUp .2s ease both"}}>

                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <div style={{textAlign:"center",background:C.bg3,borderRadius:7,padding:"4px 9px",border:`1px solid ${enProceso.length>0?C.orange+"30":C.b0}`}}>

                            </div>
                            <div style={{textAlign:"center",background:C.bg3,borderRadius:7,padding:"4px 9px",border:`1px solid ${completadosHoy.length>0?C.green+"30":C.b0}`}}>

                              <span style={{color:C.t3,fontSize:13,transform:exp?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>}

                        </div>
                        {enProceso.map((t,ti)=>{
                          const pos=t.posiciones||[];
                          const nBaj=pos.filter(p=>p.bajada).length;
                          const nFallo=pos.filter(p=>p.fallo).length;
                          const nHecho=nBaj+nFallo;
                          const pct=pos.length>0?Math.round(nHecho/pos.length*100):0;
                          const col=pct===100?C.green:C.orange;
                          const lastAction=pos.map(p=>p.bajada_ts||p.fallo_ts).filter(Boolean).sort().pop();
                          const esUBI=(t.picking||"").startsWith("UBI-");
                          return(
                            <div key={t.id} onClick={e=>{e.stopPropagation();setTab("turnos");setExpandido(o=>({...o,[`t-${t.id}`]:true}));}} style={{marginTop:ti===0?2:4,background:C.bg3,borderRadius:8,padding:"6px 9px",border:`1px solid ${C.b0}`,cursor:"pointer"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                                <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0,flex:1}}>
                                  {esUBI&&<span style={{background:`${C.purple}20`,color:C.purple,borderRadius:3,padding:"0 4px",fontSize:7,fontWeight:800,flexShrink:0}}>UBI</span>}
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:esUBI?C.purple:C.teal,fontSize:11,fontWeight:800,flexShrink:0}}>{t.picking}</span>
                                  {(t.es_mde||t.prioridad==="urgente")&&<span style={{background:`${C.red}20`,color:C.red,borderRadius:3,padding:"0 4px",fontSize:7,fontWeight:800,flexShrink:0}}>🚨</span>}
                                  <span style={{color:C.t4,fontSize:9,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(t.cliente||"").slice(0,18)}</span>
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                                  <span style={{color:C.t4,fontSize:8}}>{lastAction?fmtHora(lastAction):transcurrido(t.fecha_solicitud)}</span>
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:col,fontSize:12,fontWeight:800}}>{pct}%</span>
                                </div>
                              </div>
                              <div style={{height:5,background:C.b0,borderRadius:3,overflow:"hidden",marginBottom:3}}>
                                <div style={{height:"100%",width:`${pct}%`,background:pct===100?col:`linear-gradient(90deg,${col}80,${col})`,borderRadius:3,transition:"width .5s",boxShadow:pct>0?`0 0 6px ${col}50`:"none"}}/>
                              </div>
                              <div style={{fontSize:8,color:C.t4}}>
                                {nBaj} bajada{nBaj!==1?"s":""}{nFallo>0?` · ${nFallo} fallo${nFallo!==1?"s":""}`:""}  /  {pos.length} pos.
                              </div>
                            </div>
                          );
                        })}
                        {libre&&completadosHoy.length>0&&(
                          <div style={{marginTop:4,fontSize:9,color:C.green,fontWeight:600}}>✓ Completó {completadosHoy.length} turno{completadosHoy.length!==1?"s":""} hoy</div>
                        )}
                      </div>
                      {exp&&completadosHoy.length>0&&(
                        <div style={{borderTop:`1px solid ${C.b0}`,padding:"7px 13px 10px"}}>
                          <div style={{fontSize:8,color:C.green,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>✅ Completados hoy</div>
                          {completadosHoy.map(t=>{
                            const nFallo=(t.posiciones||[]).filter(p=>p.fallo).length;
                            const esUBI=(t.picking||"").startsWith("UBI-");
                            return(
                              <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:`1px solid ${C.b0}`}}>
                                <div style={{display:"flex",alignItems:"center",gap:5}}>
                                  {esUBI&&<span style={{background:`${C.purple}20`,color:C.purple,borderRadius:3,padding:"0 4px",fontSize:7,fontWeight:800}}>UBI</span>}
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:esUBI?C.purple:C.teal,fontSize:10,fontWeight:700}}>{t.picking}</span>
                                  {nFallo>0&&<span style={{background:`${C.orange}20`,color:C.orange,borderRadius:3,padding:"0 4px",fontSize:7,fontWeight:700}}>{nFallo} fallo{nFallo!==1?"s":""}</span>}
                                </div>
                                <span style={{fontSize:9,color:C.t4,flexShrink:0}}>{fmtHora(t.fecha_completado)}</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{fontSize:10,color:C.teal,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>👷 Operarios de picking</div>
            {operariosActivos.length===0&&(
              <div style={{textAlign:"center",color:C.t3,padding:"30px 20px"}}>
                <div style={{fontSize:32,marginBottom:8}}>😴</div>
                <div style={{fontSize:13}}>Sin operarios activos</div>
              </div>
            )}
            {operariosActivos.map((op,i)=>(
              <div key={i} style={{background:C.bg2,borderRadius:12,marginBottom:8,border:`1px solid ${op.pedidos.length>0?C.teal+"30":C.b0}`,borderLeft:`4px solid ${op.pedidos.length>0?C.teal:C.t4}`,animation:"fadeUp .2s ease both"}}>
                <div onClick={()=>setExpandido(o=>({...o,[`op-${op.nombre}`]:!o[`op-${op.nombre}`]}))} style={{padding:"11px 13px",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:32,height:32,borderRadius:"50%",background:`${C.teal}20`,color:C.teal,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13}}>
                        {op.nombre.charAt(0).toUpperCase()}
                      </div>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:C.t1}}>{op.nombre}</div>
                        <div style={{fontSize:10,color:C.t3}}>
                          {op.pedidos.length>0?`${op.pedidos.length} pedido${op.pedidos.length!==1?"s":""} asignado${op.pedidos.length!==1?"s":""}`:op.soloLogin?"En sesión · sin pedidos":"Inactivo"}
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {op.turnosPend>0&&<span style={{background:`${C.yellow}20`,color:C.yellow,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>{op.turnosPend} turno{op.turnosPend!==1?"s":""}</span>}
                      {op.pedidos.length>0&&<span style={{color:C.t3,fontSize:14,transform:expandido[`op-${op.nombre}`]?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>}
                    </div>
                  </div>
                  {op.pedidos.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {op.pedidos.map((a,ai)=>(
                      <span key={ai} style={{fontFamily:"'JetBrains Mono',monospace",background:C.bg3,border:`1px solid ${C.b0}`,borderRadius:4,padding:"2px 7px",fontSize:9,color:C.teal}}>{a.picking}</span>
                    ))}
                  </div>}
                  {(()=>{
                    const opKey=(op.nombre||"").toLowerCase().trim();
                    const compHoyOp=asigs.filter(a=>a.estado==="completado"&&(a.operario||"").toLowerCase().trim()===opKey&&a.fecha_completado&&new Date(a.fecha_completado)>=hoyCut);
                    const ultimoOp=compHoyOp.map(a=>a.fecha_completado).filter(Boolean).sort().pop();
                    if(!compHoyOp.length)return null;
                    return(
                      <div style={{marginTop:5,padding:"4px 8px",background:C.bg3,borderRadius:6,display:"flex",gap:12,fontSize:9,color:C.t3,flexWrap:"wrap"}}>
                        <span style={{color:C.green}}>✅ {compHoyOp.length} completado{compHoyOp.length!==1?"s":""} hoy</span>
                        {ultimoOp&&<span>🕐 Último: {fmtHora(ultimoOp)}</span>}
                      </div>
                    );
                  })()}
                </div>
                {expandido[`op-${op.nombre}`]&&op.pedidos.map((a,ai)=>{
                  const horas=(new Date()-new Date(a.fecha_asignacion))/3600000;
                  const vencida=horas>5;
                  const demorada=horas>2&&!vencida;
                  const pickCol=vencida?C.red:demorada?C.orange:C.teal;
                  return(
                  <div key={ai} style={{borderTop:`1px solid ${vencida?C.red+"30":demorada?C.orange+"25":C.b0}`,padding:"8px 13px",background:vencida?`${C.red}06`:demorada?`${C.orange}05`:"transparent"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",color:pickCol,fontWeight:700,fontSize:12}}>{a.picking}</span>
                        {vencida&&<span style={{background:`${C.red}20`,color:C.red,borderRadius:3,padding:"0 5px",fontSize:7,fontWeight:800}}>VENCIDO</span>}
                        {demorada&&<span style={{background:`${C.orange}20`,color:C.orange,borderRadius:3,padding:"0 5px",fontSize:7,fontWeight:800}}>DEMORADO</span>}
                      </div>
                      <span style={{fontSize:10,color:vencida?C.red:demorada?C.orange:C.t3,fontWeight:vencida||demorada?700:400}}>desde {fmtHora(a.fecha_asignacion)} · {transcurrido(a.fecha_asignacion)}</span>
                    </div>
                    <div style={{color:C.t2,fontSize:11,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.cliente}</div>
                    <div style={{display:"flex",gap:6}}>
                      {!vencida&&<button onClick={()=>setEditando(`asig-${a.id}`)} style={{flex:1,padding:"6px",background:C.bg3,border:`1px solid ${C.b0}`,borderRadius:7,color:C.t2,fontSize:11,fontWeight:700,cursor:"pointer"}}>✏️ Reasignar</button>}
                      {vencida
                        ?<button onClick={()=>completarPedido(a.id)} disabled={!!procesando[a.id]} style={{flex:1,padding:"8px",background:`${C.green}20`,border:`1px solid ${C.green}40`,borderRadius:7,color:C.green,fontSize:12,fontWeight:800,cursor:"pointer"}}>✅ Completar</button>
                        :<button onClick={()=>liberarPedido(a.id)} disabled={!!procesando[a.id]} style={{flex:1,padding:"6px",background:`${C.orange}15`,border:`1px solid ${C.orange}30`,borderRadius:7,color:C.orange,fontSize:11,fontWeight:700,cursor:"pointer"}}>🔓 Liberar</button>
                      }
                    </div>
                    {editando===`asig-${a.id}`&&(
                      <ReasignarForm
                        operarioActual={a.operario}
                        operariosDisp={[...new Set([...operariosActivos.map(o=>o.nombre),...usuarios.filter(u=>u.rol==="operario").map(u=>u.nombre)])].filter(Boolean).sort()}
                        onGuardar={n=>reasignarPedido(a.id,n)}
                        onCancelar={()=>setEditando(null)}
                      />
                    )}
                  </div>
                  );
                })}
              </div>
            ))}
          </div>

        {/* ── TAB TURNOS ── */}
        {tab==="turnos"&&(
          <div>
            <button onClick={()=>setAgendarModal(true)} style={{width:"100%",padding:"12px",background:`linear-gradient(135deg,${C.orange},${C.yellow})`,border:"none",borderRadius:11,color:C.bg0,fontWeight:800,fontSize:13,cursor:"pointer",marginBottom:10}}>
              🏗️ + Agendar turno manual
            </button>
            <input value={busca} onChange={e=>setBusca(e.target.value)}
              placeholder="🔍 Buscar por picking, cliente u operario..."
              style={{width:"100%",background:C.bg3,color:C.t1,border:`1px solid ${C.b1}`,borderRadius:11,padding:"11px 13px",fontSize:13,marginBottom:10}}
            />

            {/* Filtros por estado */}
            <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
              {[
                {k:"todos",lbl:"Todos",ico:""},
                {k:"pendiente",lbl:"Pendiente",ico:"⏳"},
                {k:"en_proceso",lbl:"En proceso",ico:"🔄"},
                {k:"completado",lbl:"Completado",ico:"✅"},
                {k:"fallido",lbl:"Fallido",ico:"⚠️"},
              ].map(f=>{
                const col={pendiente:C.yellow,en_proceso:C.orange,completado:C.green,fallido:C.red,todos:C.accent}[f.k];
                const cnt=f.k==="todos"
                  ?turnos.filter(t=>!(t.picking||"").startsWith("UBI-")).length
                  :turnos.filter(t=>t.estado===f.k&&!(t.picking||"").startsWith("UBI-")).length;
                const sel=filtroEst===f.k;
                return(
                  <button key={f.k} onClick={()=>setFiltroEst(f.k)}
                    style={{padding:"5px 9px",borderRadius:8,border:`1px solid ${sel?col:C.b0}`,background:sel?`${col}20`:C.bg2,color:sel?col:C.t3,fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                    {f.ico&&<span>{f.ico}</span>}
                    <span>{f.lbl}</span>
                    <span style={{background:sel?`${col}35`:C.bg3,borderRadius:5,padding:"0 5px",fontSize:9,fontWeight:800,color:sel?col:C.t4}}>{cnt}</span>
                  </button>
                );
              })}
            </div>

            {/* Bajadas UBI */}
            {(filtroEst==="todos"||filtroEst==="pendiente"||filtroEst==="en_proceso"||filtroEst==="completado"||filtroEst==="fallido")&&(()=>{
              const q=busca.trim().toLowerCase();
              const ubiTurnos=turnos
                .filter(t=>(t.picking||"").startsWith("UBI-"))
                .filter(t=>filtroEst==="todos"||t.estado===filtroEst)
                .filter(t=>!q||(t.picking||"").toLowerCase().includes(q)||(t.cliente||"").toLowerCase().includes(q)||(t.operario_solicitante||"").toLowerCase().includes(q))
                .sort((a,b)=>new Date(b.fecha_solicitud)-new Date(a.fecha_solicitud));
              if(ubiTurnos.length===0)return null;
              const activas=ubiTurnos.filter(t=>t.estado==="pendiente"||t.estado==="en_proceso");
              return(
                <div style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                    <span style={{fontSize:10,color:C.purple,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>⬇ Bajadas UBI</span>
                    {activas.length>0&&<span style={{background:`${C.purple}20`,color:C.purple,borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:700}}>{activas.length} activa{activas.length!==1?"s":""}</span>}
                  </div>
                  {ubiTurnos.map(t=>{
                    const col={pendiente:C.yellow,en_proceso:C.orange,completado:C.green,fallido:C.red}[t.estado]||C.t3;
                    const ubi=(t.picking||"").replace("UBI-","");
                    const skus=((t.posiciones||[])[0]||{}).skus||[];
                    const elapsed=transcurrido(t.fecha_solicitud);
                    const demorado=t.estado==="pendiente"&&(new Date()-new Date(t.fecha_solicitud))/60000>20;
                    const lbl={pendiente:"⏳ Pendiente",en_proceso:"🔄 En proceso",completado:"✅ Listo",fallido:"⚠ Fallo"}[t.estado]||t.estado;
                    return(
                      <div key={t.id} style={{background:C.bg2,borderRadius:10,marginBottom:6,border:`1px solid ${demorado?C.red+"40":col+"25"}`,borderLeft:`4px solid ${demorado?C.red:col}`,animation:"fadeUp .2s ease both",padding:"9px 12px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.purple,fontWeight:800,fontSize:15}}>{ubi}</span>
                            <span style={{background:`${col}20`,color:col,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700,border:`1px solid ${col}40`}}>{lbl}</span>
                            {demorado&&<span style={{background:`${C.red}20`,color:C.red,borderRadius:4,padding:"1px 5px",fontSize:7,fontWeight:800}}>DEMORADO</span>}
                          </div>
                          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                            <div style={{fontSize:9,color:demorado?C.red:C.t4}}>{elapsed}</div>
                            {t.montacarguista&&<div style={{fontSize:9,color:C.purple,marginTop:1}}>🏗️ {t.montacarguista}</div>}
                          </div>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:skus.length?5:0}}>
                          <span style={{fontSize:9,color:C.t3}}>👷 {t.operario_solicitante||"—"}</span>
                          <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"flex-end"}}>
                            {skus.slice(0,4).map((s,si)=>(
                              <span key={si} style={{fontFamily:"'JetBrains Mono',monospace",background:C.bg3,border:`1px solid ${C.b0}`,borderRadius:4,padding:"1px 5px",fontSize:8,color:C.accent}}>{s.ref}</span>
                            ))}
                            {skus.length>4&&<span style={{fontSize:8,color:C.t4}}>+{skus.length-4}</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:5,marginTop:6}}>
                          {t.estado==="fallido"&&<button onClick={()=>reintentarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"6px",background:`${C.green}15`,border:`1px solid ${C.green}30`,borderRadius:7,color:C.green,fontSize:10,fontWeight:700,cursor:"pointer"}}>↻ Reintentar</button>}
                          {t.estado==="pendiente"&&<button onClick={()=>cancelarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"6px",background:`${C.t4}10`,border:`1px solid ${C.b0}`,borderRadius:7,color:C.t3,fontSize:10,fontWeight:700,cursor:"pointer"}}>✕ Cancelar</button>}
                          {(t.estado==="completado"||t.estado==="fallido")&&<button onClick={()=>eliminarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"6px",background:`${C.red}10`,border:`1px solid ${C.red}25`,borderRadius:7,color:C.red,fontSize:10,fontWeight:700,cursor:"pointer"}}>🗑 Eliminar</button>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* Turnos picking normales */}
            {(filtroEst==="todos"?["pendiente","en_proceso","fallido","completado"]:[filtroEst]).map(est=>{
              const q=busca.trim().toLowerCase();
              const lista=turnos
                .filter(t=>t.estado===est&&!(t.picking||"").startsWith("UBI-"))
                .filter(t=>!q||(t.picking||"").toLowerCase().includes(q)||(t.cliente||"").toLowerCase().includes(q)||(t.operario_solicitante||"").toLowerCase().includes(q)||(t.montacarguista||"").toLowerCase().includes(q))
                .sort((a,b)=>{
                  const au=a.es_mde?1:0,bu=b.es_mde?1:0;
                  if(au!==bu)return bu-au;
                  return new Date(b.fecha_solicitud)-new Date(a.fecha_solicitud);
                });
              if(lista.length===0)return null;
              const col={pendiente:C.yellow,en_proceso:C.orange,fallido:C.red,completado:C.green}[est];
              const lbl={pendiente:"⏳ Pendientes",en_proceso:"🔄 En proceso",fallido:"⚠️ Fallidos",completado:"✅ Completados"}[est];
              return(
                <div key={est} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                    <span style={{fontSize:10,color:col,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{lbl}</span>
                    <span style={{background:`${col}20`,color:col,borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:700}}>{lista.length}</span>
                  </div>
                  {lista.map(t=>{
                    const posiciones=ordenarPos(t.posiciones);
                    const exp=!!expandido[`t-${t.id}`];
                    const urgente=t.es_mde||t.prioridad==="urgente";
                    const totalUnids=posiciones.reduce((s,p)=>(p.skus||[]).reduce((u,k)=>u+k.cant,s),0);
                    const elapsed=transcurrido(t.fecha_solicitud);
                    const demorado=est==="pendiente"&&(new Date()-new Date(t.fecha_solicitud))/60000>15;
                    return(
                      <div key={t.id} style={{background:C.bg2,borderRadius:11,marginBottom:6,border:`1px solid ${urgente||demorado?C.red+"40":C.b0}`,borderLeft:`4px solid ${urgente||demorado?C.red:col}`,animation:"fadeUp .2s ease both"}}>
                        <div onClick={()=>setExpandido(o=>({...o,[`t-${t.id}`]:!o[`t-${t.id}`]}))} style={{padding:"10px 13px",cursor:"pointer"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                              <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:13}}>{t.picking}</span>
                              {urgente&&<span style={{background:`${C.red}20`,color:C.red,borderRadius:4,padding:"1px 5px",fontSize:8,fontWeight:800}}>🚨</span>}
                              {demorado&&<span style={{background:`${C.red}15`,color:C.red,borderRadius:4,padding:"1px 5px",fontSize:7,fontWeight:800}}>DEMORADO</span>}
                              <span style={{background:`${col}18`,color:col,borderRadius:4,padding:"1px 5px",fontSize:8,fontWeight:700}}>{posiciones.length} pos</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.green,fontSize:12,fontWeight:700}}>{totalUnids}u</span>
                              <span style={{color:C.t3,fontSize:13,transform:exp?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                            </div>
                          </div>
                          <div style={{display:"flex",gap:8,fontSize:10,color:C.t3,flexWrap:"wrap"}}>
                            <span>👷 {t.operario_solicitante}</span>
                            {t.montacarguista&&<span style={{color:C.purple}}>🏗️ {t.montacarguista}</span>}
                            <span style={{color:demorado?C.red:C.t4}}>⏱ {elapsed}</span>
                          </div>
                          {!exp&&<div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:5}}>
                            {posiciones.map((p,pi)=>(
                              <span key={pi} style={{fontFamily:"'JetBrains Mono',monospace",background:C.bg3,border:`1px solid ${C.b0}`,borderRadius:4,padding:"1px 6px",fontSize:8,color:C.teal}}>{p.ubi}</span>
                            ))}
                          </div>}
                        </div>
                        {exp&&(
                          <div style={{borderTop:`1px solid ${C.b0}`,padding:"6px 13px 10px"}}>
                            {posiciones.map((pos,pi)=>(
                              <div key={pi} style={{background:C.bg3,borderRadius:7,padding:"6px 9px",marginBottom:5,borderLeft:`2px solid ${col}`}}>
                                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:700,fontSize:12}}>{pos.ubi}</span>
                                  <span style={{fontSize:9,color:C.t3}}>{CALLE_NOM[pos.calleLetra]||pos.calleLetra} · Niv {pos.nivel}</span>
                                </div>
                                {(pos.skus||[]).map((s,si)=>(
                                  <div key={si} style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.t2,padding:"2px 0",borderTop:si>0?`1px solid ${C.b0}`:"none"}}>
                                    <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.accent}}>{s.ref}</span>
                                    <span style={{color:C.yellow,fontWeight:700}}>{s.cant}u</span>
                                  </div>
                                ))}
                              </div>
                            ))}
                            <div style={{display:"flex",gap:5,marginTop:6}}>
                              {!urgente&&est==="pendiente"&&<button onClick={()=>priorizarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"7px",background:`${C.red}15`,border:`1px solid ${C.red}30`,borderRadius:7,color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}}>🚨 Priorizar</button>}
                              {est==="fallido"&&<button onClick={()=>reintentarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"7px",background:`${C.green}15`,border:`1px solid ${C.green}30`,borderRadius:7,color:C.green,fontSize:11,fontWeight:700,cursor:"pointer"}}>↻ Reintentar</button>}
                              {t.motivo_fallo&&<div style={{flex:2,padding:"5px 8px",background:`${C.orange}10`,borderRadius:7,color:C.orange,fontSize:10}}>{t.motivo_fallo}</div>}
                              {est!=="completado"&&est!=="fallido"&&<button onClick={()=>cancelarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"7px",background:`${C.t4}15`,border:`1px solid ${C.b0}`,borderRadius:7,color:C.t3,fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Cancelar</button>}
                              {(est==="completado"||est==="fallido")&&<button onClick={()=>eliminarTurno(t.id)} disabled={!!procesando[t.id]} style={{flex:1,padding:"7px",background:`${C.red}10`,border:`1px solid ${C.red}25`,borderRadius:7,color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑 Eliminar</button>}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            {turnos.filter(t=>!(t.picking||"").startsWith("UBI-")).length===0&&!busca&&(
              <div style={{textAlign:"center",color:C.t3,padding:"40px 20px"}}>
                <div style={{fontSize:36,marginBottom:10}}>🎉</div>
                <div style={{fontSize:13}}>Sin turnos de picking registrados</div>
              </div>
            )}
          </div>
        )}

        {/* ── TAB ASIGNACIONES ── */}
        {tab==="asignaciones"&&(
          <div>
            {/* Alerta bulk vencidos */}
            {(()=>{
              const vencidas=asigs.filter(a=>a.estado==="en_proceso"&&(new Date()-new Date(a.fecha_asignacion))/3600000>5);
              if(!vencidas.length)return null;
              return(
                <div style={{background:`${C.orange}12`,border:`1px solid ${C.orange}35`,borderRadius:11,padding:"11px 13px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                  <div>
                    <div style={{fontSize:11,color:C.orange,fontWeight:800}}>⚠ {vencidas.length} pedido{vencidas.length!==1?"s":""} sin cerrar (+5h)</div>
                    <div style={{fontSize:9,color:C.t3,marginTop:2}}>Se completarán solos en el próximo refresh</div>
                  </div>
                  <button onClick={completarVencidos} style={{flexShrink:0,padding:"8px 12px",background:`${C.green}20`,border:`1px solid ${C.green}40`,borderRadius:8,color:C.green,fontSize:11,fontWeight:800,cursor:"pointer"}}>
                    ✅ Completar ahora
                  </button>
                </div>
              );
            })()}

            {["en_proceso","liberado","completado"].map(est=>{
              const lista=asigs.filter(a=>a.estado===est).sort((a,b)=>new Date(b.fecha_asignacion)-new Date(a.fecha_asignacion));
              if(lista.length===0)return null;
              const col=estadoCol[est]||C.t3;
              const lbl={en_proceso:"🔄 En proceso",liberado:"🔓 Liberados",completado:"✅ Completados"}[est];
              return(
                <div key={est} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                    <span style={{fontSize:10,color:col,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{lbl}</span>
                    <span style={{background:`${col}20`,color:col,borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:700}}>{lista.length}</span>
                  </div>
                  {lista.map((a)=>{
                    const horas=est==="en_proceso"?(new Date()-new Date(a.fecha_asignacion))/3600000:0;
                    const vencida=horas>5;
                    const demorada=horas>2&&!vencida;
                    const alertaCol=vencida?C.red:demorada?C.orange:col;
                    return(
                    <div key={a.id} style={{background:C.bg2,borderRadius:11,marginBottom:6,border:`1px solid ${vencida?C.red+"40":demorada?C.orange+"35":C.b0}`,borderLeft:`4px solid ${alertaCol}`,animation:"fadeUp .2s ease both",padding:"10px 13px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",color:vencida?C.red:demorada?C.orange:C.teal,fontWeight:800,fontSize:13}}>{a.picking}</span>
                          {a.pedido_siesa&&<span style={{fontFamily:"'JetBrains Mono',monospace",color:C.t4,fontSize:10}}>#{a.pedido_siesa}</span>}
                          {vencida&&<span style={{background:`${C.red}20`,color:C.red,borderRadius:4,padding:"1px 5px",fontSize:7,fontWeight:800}}>VENCIDO</span>}
                          {demorada&&<span style={{background:`${C.orange}20`,color:C.orange,borderRadius:4,padding:"1px 5px",fontSize:7,fontWeight:800}}>DEMORADO</span>}
                        </div>
                        <span style={{background:`${alertaCol}18`,color:alertaCol,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700,flexShrink:0}}>{estadoLbl[est]}</span>
                      </div>
                      <div style={{color:C.t2,fontSize:11,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.cliente}</div>
                      <div style={{display:"flex",gap:10,fontSize:10,color:C.t3,flexWrap:"wrap",marginBottom:est==="en_proceso"?6:0}}>
                        <span>👷 {a.operario}</span>
                        <span>📍 {a.ciudad}</span>
                        <span>🕐 {fmtFecha(a.fecha_asignacion)}</span>
                        {est==="en_proceso"&&<span style={{color:vencida?C.red:demorada?C.orange:C.t4,fontWeight:vencida||demorada?700:400}}>⏱ {transcurrido(a.fecha_asignacion)}</span>}
                      </div>
                      {est==="en_proceso"&&(
                        editando===`asig-${a.id}`
                          ?<ReasignarForm
                              operarioActual={a.operario}
                              operariosDisp={[...new Set([...operariosActivos.map(o=>o.nombre),...usuarios.filter(u=>u.rol==="operario").map(u=>u.nombre)])].filter(Boolean).sort()}
                              onGuardar={n=>reasignarPedido(a.id,n)}
                              onCancelar={()=>setEditando(null)}
                            />
                          :<div style={{display:"flex",gap:5}}>
                            {!vencida&&<button onClick={()=>setEditando(`asig-${a.id}`)} style={{flex:1,padding:"6px",background:C.bg3,border:`1px solid ${C.b0}`,borderRadius:7,color:C.t2,fontSize:11,fontWeight:700,cursor:"pointer"}}>✏️ Reasignar</button>}
                            {vencida
                              ?<button onClick={()=>completarPedido(a.id)} disabled={!!procesando[a.id]} style={{flex:1,padding:"8px",background:`${C.green}20`,border:`1px solid ${C.green}40`,borderRadius:7,color:C.green,fontSize:11,fontWeight:800,cursor:"pointer"}}>✅ Completar</button>
                              :<button onClick={()=>liberarPedido(a.id)} disabled={!!procesando[a.id]} style={{flex:1,padding:"6px",background:`${C.orange}15`,border:`1px solid ${C.orange}30`,borderRadius:7,color:C.orange,fontSize:11,fontWeight:700,cursor:"pointer"}}>🔓 Liberar</button>
                            }
                          </div>
                      )}
                    </div>
                    );
                  })}
                </div>
              );
            })}
            {asigs.length===0&&(
              <div style={{textAlign:"center",color:C.t3,padding:"40px 20px"}}>
                <div style={{fontSize:36,marginBottom:10}}>📋</div>
                <div style={{fontSize:13}}>Sin asignaciones registradas</div>
              </div>
            )}
          </div>
        )}
        {/* ── TAB MÉTRICAS ── */}
        {tab==="metricas"&&(()=>{
          const compHoy=turnos.filter(t=>t.estado==="completado"&&t.fecha_completado&&new Date(t.fecha_completado)>=hoyCut);

          // Turnos por hora (0–23)
          const porHora=Array.from({length:24},(_,h)=>({h,n:compHoy.filter(t=>new Date(t.fecha_completado).getHours()===h).length}));
          const maxHora=Math.max(...porHora.map(x=>x.n),1);
          const horaActual=new Date().getHours();
          const horasActivas=porHora.filter(x=>x.n>0||x.h<=horaActual);

          // Ranking montacarguistas
          const rankMc=(()=>{
            const map={};
            compHoy.forEach(t=>{if(t.montacarguista){if(!map[t.montacarguista])map[t.montacarguista]=0;map[t.montacarguista]++;}});
            return Object.entries(map).sort((a,b)=>b[1]-a[1]);
          })();

          // Ranking operarios (asigns completadas hoy)
          const asigHoy=asigs.filter(a=>a.estado==="completado"&&a.fecha_completado&&new Date(a.fecha_completado)>=hoyCut);
          const rankOp=(()=>{
            const map={};
            asigHoy.forEach(a=>{if(a.operario){if(!map[a.operario])map[a.operario]=0;map[a.operario]++;}});
            return Object.entries(map).sort((a,b)=>b[1]-a[1]);
          })();

          // Turno más largo del día
          const masLargo=compHoy.filter(t=>t.fecha_solicitud).sort((a,b)=>(new Date(b.fecha_completado)-new Date(b.fecha_solicitud))-(new Date(a.fecha_completado)-new Date(a.fecha_solicitud)))[0];
          const masLargoMin=masLargo?Math.round((new Date(masLargo.fecha_completado)-new Date(masLargo.fecha_solicitud))/60000):null;

          return(
            <div>
              {/* Turnos completados por hora */}
              <div style={{background:C.bg2,borderRadius:12,padding:"13px",marginBottom:12,border:`1px solid ${C.b0}`}}>
                <div style={{fontSize:10,color:C.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>📈 Completados por hora</div>
                {compHoy.length===0?(
                  <div style={{textAlign:"center",color:C.t4,fontSize:12,padding:"20px 0"}}>Sin completados hoy</div>
                ):(
                  <div style={{display:"flex",alignItems:"flex-end",gap:3,height:60}}>
                    {horasActivas.map(({h,n})=>(
                      <div key={h} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        {n>0&&<div style={{fontSize:7,color:C.accent,fontWeight:700}}>{n}</div>}
                        <div style={{width:"100%",background:n>0?C.accent:C.bg3,borderRadius:"3px 3px 0 0",height:n>0?`${Math.max(Math.round(n/maxHora*44),4)}px`:"4px",transition:"height .3s",opacity:h===horaActual?1:.7}}/>
                        <div style={{fontSize:6,color:C.t4}}>{h}h</div>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{marginTop:8,fontSize:9,color:C.t4,textAlign:"right"}}>{compHoy.length} turno{compHoy.length!==1?"s":""} completado{compHoy.length!==1?"s":""} hoy</div>
              </div>

              {/* Rankings */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {/* Ranking montacarguistas */}
                <div style={{background:C.bg2,borderRadius:12,padding:"11px",border:`1px solid ${C.b0}`}}>
                  <div style={{fontSize:9,color:C.purple,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>🏗️ Montacarguistas</div>
                  {rankMc.length===0?(
                    <div style={{color:C.t4,fontSize:10,textAlign:"center",padding:"8px 0"}}>—</div>
                  ):rankMc.slice(0,5).map(([nom,cnt],ri)=>(
                    <div key={nom} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",borderTop:ri>0?`1px solid ${C.b0}`:"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:9,color:ri===0?C.yellow:C.t4,fontWeight:700}}>#{ri+1}</span>
                        <span style={{fontSize:10,color:C.t2,textTransform:"capitalize",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:60}}>{nom}</span>
                      </div>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:800,color:ri===0?C.yellow:C.green}}>{cnt}</span>
                    </div>
                  ))}
                </div>
                {/* Ranking operarios */}
                <div style={{background:C.bg2,borderRadius:12,padding:"11px",border:`1px solid ${C.b0}`}}>
                  <div style={{fontSize:9,color:C.teal,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>👷 Operarios</div>
                  {rankOp.length===0?(
                    <div style={{color:C.t4,fontSize:10,textAlign:"center",padding:"8px 0"}}>—</div>
                  ):rankOp.slice(0,5).map(([nom,cnt],ri)=>(
                    <div key={nom} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",borderTop:ri>0?`1px solid ${C.b0}`:"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:9,color:ri===0?C.yellow:C.t4,fontWeight:700}}>#{ri+1}</span>
                        <span style={{fontSize:10,color:C.t2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:60}}>{nom}</span>
                      </div>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:800,color:ri===0?C.yellow:C.teal}}>{cnt}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Turno más largo */}
              {masLargo&&(
                <div style={{background:C.bg2,borderRadius:12,padding:"13px",border:`1px solid ${C.orange}30`,borderLeft:`4px solid ${C.orange}`}}>
                  <div style={{fontSize:9,color:C.orange,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>⏱ Turno más largo del día</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:14}}>{masLargo.picking}</div>
                      <div style={{fontSize:10,color:C.t3,marginTop:2}}>🏗️ {masLargo.montacarguista||"—"} · {fmtHora(masLargo.fecha_solicitud)} → {fmtHora(masLargo.fecha_completado)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:800,color:C.orange,lineHeight:1}}>{masLargoMin}</div>
                      <div style={{fontSize:8,color:C.t4,textTransform:"uppercase"}}>minutos</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })()}

      </div>
      {agendarModal&&(
        <AgendarTurnoModal
          usuarios={usuarios}
          montacarguistas={montacarguistasActivos}
          todosMonta={usuarios.filter(u=>u.rol==="montacarguista")}
          onGuardar={crearTurno}
          onCancelar={()=>setAgendarModal(false)}
        />
      )}
    </div>
  );
}

function AgendarTurnoModal({usuarios,montacarguistas,todosMonta,onGuardar,onCancelar}){
  const [picking,setPicking]=useState("");
  const [cliente,setCliente]=useState("");
  const [operario,setOperario]=useState("");
  const [monta,setMonta]=useState("");
  const [urgente,setUrgente]=useState(false);
  const [posiciones,setPosiciones]=useState([{ubi:"",skus:[{ref:"",cant:""}]}]);
  const [enviando,setEnviando]=useState(false);
  const [err,setErr]=useState("");

  const operariosDisp=[...new Set(usuarios.filter(u=>u.rol==="operario"||u.rol==="picker").map(u=>u.nombre))].filter(Boolean).sort();
  const montaDisp=[...new Set([...montacarguistas.map(u=>u.nombre),...todosMonta.map(u=>u.nombre)])].filter(Boolean).sort();

  const parseUbi=ubi=>{
    const u=(ubi||"").trim().toUpperCase();
    const letra=u[0]||"";
    const nums=u.slice(1);
    return{ubi:u,calleLetra:letra,modulo:parseInt(nums.slice(0,2))||0,nivel:parseInt(nums[2])||0};
  };

  const addPos=()=>setPosiciones(p=>[...p,{ubi:"",skus:[{ref:"",cant:""}]}]);
  const removePos=i=>setPosiciones(p=>p.filter((_,idx)=>idx!==i));
  const setPos=(i,k,v)=>setPosiciones(p=>p.map((pos,idx)=>idx===i?{...pos,[k]:v}:pos));
  const addSku=pi=>setPosiciones(p=>p.map((pos,idx)=>idx===pi?{...pos,skus:[...pos.skus,{ref:"",cant:""}]}:pos));
  const removeSku=(pi,si)=>setPosiciones(p=>p.map((pos,idx)=>idx===pi?{...pos,skus:pos.skus.filter((_,i)=>i!==si)}:pos));
  const setSku=(pi,si,k,v)=>setPosiciones(p=>p.map((pos,idx)=>idx===pi?{...pos,skus:pos.skus.map((s,i)=>i===si?{...s,[k]:v}:s)}:pos));

  const handleGuardar=async()=>{
    if(!picking.trim()){setErr("Falta el número de picking");return;}
    if(!operario.trim()){setErr("Falta el operario solicitante");return;}
    const posOk=posiciones.filter(p=>p.ubi.trim());
    if(!posOk.length){setErr("Agrega al menos una posición UBI");return;}
    setErr("");setEnviando(true);
    const posData=posOk.map(p=>{
      const base=parseUbi(p.ubi);
      const skusOk=p.skus.filter(s=>s.ref.trim()&&s.cant);
      const totalSaldo=skusOk.reduce((s,k)=>s+(parseInt(k.cant)||0),0);
      return{...base,skus:skusOk.map(s=>({ref:s.ref.trim().toUpperCase(),desc:"",cant:parseInt(s.cant)||0,cajap:0})),totalSaldo,bajada:false,fallo:false};
    });
    const tieneMonta=monta.trim();
    await onGuardar({
      picking:picking.trim().toUpperCase(),
      estado:tieneMonta?"en_proceso":"pendiente",
      posiciones:posData,
      operario_solicitante:operario.trim(),
      montacarguista:tieneMonta||null,
      cliente:cliente.trim()||null,
      ciudad:"Itagüí",
      es_mde:urgente,
      prioridad:urgente?"urgente":null,
      fecha_solicitud:new Date().toISOString(),
    });
    setEnviando(false);
  };

  const inp={background:C.bg0,border:`1px solid ${C.b1}`,borderRadius:8,padding:"9px 11px",fontSize:13,color:C.t1,width:"100%",marginTop:4};
  const lbl={fontSize:10,color:C.t4,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"};
  const chip=(val,cur,col,onClick)=>(
    <button onClick={onClick} style={{padding:"3px 9px",background:cur===val?`${col}25`:C.bg3,border:`1px solid ${cur===val?col:C.b0}`,borderRadius:5,color:cur===val?col:C.t3,fontSize:9,cursor:"pointer"}}>{val}</button>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"#00000095",zIndex:50,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{background:C.bg1,borderRadius:"16px 16px 0 0",maxHeight:"93vh",display:"flex",flexDirection:"column"}}>
        <div style={{flexShrink:0,borderBottom:`1px solid ${C.b0}`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:800,fontSize:15}}>🏗️ Agendar turno</div>
          <button onClick={onCancelar} style={{background:"none",border:"none",color:C.t3,fontSize:22,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <div style={{overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:13}}>

          <div>
            <div style={lbl}>Nº Picking *</div>
            <input value={picking} onChange={e=>setPicking(e.target.value)} placeholder="Ej: 789456"
              style={{...inp,fontFamily:"'JetBrains Mono',monospace",fontSize:15,color:C.teal,fontWeight:800}}/>
          </div>

          <div>
            <div style={lbl}>Cliente</div>
            <input value={cliente} onChange={e=>setCliente(e.target.value)} placeholder="Nombre del cliente" style={inp}/>
          </div>

          <div>
            <div style={lbl}>Operario solicitante *</div>
            <input value={operario} onChange={e=>setOperario(e.target.value)} placeholder="Picker que solicita" style={inp}/>
            {operariosDisp.length>0&&(
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                {operariosDisp.map(n=>chip(n,operario,C.teal,()=>setOperario(n)))}
              </div>
            )}
          </div>

          <div>
            <div style={lbl}>Montacarguista <span style={{color:C.t4,fontWeight:400,textTransform:"none"}}>(vacío = queda pendiente)</span></div>
            <input value={monta} onChange={e=>setMonta(e.target.value)} placeholder="Asignar directo a..." style={inp}/>
            {montaDisp.length>0&&(
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                {montaDisp.map(n=>chip(n,monta,C.purple,()=>setMonta(m=>m===n?"":n)))}
              </div>
            )}
            {monta.trim()&&(
              <div style={{marginTop:6,fontSize:9,color:C.purple,fontWeight:600}}>
                ✓ Se creará directo en <strong>en proceso</strong> para {monta.trim()}
              </div>
            )}
          </div>

          <button onClick={()=>setUrgente(u=>!u)} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",background:urgente?`${C.red}18`:C.bg3,border:`1px solid ${urgente?C.red+"50":C.b0}`,borderRadius:9,color:urgente?C.red:C.t3,fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
            <span style={{fontSize:18}}>{urgente?"🚨":"⚪"}</span>
            {urgente?"URGENTE — MDE":"Marcar como urgente (MDE)"}
          </button>

          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={lbl}>Posiciones UBI *</div>
              <button onClick={addPos} style={{padding:"4px 11px",background:`${C.teal}20`,border:`1px solid ${C.teal}40`,borderRadius:6,color:C.teal,fontSize:10,fontWeight:700,cursor:"pointer"}}>+ UBI</button>
            </div>
            {posiciones.map((pos,pi)=>(
              <div key={pi} style={{background:C.bg3,borderRadius:10,padding:"10px",marginBottom:8,border:`1px solid ${C.b1}`}}>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <input value={pos.ubi} onChange={e=>setPos(pi,"ubi",e.target.value.toUpperCase())} placeholder="UBI — ej: D0432"
                    style={{flex:1,background:C.bg0,border:`1px solid ${C.b1}`,borderRadius:7,padding:"8px 10px",fontSize:14,color:C.teal,fontFamily:"'JetBrains Mono',monospace",fontWeight:800}}/>
                  {posiciones.length>1&&(
                    <button onClick={()=>removePos(pi)} style={{padding:"6px 10px",background:`${C.red}15`,border:`1px solid ${C.red}30`,borderRadius:7,color:C.red,fontSize:12,cursor:"pointer"}}>✕</button>
                  )}
                </div>
                {pos.skus.map((s,si)=>(
                  <div key={si} style={{display:"flex",gap:5,marginBottom:5}}>
                    <input value={s.ref} onChange={e=>setSku(pi,si,"ref",e.target.value)} placeholder="REF"
                      style={{flex:2,background:C.bg0,border:`1px solid ${C.b1}`,borderRadius:6,padding:"7px 9px",fontSize:11,color:C.accent,fontFamily:"'JetBrains Mono',monospace"}}/>
                    <input value={s.cant} onChange={e=>setSku(pi,si,"cant",e.target.value.replace(/\D/g,""))} placeholder="Cant" type="number" min="1"
                      style={{flex:1,background:C.bg0,border:`1px solid ${C.b1}`,borderRadius:6,padding:"7px 9px",fontSize:11,color:C.yellow,fontFamily:"'JetBrains Mono',monospace"}}/>
                    {pos.skus.length>1&&(
                      <button onClick={()=>removeSku(pi,si)} style={{padding:"5px 9px",background:`${C.red}12`,border:`1px solid ${C.red}25`,borderRadius:5,color:C.red,fontSize:11,cursor:"pointer"}}>✕</button>
                    )}
                  </div>
                ))}
                <button onClick={()=>addSku(pi)} style={{width:"100%",padding:"6px",background:C.bg2,border:`1px dashed ${C.b1}`,borderRadius:6,color:C.t4,fontSize:10,cursor:"pointer"}}>+ SKU</button>
              </div>
            ))}
          </div>

          {err&&<div style={{background:`${C.red}15`,border:`1px solid ${C.red}40`,borderRadius:8,padding:"9px 12px",color:C.red,fontSize:11,fontWeight:600}}>{err}</div>}

          <button onClick={handleGuardar} disabled={enviando}
            style={{width:"100%",padding:"14px",background:enviando?C.bg3:`linear-gradient(135deg,${C.orange},${C.yellow})`,border:"none",borderRadius:11,color:enviando?C.t3:C.bg0,fontWeight:800,fontSize:14,cursor:enviando?"not-allowed":"pointer",marginBottom:8}}>
            {enviando?"Guardando...":"✓ Agendar turno"}
          </button>

        </div>
      </div>
    </div>
  );
}

function ReasignarForm({operarioActual,operariosDisp,onGuardar,onCancelar}){
  const [nombre,setNombre]=useState(operarioActual);
  const todos=[...new Set([operarioActual,...operariosDisp])].filter(Boolean);
  return(
    <div style={{background:C.bg3,borderRadius:9,padding:"10px",marginTop:6,border:`1px solid ${C.b1}`}}>
      <div style={{color:C.t3,fontSize:10,marginBottom:6}}>Reasignar a:</div>
      <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre del operario..."
        style={{width:"100%",background:C.bg0,border:`1px solid ${C.b1}`,borderRadius:7,padding:"8px 10px",fontSize:13,color:C.t1,marginBottom:6}}/>
      {todos.length>1&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:7}}>
        {todos.map(n=>(
          <button key={n} onClick={()=>setNombre(n)} style={{padding:"3px 9px",background:nombre===n?`${C.accent}25`:C.bg2,border:`1px solid ${nombre===n?C.accent:C.b0}`,borderRadius:5,color:nombre===n?C.accent:C.t3,fontSize:10,cursor:"pointer"}}>
            {n}
          </button>
        ))}
      </div>}
      <div style={{display:"flex",gap:5}}>
        <button onClick={()=>nombre.trim()&&onGuardar(nombre.trim())} style={{flex:1,padding:"7px",background:`${C.accent}20`,border:`1px solid ${C.accent}40`,borderRadius:7,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>Guardar</button>
        <button onClick={onCancelar} style={{flex:1,padding:"7px",background:C.bg2,border:`1px solid ${C.b0}`,borderRadius:7,color:C.t3,fontSize:11,cursor:"pointer"}}>Cancelar</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp/>);
</script>
</body>
</html>
