// #4: detección robusta de Medellín (prioridad despacho antes 11AM)
const esMDE=ciudad=>{const x=String(ciudad||"").toUpperCase().trim();return x==="MDE"||x.includes("MEDELL")||x==="ITAGUI"||x==="ITAGÜI"||x.includes("ITAGU");};
// Minutos restantes hasta las 11:00 AM hora local (negativo = ya pasó)
const minHasta11AM=()=>{const now=new Date();const c=new Date(now);c.setHours(11,0,0,0);return Math.round((c-now)/60000);};
const gap=s=>{if(s.nota)return 0;if(s.stock_piso>=s.comp)return 0;return Math.max(0,s.comp-s.stock_piso);};
const tRup=s=>s.stock_piso===0?0:Math.round((s.stock_piso/(Math.max(s.vel_dia,1)/10))*60);
const estado=s=>{
  if(s.stock_piso===0&&s.comp>0&&!s.nota)return"ruptura";
  const g=gap(s),t=tRup(s);
  if(g>0&&t<60)return"critico";
  if(g>0&&t<180)return"preventivo";
  return"ok";
};
const cantSug=(s,bH,bF)=>R9(gap(s)+Math.ceil((Math.max(s.vel_dia,1)/10)*bH*bF));
const ventana=s=>{
  const t=tRup(s),v=t-(LEAD+TREP);
  if(t===0)return{min:-(LEAD+TREP),st:"tarde"};
  if(v<=0)return{min:v,st:"tarde"};
  if(v<=20)return{min:v,st:"urgente"};
  if(v<=60)return{min:v,st:"proximo"};
  return{min:v,st:"prog"};
};
// C1: score sin prioridad MDE — todas las ciudades igual
const score=s=>({ruptura:100,critico:75,preventivo:40,ok:0}[estado(s)]+({A:40,B:25,C:10}[s.abc]||0));
const esEXPO=d=>(d||"").toUpperCase().includes("EXPO");
// Slotting: solo marcas ICH y TECH son paletizables
const esSlottable=d=>{const x=(d||"").toUpperCase();return x.includes("ICH")||x.includes("TECH");};
// Familia de producto: 501, 3110, 102, T-10, etc. (desde descripción) — datos reales
const familia=d=>{const u=(d||"").toUpperCase();if(/\bT[- ]?10\b/.test(u))return "T-10";const m=u.match(/ICH[- ]?([0-9]{2,4})/);return m?m[1]:"OTRO";};
const CAJA=9;                         // 1 caja = 9 unidades
const CAJAS_PALLET=8;                 // 1 pallet = 8 cajas
const cajasCompletas=u=>Math.floor(Math.max(0,u)/CAJA); // nº de cajas completas en u unidades

// ── Helpers ───────────────────────────────────────────────────────────────────
const tick=()=>new Promise(r=>setTimeout(r,0));
const toNum=v=>{const n=parseFloat(String(v||0).replace(/[^0-9.-]/g,""));return isNaN(n)?0:n;};

// C2: esAtipico — solo para badge visual en pipeline, NO filtra comprometido
const tieneNota=nota=>{
  const n=String(nota||"").trim().toLowerCase();
  return n.length>1&&!["n","n.",".","-","nan","none"].includes(n);
};

// ── processFiles — ITAGUÍ únicamente para WMS ────────────────────────────────
// INVENTARIO : header fila 5, sheet 'InvxUbiMULTI'
// WMS BANDEJA: header fila 5, solo sheet ITAGUÍ (PROMICAL y RADAR excluidos)
// UBICACION  : código X##YY → calle(B-E) · módulo(01-42) · nivel · pos
async function processFiles(wbInv, wbFact, onStep){

  onStep("Leyendo inventario...");await tick();

  // ── INVENTARIO: range:5 salta las 5 filas vacías/título antes del header ──
  const invSheet=wbInv.Sheets[wbInv.SheetNames[0]];
  const invRows=XLSX.utils.sheet_to_json(invSheet,{range:5,defval:""});

  // Filtrar CASCO sin EXPO
  const invCasco=invRows.filter(r=>{
    const linea=String(r["Linea"]||"").trim();
    const desc=String(r["Descripcion"]||"");
    return linea==="CASCO"&&!esEXPO(desc);
  });

  if(invCasco.length===0){
    throw new Error("No se encontraron SKUs CASCO en el inventario.\nVerifica que sea el archivo 'Inventario x Posición'.");
  }

  // ── PATCH 2: Parser de ubicación X##YY ───────────────────────────────────────
  // B0111 = calle B · módulo 01 · nivel 1 · pos 1
  // Mapeo: B→C1 · C→C2 · D→C3 · E→C4
  const CALLE_MAP={B:"C1",C:"C2",D:"C3",E:"C4"};
  const parseUbi=u=>{
    const m=/^([B-E])0?(\d{1,2})(\d)(\d)$/.exec(String(u).trim());
    if(!m)return null;
    return{calleKey:CALLE_MAP[m[1]],calleLetra:m[1],modulo:parseInt(m[2]),nivel:parseInt(m[3]),pos:parseInt(m[4])};
  };

  // Stock por referencia + invByModule (clave "B01", "C14", etc.)
  // stockMap.stock = SOLO PISO (nivel 1) → base para gap/ruptura. stockAlt = altura (nivel 2+)
  const stockMap={};
  const invByModule={};   // key: "B01" → [{ref,desc,stock,nivel,pos,comp,gap}]
  for(const r of invCasco){
    const ref=String(r["Referencia"]||"").trim();
    const desc=String(r["Descripcion"]||"").trim();
    const saldo=toNum(r["saldo"]);
    const ubi=String(r["ubicacion"]||"").trim();
    if(!ref)continue;
    const p=parseUbi(ubi);
    if(!stockMap[ref])stockMap[ref]={ref,desc,stock:0,stockAlt:0,stockTotal:0};
    stockMap[ref].stockTotal+=saldo;
    // Nivel 1 = piso operativo; nivel 2+ = altura
    if(p&&p.nivel<=1) stockMap[ref].stock+=saldo;      // stock = SOLO piso
    else              stockMap[ref].stockAlt+=saldo;   // resto = altura
    if(p&&saldo>0){
      const modKey=`${p.calleLetra}${String(p.modulo).padStart(2,"0")}`;
      if(!invByModule[modKey])invByModule[modKey]=[];
      invByModule[modKey].push({ref,desc,saldo,nivel:p.nivel,pos:p.pos,ubi,calleKey:p.calleKey,modulo:p.modulo});
    }
  }
  const cascoRefs=new Set(Object.keys(stockMap));

  onStep(`${cascoRefs.size.toLocaleString()} SKUs CASCO encontrados. Leyendo pedidos ITAGUÍ...`);await tick();

  // ── PATCH 1: Solo ITAGUÍ — PROMICAL y RADAR excluidos ────────────────────────
  const wmsSheets=["ITAGUÍ"];
  let allWmsRows=[];
  for(const shName of wmsSheets){
    const ws=wbFact.Sheets[shName];
    if(!ws)continue;
    // range:5 para saltar filas vacías/título y usar fila 5 como header
    const rows=XLSX.utils.sheet_to_json(ws,{range:5,defval:""});
    allWmsRows=allWmsRows.concat(rows);
  }

  if(allWmsRows.length===0){
    throw new Error("No se encontraron pedidos en la Bandeja WMS.\nVerifica que sea el archivo 'Bandeja de planeación'.");
  }

  onStep("Calculando comprometido vs stock (todos los pedidos)...");await tick();

  // C2: compMap incluye TODOS los pedidos — sin filtro de nota
  const compMap={};
  const pedidosRaw={};  // key: picking → {meta, rows[]}
  for(const r of allWmsRows){
    const ref=String(r["referencia"]||"").trim();
    const cant=toNum(r["cantidad"]);
    const nota=r["notas"];
    const ciudad=String(r["ciudad"]||"").trim();
    const estado_val=String(r["Estado"]||"").trim();
    const picking=String(r["Picking"]||r["PedidoSiesa"]||"").trim();
    const cliente=String(r["NOMBRECLIENTE"]||"").trim();
    const pedidoSiesa=String(r["PedidoSiesa"]||"").trim();
    const fecha=r["F_pedido"]?String(r["F_pedido"]).slice(0,10):"";
    const desc=String(r["descripcion"]||"").trim();
    const tipoDocto=String(r["TipoDocto"]||"").trim().toUpperCase();
    if(!ref||cant===0||!cascoRefs.has(ref))continue;
    // Comprometido total
    compMap[ref]=(compMap[ref]||0)+cant;
    // Agrupar por picking
    if(!pedidosRaw[picking]){
      pedidosRaw[picking]={
        id:picking,
        pedidoSiesa,
        est:estado_val==="5"?"planeado":estado_val==="3"?"en_picking":"sin_planear",
        cliente,ciudad,fecha,
        nota:tieneNota(nota),
        tipoDocto,
        rows:[],
      };
    }
    pedidosRaw[picking].rows.push({ref,desc,cant,nota:tieneNota(nota)});
  }

  onStep("Clasificando SKUs y calculando gaps...");await tick();

  // Enriquecer invByModule con comp y gap por referencia
  for(const key of Object.keys(invByModule)){
    invByModule[key]=invByModule[key].map(row=>({
      ...row,
      comp:compMap[row.ref]||0,
      gap:Math.max(0,(compMap[row.ref]||0)-( stockMap[row.ref]?.stock||0)),
    })).sort((a,b)=>b.saldo-a.saldo);
  }

  // Merge stock + comprometido → puntos operacionales completos
  const items=Object.values(stockMap).map(it=>{
    const comp=compMap[it.ref]||0;
    const g=Math.max(0,comp-it.stock);
    // ── vel_dia: HISTÓRICO real (3m) si existe, fallback a estimación por comprometido ──
    const h=VEL_HIST[it.ref];
    const vel_hist=h?h.v:null;
    const vel_dia=vel_hist!=null&&vel_hist>0?+vel_hist.toFixed(2):(comp>0?+(comp/1).toFixed(1):1);
    const tieneHist=vel_hist!=null;
    const tendencia=h?({C:"creciente",D:"decreciente",E:"estable"}[h.t]||"estable"):"estable";
    const proy_mes=h?h.p:null;
    const rot_hist=h?h.r:null;
    const cajas_d=+(vel_dia/9).toFixed(3);
    // ── BLOQUE 2: Puntos operacionales (ahora con velocidad real) ───────────
    const pto_min = Math.ceil(vel_dia * 1);
    const pto_seg = Math.ceil(vel_dia * ((LEAD+TREP)/60) * 2);
    const pto_max = Math.ceil(vel_dia * 5);
    const dias_cob= it.stock>0&&vel_dia>0 ? +(it.stock/vel_dia).toFixed(1) : 0;
    let estado_op="normal";
    if(comp>0&&it.stock===0)              estado_op="urgente";
    else if(comp>0&&it.stock<pto_seg)     estado_op="critico";
    else if(comp>0&&it.stock<pto_min*2)   estado_op="preventivo";
    // ────────────────────────────────────────────────────────────────────────
    const abc_hist=(h&&h.a)||(g>0||comp>0?"A":"C");
    return{...it,comp,gap:g,vel_dia,vel_hist,tieneHist,tendencia,proy_mes,rot_hist,abc:abc_hist,cajas_d,pto_min,pto_seg,pto_max,dias_cob,estado_op};
  }).sort((a,b)=>b.gap-a.gap||b.comp-a.comp);

  // Slotting: piso vs altura — SOLO marcas ICH y TECH, unidad mínima = caja completa (9u)
  const PALLET=72; // 8 cajas × 9u = 72u por pallet en altura
  for(const it of items){
    const slottable=esSlottable(it.desc);
    const cajas=cajasCompletas(it.stock);     // cajas completas disponibles
    const fraccion=it.stock-(cajas*CAJA);     // unidades sueltas (no paletizables)
    it.slottable=slottable;
    it.cajas_disp=cajas;
    it.fraccion=fraccion;
    // Destino
    if(it.stock===0)                  {it.destino="SIN_STOCK";it.razon="Sin stock en piso";}
    else if(!slottable)               {it.destino="PISO";it.razon="Marca no paletizable (solo ICH/TECH)";}
    else if(it.comp===0&&cajas===0)   {it.destino="PISO";it.razon=`Fracción ${it.stock}u — menos de 1 caja`;}
    else if(it.comp===0&&it.stock>0)  {it.destino="ALTURA";it.razon="Sin pedidos — excedente a altura";}
    else                              {it.destino="PISO";it.razon="OK — cubre demanda";}
    // ¿Cuánto subir a altura? Solo cajas completas. NO mover fracciones.
    if(it.destino==="ALTURA"&&slottable&&cajas>0){
      // Subir solo cajas completas del excedente
      const excedente=Math.max(0,it.stock-Math.max(it.comp,CAJA)); // dejar al menos demanda o 1 caja en piso
      const cajasSubir=cajasCompletas(excedente);
      it.cajas_sub=cajasSubir;
      it.u_subir=cajasSubir*CAJA;
      // ¿Alcanza para pallet completo (8 cajas) o va en pallet mixto?
      it.pallet_completo=cajasSubir>=CAJAS_PALLET;
      it.sugerencia_mixto=cajasSubir>0&&cajasSubir<CAJAS_PALLET; // pocas cajas → consolidar en pallet mixto
      it.pallets_subir=Math.floor(cajasSubir/CAJAS_PALLET);
    } else {
      it.u_subir=0;it.cajas_sub=0;it.pallets_subir=0;
      it.pallet_completo=false;it.sugerencia_mixto=false;
    }
  }

  const pisoItems=items.filter(it=>it.destino==="PISO");
  const alturaItems=items.filter(it=>it.destino==="ALTURA"&&it.stock>0&&!esEXPO(it.desc));

  // C3: Sugerencia de pallets en altura — posiciones nivel>=3 con SKUs requeridos
  // Agrupar posiciones de altura por ubicación exacta (cada ubicación = 1 pallet físico)
  const alturaPos={};  // key: ubicación WMS (ej: "B0311")
  for(const [modKey,rows] of Object.entries(invByModule)){
    for(const row of rows){
      if(row.nivel<2)continue;  // solo altura real (nivel 2+)
      const ubi=row.ubi;
      if(!alturaPos[ubi])alturaPos[ubi]={
        ubi, modKey,
        calleLetra:ubi[0], modulo:parseInt(ubi.slice(1,3)),
        nivel:row.nivel, pos:row.pos,
        skus:[], totalStock:0,
      };
      const comp=compMap[row.ref]||0;
      const stockPiso=stockMap[row.ref]?.stock||0;
      const g=Math.max(0,comp-stockPiso);
      alturaPos[ubi].totalStock+=row.saldo;
      alturaPos[ubi].skus.push({ref:row.ref,desc:row.desc,saldo:row.saldo,comp,stockPiso,gap:g});
    }
  }
  // REABASTO: bajar solo cajas completas necesarias, solo marcas ICH/TECH
  const palletsSugeridos=Object.values(alturaPos)
    .map(p=>{
      // SKUs con gap real Y que sean paletizables (ICH/TECH)
      const needed=p.skus.filter(s=>s.gap>0&&esSlottable(s.desc)).map(s=>{
        // Bajar cajas completas que cubran el gap (mínimo 1 caja si hay demanda)
        const cajasGap=Math.max(1,Math.ceil(s.gap/CAJA));        // cajas para cubrir gap
        const cajasDispo=cajasCompletas(s.saldo);                // cajas completas en esta posición
        const cajasBajar=Math.min(cajasGap,cajasDispo);          // no bajar más de lo que hay
        return{...s,cajasGap,cajasDispo,cajasBajar,uBajar:cajasBajar*CAJA};
      }).filter(s=>s.cajasBajar>0); // solo si hay al menos 1 caja completa para bajar
      const totalGap=needed.reduce((t,s)=>t+s.gap,0);
      const totalCajasBajar=needed.reduce((t,s)=>t+s.cajasBajar,0);
      const skusUnicos=[...new Set(p.skus.map(s=>s.ref))].length;
      return{...p,needed,totalGap,totalCajasBajar,skusUnicos,esPallet:Math.abs(p.totalStock-PALLET)<=CAJA};
    })
    .filter(p=>p.needed.length>0)
    .sort((a,b)=>b.totalGap-a.totalGap);

  // SKUS para el motor predictivo (top con gap o comprometido)
  const skusMotor=[...items].sort((a,b)=>b.gap-a.gap||b.comp-a.comp).slice(0,30).map((it,i)=>{
    // ABC desde histórico real (3m); fallback a estimación si SKU sin histórico
    const eABC=(VEL_HIST[it.ref]?.a)||(it.gap>0?"A":it.comp>0?"A":"C");
    return{
      id:it.ref,
      tipo:it.desc.includes("INTEGRAL")?"INTEGRAL":it.desc.includes("ABATIBLE")?"ABATIBLE":"ABIERTO",
      label:it.desc.slice(0,35),
      abc:eABC,
      tendencia:it.tendencia,
      proy_mes:it.proy_mes,
      tieneHist:it.tieneHist,
      vel_dia:it.vel_dia,
      stock_piso:it.stock,
      stock_res:Math.round(it.stock*0.5),
      comp:it.comp,
      nota:false,
      ciudad:i%3===0?"MDE":i%3===1?"BOG":"CAL",
      tend:it.gap>0?"DECRECIENTE":it.comp>0?"ESTABLE":"CRECIENTE",
      calle:`C${(i%4)+1}`,
      m:(i%14)+1,
      qty90:it.stock,
      ped:0,cli:0,frec:0.7,
    };
  });

  // ── BLOQUE 3: invBySKU — todas las posiciones por referencia ────────────────
  const invBySKU={};
  for(const[modKey,rows] of Object.entries(invByModule)){
    for(const row of rows){
      if(!invBySKU[row.ref])invBySKU[row.ref]=[];
      invBySKU[row.ref].push({ubi:row.ubi,saldo:row.saldo,nivel:row.nivel,pos:row.pos,modKey,calleLetra:modKey[0],modulo:parseInt(modKey.slice(1))});
    }
  }

  // ── Construir pedidosActivos con cobertura piso/altura ───────────────────────
  const pedidosActivos=Object.values(pedidosRaw).map(p=>{
    const refs=p.rows.map(row=>{
      const pos=invBySKU[row.ref]||[];
      const stockPiso=pos.filter(x=>x.nivel<=1).reduce((t,x)=>t+x.saldo,0);
      const stockAlt =pos.filter(x=>x.nivel>=2).reduce((t,x)=>t+x.saldo,0);
      // FIX: cobertura real = stock disponible vs cantidad comprometida del pedido
      const cubPiso=Math.min(stockPiso,row.cant); // cuánto cubre el piso
      const cubAlt =Math.min(Math.max(0,stockAlt-(row.cant-cubPiso)),row.cant-cubPiso); // resto de altura
      const hasPiso=cubPiso>=row.cant;       // piso cubre TODO lo requerido
      const hasPisoParcial=cubPiso>0;        // piso cubre ALGO
      const hasAlt =stockAlt>0;
      const sinStock=stockPiso===0&&stockAlt===0;
      return{...row,stockPiso,stockAlt,cubPiso,cubAlt,hasPiso,hasPisoParcial,hasAlt,sinStock};
    });
    const lineas=refs.length;
    const uni=refs.reduce((t,r)=>t+r.cant,0);
    // % cobertura = unidades realmente cubiertas por piso / total pedido
    const uniPiso=refs.reduce((t,r)=>t+r.cubPiso,0);   // unidades cubiertas desde piso
    const uniAlt =refs.reduce((t,r)=>t+r.cubAlt,0);    // unidades cubiertas desde altura
    const uniSin =refs.filter(r=>r.sinStock).reduce((t,r)=>t+r.cant,0);
    const soloAlt=refs.filter(r=>!r.hasPiso&&r.hasAlt).length;
    const sinStock=refs.filter(r=>r.sinStock).length;
    const pctPiso=uni>0?Math.round((uniPiso/uni)*100):0;
    const pctAlt =uni>0?Math.round((uniAlt/uni)*100):0;
    let cobertura="SIN STOCK";
    if(pctPiso===100)cobertura="PISO";
    else if(pctPiso===0&&uniAlt>0)cobertura="ALTURA";
    else if(pctPiso>0)cobertura="MIXTO";
    // Clasificación de despacho — basada en cobertura REAL vs cantidad comprometida
    let clasificacion="ruptura";
    if(pctPiso===100)clasificacion="despachable";      // piso cubre el 100% del pedido
    else if(pctPiso>=40)clasificacion="parcial";       // piso cubre parcialmente
    else if(uniAlt>0)clasificacion="reabasto";         // necesita bajar de altura
    return{...p,refs,lineas,uni,uniPiso,uniAlt,uniSin,pctPiso,pctAlt,soloAlt,sinStock,cobertura,clasificacion};
  }).sort((a,b)=>{
    // #4: prioridad MDE antes de 11AM al tope
    const aMDE=esMDE(a.ciudad)?1:0, bMDE=esMDE(b.ciudad)?1:0;
    if(aMDE!==bMDE)return bMDE-aMDE;
    const ord={sin_planear:0,planeado:1,en_picking:2};
    return (ord[a.est]||0)-(ord[b.est]||0)||b.uni-a.uni;
  });

  // ── REPORTE: datos completos sin límites ──────────────────────────────────
  // Stock en altura por referencia (nivel >= 2)
  const stockAltMap={};
  for(const[,rows] of Object.entries(invByModule)){
    for(const row of rows){
      if(row.nivel>=2){
        stockAltMap[row.ref]=(stockAltMap[row.ref]||0)+row.saldo;
      }
    }
  }

  // Rupturas: comprometido>0, stock_piso=0 — ordenadas por comp desc
  const rupturas=items
    .filter(it=>it.comp>0&&it.stock===0)
    .map(it=>({...it,stock_alt:stockAltMap[it.ref]||0}))
    .sort((a,b)=>b.comp-a.comp);

  // Gaps: stock_piso>0 pero stock_piso < comp
  const gapsReport=items
    .filter(it=>it.gap>0&&it.stock>0)
    .map(it=>({...it,stock_alt:stockAltMap[it.ref]||0}))
    .sort((a,b)=>b.gap-a.gap);

  // Reporte por ciudad: comprometido total y SKUs
  // #4 FIX: contar PEDIDOS únicos (pickings), no SKUs
  const cityMap={};
  for(const r of allWmsRows){
    const ciudad=String(r["ciudad"]||"").trim();
    const cant=toNum(r["cantidad"]);
    const ref=String(r["referencia"]||"").trim();
    const picking=String(r["Picking"]||r["PedidoSiesa"]||"").trim();
    if(!ciudad||!cascoRefs.has(ref)||cant===0)continue;
    if(!cityMap[ciudad])cityMap[ciudad]={ciudad,comp:0,refs:new Set(),pickings:new Set()};
    cityMap[ciudad].comp+=cant;
    cityMap[ciudad].refs.add(ref);
    if(picking)cityMap[ciudad].pickings.add(picking);
  }
  const cityReport=Object.values(cityMap)
    .map(c=>({ciudad:c.ciudad,comp:c.comp,skus:c.refs.size,pedidos:c.pickings.size}))
    .sort((a,b)=>b.comp-a.comp);

  // Reporte módulos: estado real por calle
  const CALLE_LETRAS={B:"C1",C:"C2",D:"C3",E:"C4"};
  const modReport=Object.entries(CALLE_LETRAS).map(([letra,calleId])=>{
    const moduloStats={};
    for(const[modKey,rows] of Object.entries(invByModule)){
      if(modKey[0]!==letra)continue;
      const modNum=parseInt(modKey.slice(1));
      const pisoRows=rows.filter(r=>r.nivel<=1);
      const altRows=rows.filter(r=>r.nivel>=2);
      const skusPiso=new Set(pisoRows.map(r=>r.ref)).size;
      const stockP=pisoRows.reduce((t,r)=>t+r.saldo,0);
      const stockA=altRows.reduce((t,r)=>t+r.saldo,0);
      const gapMod=pisoRows.reduce((t,r)=>t+(r.gap||0),0);
      moduloStats[modNum]={modKey,modNum,skusPiso,stockP,stockA,gapMod,
        estado:stockP===0&&gapMod>0?"ruptura":gapMod>0?"critico":skusPiso>18?"mezcla":"ok"};
    }
    const mods=Object.values(moduloStats);
    return{
      calleId,letra,
      modulos:mods,
      stockPiso:mods.reduce((t,m)=>t+m.stockP,0),
      mezcla:mods.filter(m=>m.skusPiso>18).length,
      sinMezcla:mods.filter(m=>m.skusPiso===1).length,
      vacios:42-mods.length,
      conGap:mods.filter(m=>m.gapMod>0).length,
    };
  });

  // ── Agrupación por FAMILIA de producto (datos reales) ──────────────────────
  const famMap={}; // familia → {comp, stock, stockAlt, skus}
  for(const it of items){
    const f=familia(it.desc);
    if(!famMap[f])famMap[f]={familia:f,comp:0,stock:0,stockAlt:0,skus:0,gap:0};
    famMap[f].comp+=it.comp||0;                       // comprometido real
    famMap[f].stock+=it.stock||0;                     // piso real
    famMap[f].stockAlt+=(stockAltMap[it.ref]||0);     // altura real
    famMap[f].gap+=it.gap||0;
    famMap[f].skus+=1;
  }
  const familias=Object.values(famMap).sort((a,b)=>b.comp-a.comp);

  const stats={
    totalSKUs:items.length,
    familias,
    skusPiso:pisoItems.length,
    skusAltura:alturaItems.length,
    sinMov:items.filter(it=>it.comp===0).length,
    totalComp:Object.values(compMap).reduce((t,v)=>t+v,0),
    totalStock:items.reduce((t,it)=>t+it.stock,0),
    totalStockAlt:Object.values(stockAltMap).reduce((t,v)=>t+v,0),
    totalGap:items.reduce((t,it)=>t+it.gap,0),
    totalCajas:alturaItems.reduce((t,s)=>t+s.cajas_sub,0),
    totalUSubir:alturaItems.reduce((t,s)=>t+s.u_subir,0),
    pedidosActivos:pedidosActivos.length,
    pedDespachables:pedidosActivos.filter(p=>p.clasificacion==="despachable").length,
    pedParciales:pedidosActivos.filter(p=>p.clasificacion==="parcial").length,
    pedReabasto:pedidosActivos.filter(p=>p.clasificacion==="reabasto").length,
    pedRuptura:pedidosActivos.filter(p=>p.clasificacion==="ruptura").length,
    uniDespachables:pedidosActivos.filter(p=>p.clasificacion==="despachable").reduce((t,p)=>t+p.uni,0),
    pedMDE:pedidosActivos.filter(p=>esMDE(p.ciudad)).length,
    pedMDEPend:pedidosActivos.filter(p=>esMDE(p.ciudad)&&p.clasificacion!=="despachable").length,
    totalRupturas:rupturas.length,
    totalGaps:gapsReport.length,
    totalCiudades:cityReport.length,
    ahora:new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}),
    fecha:new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"}),
  };

  return{SKUS:skusMotor,pisoItems,alturaItems,allItems:items,stats,pedidosActivos,invByModule,invBySKU,palletsSugeridos,rupturas,gapsReport,cityReport,modReport};
}

  );
};

// ── BLOQUE 3: SKUPanel — todas las posiciones de un SKU ──────────────────────
function SKUPanel({ref,invBySKU,allItems,onClose}){
  const pos=invBySKU[ref]||[];
  const item=allItems?.find(it=>it.ref===ref)||{};
  const CALLE_NOMBRES={B:"Calle 1",C:"Calle 2",D:"Calle 3",E:"Calle 4"};
  const piso=pos.filter(p=>p.nivel<=1);
  const altura=pos.filter(p=>p.nivel>=2);
  const stockPiso=piso.reduce((t,p)=>t+p.saldo,0);
  const stockAltura=altura.reduce((t,p)=>t+p.saldo,0);
  const eOP={urgente:{c:C.red,l:"URGENTE"},critico:{c:C.orange,l:"CRÍTICO"},preventivo:{c:C.yellow,l:"PREVENTIVO"},normal:{c:C.green,l:"NORMAL"}};
  const op=eOP[item.estado_op||"normal"];
  return(
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:440,background:C.bg1,borderLeft:`1px solid ${C.b1}`,zIndex:201,display:"flex",flexDirection:"column",animation:"slideIn .2s ease",boxShadow:"-8px 0 40px #000c"}}>
      <style>{`@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}`}</style>
      {/* Header */}
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.b0}`,background:C.bg2}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0,marginRight:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:16}}>{ref}</span>
              {op&&<span style={{background:`${op.c}18`,color:op.c,border:`1px solid ${op.c}35`,borderRadius:5,padding:"2px 8px",fontSize:9,fontWeight:700}}>{op.l}</span>}
            </div>
            <div style={{color:C.t2,fontSize:11,lineHeight:1.4}}>{item.desc?.slice(0,65)}</div>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:"50%",background:C.bg3,border:`1px solid ${C.b0}`,color:C.t2,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
        </div>
      </div>
      {/* KPIs SKU */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,borderBottom:`1px solid ${C.b0}`}}>
        {[
          {l:"Stock Piso",   v:stockPiso,   c:stockPiso===0?C.red:C.green},
          {l:"Stock Altura", v:stockAltura, c:C.purple},
          {l:"Comprometido", v:item.comp||0,c:C.yellow},
          {l:"Días Cob.",    v:item.dias_cob||0, c:item.dias_cob<1?C.red:item.dias_cob<3?C.orange:C.green},
        ].map(k=>(
          <div key={k.l} style={{background:C.bg2,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:8,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.7px",marginBottom:3}}>{k.l}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:800,color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>
      {/* Puntos operacionales */}
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.b0}`,background:C.bg0}}>
        <div style={{fontSize:9,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:7}}>Puntos Operacionales</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[
            {l:"Punto Mínimo", v:item.pto_min||0, c:C.red,    s:"1d demanda"},
            {l:"Punto Seguridad",v:item.pto_seg||0,c:C.yellow, s:"2× ciclo repos."},
            {l:"Punto Máximo", v:item.pto_max||0, c:C.green,  s:"5d cobertura"},
          ].map(k=>(
            <div key={k.l} style={{background:C.bg2,borderRadius:7,padding:"8px 10px",borderTop:`2px solid ${k.c}`}}>
              <div style={{fontSize:8,color:C.t3,marginBottom:3}}>{k.l}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:800,color:k.c}}>{k.v}u</div>
              <div style={{fontSize:8,color:C.t4}}>{k.s}</div>
            </div>
          ))}
        </div>
        {/* Barra cobertura */}
        {item.pto_max>0&&(
          <div style={{marginTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.t3,marginBottom:3}}>
              <span>Cobertura actual</span>
              <span style={{color:stockPiso>=item.pto_seg?C.green:stockPiso>=item.pto_min?C.yellow:C.red,fontWeight:700}}>
                {item.dias_cob}d
              </span>
            </div>
            <div style={{height:6,background:C.b0,borderRadius:3,overflow:"hidden",position:"relative"}}>
              <div style={{width:`${Math.min(100,(stockPiso/Math.max(item.pto_max,1))*100)}%`,height:"100%",background:stockPiso>=item.pto_seg?C.green:stockPiso>=item.pto_min?C.yellow:C.red,borderRadius:3}}/>
              {/* Líneas de referencia */}
              {[item.pto_min,item.pto_seg].map((pt,i)=>(
                <div key={i} style={{position:"absolute",top:0,bottom:0,left:`${Math.min(100,(pt/Math.max(item.pto_max,1))*100)}%`,width:1,background:`${i===0?C.red:C.yellow}90`}}/>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginTop:4,fontSize:8,color:C.t3}}>
              <span style={{color:C.red}}>│ Mín:{item.pto_min}</span>
              <span style={{color:C.yellow}}>│ Seg:{item.pto_seg}</span>
              <span style={{color:C.green}}>Máx:{item.pto_max}</span>
            </div>
          </div>
        )}
      </div>
      {/* #5: Recomendación operativa — cuánto reponer + qué pallet bajar */}
      {(()=>{
        const g=Math.max(0,(item.comp||0)-(item.stock||0));
        const repoSug=Math.ceil(g/9)*9;
        const palletsBajar=altura.filter(p=>p.saldo>0).sort((a,b)=>b.saldo-a.saldo);

  const mezcla=skusUnicos>MAX_SKUS_MODULO;

  const byRef={};

    if(!byRef[r.ref])byRef[r.ref]={ref:r.ref,desc:r.desc,stock:0,comp:r.comp||0,gap:r.gap||0,niveles:[]};
    byRef[r.ref].stock+=r.saldo;
    if(!byRef[r.ref].niveles.includes(r.nivel))byRef[r.ref].niveles.push(r.nivel);

  const skuList=Object.values(byRef).sort((a,b)=>b.stock-a.stock);

    <div style={{position:"fixed",top:0,right:0,bottom:0,width:420,background:C.bg1,borderLeft:`1px solid ${C.b1}`,zIndex:200,display:"flex",flexDirection:"column",animation:"slideIn .2s ease",boxShadow:"-8px 0 40px #000a"}}>
      <style>{`@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}`}</style>
      {/* Header */}
      <div style={{padding:"16px 18px",borderBottom:`1px solid ${C.b0}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:C.bg2}}>

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <div style={{width:28,height:28,borderRadius:7,background:`${C.accent}20`,border:`1px solid ${C.accent}40`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:800,color:C.accent}}>
              {modNum}
            </div>
            <div>
              <div style={{color:C.t1,fontWeight:800,fontSize:14}}>{CALLE_NOMBRES[calleLetra]} — Módulo {modNum}</div>
              <div style={{color:C.t3,fontSize:10}}>Código WMS: {modKey}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span style={{background:mezcla?C.redDim:C.greenDim,color:mezcla?C.red:C.green,border:`1px solid ${mezcla?C.red:C.green}35`,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>
              {mezcla?`⚠ EXCEDE · ${skusUnicos}/18 SKUs`:`✓ ${skusUnicos}/18 SKUs`}
            </span>
            <span style={{background:C.accentDim,color:C.accent,border:`1px solid ${C.accent}35`,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>{totalStock.toLocaleString()} u total</span>
            {totalComp>0&&<span style={{background:C.yellowDim,color:C.yellow,border:`1px solid ${C.yellow}35`,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>{totalComp} comp.</span>}

        </div>
        <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:C.bg3,border:`1px solid ${C.b0}`,color:C.t2,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
      </div>
      {/* Stats rápidos */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,borderBottom:`1px solid ${C.b0}`}}>
        {[{l:"SKUs",v:skusUnicos,c:mezcla?C.red:C.green},{l:"Stock Total",v:totalStock,c:C.accent},{l:"Comprometido",v:totalComp,c:totalComp>0?C.yellow:C.t4}].map(k=>(

          </div>
        ))}
      </div>
      {/* Lista de SKUs */}
      {rows.length===0?(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.t3,fontSize:12}}>Sin registros de inventario para este módulo</div>
      ):(
        <div style={{flex:1,overflowY:"auto"}}>
          <div style={{padding:"8px 18px 4px",fontSize:9,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.8px",background:C.bg1,borderBottom:`1px solid ${C.b0}`,position:"sticky",top:0}}>
            Existencias por referencia · {skuList.length} SKUs distintos
          </div>
          {(()=>{
            // LÓGICA CORRECTA DE NIVELES:
            // Nivel 1 (pos 1 y 2) = piso operativo (picking directo)
            // Nivel 2, 3, 4, 5 (pos 1 y 2) = altura, requiere montacargas
            const PISO_MAX=1;  // solo nivel 1 = piso
            const pisoSKUs=skuList.filter(s=>s.niveles.some(n=>n<=PISO_MAX)).sort((a,b)=>{
              const ga=Math.max(0,a.comp-a.stock),gb=Math.max(0,b.comp-b.stock);
              return gb-ga||b.stock-a.stock;
            });
            const alturaSKUs=skuList.filter(s=>!s.niveles.some(n=>n<=PISO_MAX)&&s.niveles.some(n=>n>PISO_MAX)).sort((a,b)=>b.stock-a.stock);
            const ordered=[...pisoSKUs,...alturaSKUs];
            // Formato: M{mod}-{nivel}-{pos}  donde pos 1=derecha, 2=izquierda
            const POS_LABEL={1:"Der",2:"Izq"};
            const fmtUbiNivel=(ref,esAltura)=>{
              const nivFilt=rows.filter(r=>r.ref===ref&&(esAltura?r.nivel>PISO_MAX:r.nivel<=PISO_MAX));
              const porNivel={};
              nivFilt.forEach(r=>{
                if(!porNivel[r.nivel])porNivel[r.nivel]=[];
                porNivel[r.nivel].push(r);
              });
              return Object.entries(porNivel).sort((a,b)=>Number(a[0])-Number(b[0])).map(([niv,ps])=>{
                const mod=String(parseInt(modNum)).padStart(2,"0");
                // Mostrar posiciones con etiqueta Der/Izq
                const posStr=ps.sort((a,b)=>a.pos-b.pos).map(p=>`${p.pos}(${POS_LABEL[p.pos]||p.pos})`).join(" · ");
                return{
                  niv:Number(niv),
                  label:`M${mod}-${niv}-${ps.sort((a,b)=>a.pos-b.pos).map(p=>p.pos).join("/")}`,
                  labelFull:`M${mod} · Niv ${niv} · ${posStr}`,
                  stock:ps.reduce((t,p)=>t+p.saldo,0),
                  esPiso:Number(niv)<=PISO_MAX,
                };
              });
            };
            return ordered.map((s,i)=>{
              const g=Math.max(0,s.comp-s.stock);
              const esPiso=s.niveles.some(n=>n<=2);
              const esAltura=s.niveles.some(n=>n>=3);
              const acColor=g>0?C.red:s.comp>0?C.green:C.t3;
              const acLabel=g>0?"ABASTECER":s.comp>0?"CUBIERTO":"SIN PEDIDOS";
              const ubisPiso=fmtUbiNivel(s.ref,false);
              const ubisAltura=fmtUbiNivel(s.ref,true);
              const seccion=i===0&&esPiso?"piso":i===pisoSKUs.length&&esAltura?"altura":null;
              const esInicioPiso=i===0;
              const esInicioAltura=i===pisoSKUs.length;
              return(
                <React.Fragment key={s.ref}>
                  {/* Separador de sección */}
                  {(esInicioPiso&&pisoSKUs.length>0)&&(
                    <div style={{padding:"6px 18px",background:`${C.green}12`,borderBottom:`1px solid ${C.b0}`,fontSize:9,color:C.green,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",position:"sticky",top:34}}>
                      📦 Piso — {pisoSKUs.length} SKUs
                    </div>
                  )}
                  {(esInicioAltura&&alturaSKUs.length>0)&&(
                    <div style={{padding:"6px 18px",background:`${C.purple}12`,borderBottom:`1px solid ${C.b0}`,fontSize:9,color:C.purple,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",position:"sticky",top:34}}>
                      ⬆ Altura — {alturaSKUs.length} SKUs
                    </div>
                  )}
                  <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.bg3}`,background:g>0?`${C.red}07`:esPiso?`${C.green}04`:`${C.purple}04`}}>
                    {/* Fila 1: ref + desc + stock + badge */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{flex:1,minWidth:0,marginRight:8}}>
                        <div style={{display:"flex",gap:5,marginBottom:3,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:12}}>{s.ref}</span>
                          {esPiso&&<span style={{background:C.greenDim,color:C.green,border:`1px solid ${C.green}35`,borderRadius:3,padding:"1px 5px",fontSize:8,fontWeight:700}}>PISO</span>}
                          {esAltura&&<span style={{background:C.purpleDim,color:C.purple,border:`1px solid ${C.purple}35`,borderRadius:3,padding:"1px 5px",fontSize:8,fontWeight:700}}>ALTURA</span>}
                          <span style={{background:`${acColor}18`,color:acColor,border:`1px solid ${acColor}35`,borderRadius:3,padding:"1px 5px",fontSize:8,fontWeight:700}}>{acLabel}</span>
                        </div>
                        <div style={{color:C.t2,fontSize:10,lineHeight:1.3}}>{s.desc.slice(0,55)}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:800,color:esPiso?C.green:C.purple,lineHeight:1}}>{s.stock}</div>
                        <div style={{fontSize:8,color:C.t3}}>u · Comp:{s.comp} {g>0&&<span style={{color:C.red}}>Gap:-{g}</span>}</div>
                      </div>
                    </div>
                    {/* Fila 2: ubicaciones formato M25-2-1 */}
                    <div style={{display:"flex",flexDirection:"column",gap:3}}>
                      {ubisPiso.map(u=>(
                        <div key={u.label} style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:C.green,background:`${C.green}15`,border:`1px solid ${C.green}30`,borderRadius:5,padding:"2px 8px",letterSpacing:"0.5px"}}>{u.label}</span>
                          <span style={{fontSize:10,color:C.green,fontWeight:600}}>{u.stock}u</span>
                        </div>
                      ))}
                      {ubisAltura.map(u=>(
                        <div key={u.label} style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:C.purple,background:`${C.purple}15`,border:`1px solid ${C.purple}30`,borderRadius:5,padding:"2px 8px",letterSpacing:"0.5px"}}>{u.label}</span>
                          <span style={{fontSize:10,color:C.purple,fontWeight:600}}>{u.stock}u</span>
                          {g>0&&<span style={{background:C.yellowDim,color:C.yellow,border:`1px solid ${C.yellow}35`,borderRadius:3,padding:"1px 5px",fontSize:8,fontWeight:700}}>BAJAR</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                </React.Fragment>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

// ── #1: Exportar Plan del Turno a Excel formateado ──────────────────────────
function exportarPlanTurno(sorted,data,bufH,bufF){
  if(!window.XLSX){alert("Librería Excel no disponible");return;}
  const invBySKU=data?.invBySKU||{};
  const ahora=new Date();
  const fechaStr=ahora.toLocaleDateString("es-CO")+" "+ahora.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  // Solo acciones reales (con gap)
  const acciones=sorted.filter(s=>gap(s)>0);
  // Orden de prioridad: MDE primero, luego por estado
  const ordEstado={ruptura:0,critico:1,preventivo:2,ok:3};
  const filas=acciones.map((s,i)=>{
    const g=gap(s);
    const cs=cantSug(s,bufH,bufF);
    const pos=invBySKU[s.id]||[];
    const altura=pos.filter(p=>p.nivel>=2&&p.saldo>0).sort((a,b)=>b.saldo-a.saldo);
    const mejorAlt=altura[0];
    const CALLE_N={B:"Calle1",C:"Calle2",D:"Calle3",E:"Calle4"};
    const ubiBajar=mejorAlt?`M${String(mejorAlt.modulo).padStart(2,"0")}-${mejorAlt.nivel}-${mejorAlt.pos} (${CALLE_N[mejorAlt.ubi?.[0]]||""})`:"SIN ALTURA";
    const cajasBajar=Math.ceil(g/9);
    return{
      prioridad:i+1,
      ciudad:s.ciudad==="MDE"?"📍 MDE 11AM":s.ciudad||"-",
      estado:({ruptura:"RUPTURA",critico:"CRÍTICO",preventivo:"PREVENTIVO",ok:"OK"})[estado(s)]||estado(s),
      sku:s.id,
      descripcion:s.label||"",
      abc:s.abc||"",
      stock_piso:s.stock_piso,
      comprometido:s.comp,
      gap:-g,
      reponer_u:cs,
      bajar_cajas:cajasBajar,
      bajar_unidades:cajasBajar*9,
      bajar_de:ubiBajar,
      stock_altura:mejorAlt?mejorAlt.saldo:0,
    };
  });
  // Construir hoja con encabezado
  const header=[
    ["PLAN DE ABASTECIMIENTO DEL TURNO — CEDI INDUCASOS"],
    ["Generado:",fechaStr,"","Total acciones:",acciones.length,"","Buffer:",bufH+"h × "+bufF+"x"],
    [""],
    ["#","Ciudad","Estado","SKU","Descripción","ABC","Stock Piso","Comprometido","Gap","Reponer (u)","Bajar (cajas)","Bajar (u)","Bajar de posición","Stock Altura"],
  ];
  const body=filas.map(f=>[f.prioridad,f.ciudad,f.estado,f.sku,f.descripcion,f.abc,f.stock_piso,f.comprometido,f.gap,f.reponer_u,f.bajar_cajas,f.bajar_unidades,f.bajar_de,f.stock_altura]);
  const aoa=[...header,...body];
  const ws=window.XLSX.utils.aoa_to_sheet(aoa);
  // Anchos de columna
  ws["!cols"]=[{wch:4},{wch:12},{wch:12},{wch:10},{wch:42},{wch:5},{wch:10},{wch:13},{wch:8},{wch:11},{wch:12},{wch:9},{wch:24},{wch:12}];
  // Merge título
  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:13}}];
  const wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,"Plan Turno");
  window.XLSX.writeFile(wb,`plan_turno_cedi_${ahora.toISOString().slice(0,10)}_${String(ahora.getHours()).padStart(2,"0")}${String(ahora.getMinutes()).padStart(2,"0")}.xlsx`);
}

  const [pedSearch,setPedSearch]=useState(""); // pipeline: búsqueda cliente/ref/ciudad

  const [trendGran,setTrendGran]=useState("dia"); // tendencias: dia|semana|mes
  const [trendFam,setTrendFam]=useState("total"); // tendencias: total|familia
  const [trendDesde,setTrendDesde]=useState(""); // rango fecha desde
  const [trendHasta,setTrendHasta]=useState(""); // rango fecha hasta
  const [trendHover,setTrendHover]=useState(null); // tendencias: punto activo tooltip

  // [FIX] activate: leer workbooks y pasar directamente a processFiles
  const activate=useCallback(async()=>{
    if(!invFile||!factFile)return;
    setLoadErr("");setPhase("loading");await tick();
    try{
      const readWb=f=>new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true}));

      const result=await processFiles(wbInv,wbFact,s=>{setLoadStep(s);});
      setData(result);setPhase("ready");
    }catch(e){
      setLoadErr(e.message||"Error desconocido al procesar los archivos.");
      setPhase("upload");
    }
  },[invFile,factFile]);

  const SKUS=data?.SKUS||[];
  const sorted=useMemo(()=>[...SKUS].sort((a,b)=>score(b)-score(a)),[SKUS]);
  const conGap=useMemo(()=>SKUS.filter(s=>gap(s)>0),[SKUS]);
  const enRup=useMemo(()=>SKUS.filter(s=>estado(s)==="ruptura"),[SKUS]);
  // C1: sin prioridad MDE — todas las ciudades igual
  const palletsSugeridos=data?.palletsSugeridos||[];
  const invBySKU=data?.invBySKU||{};        // B3
  const allItemsData=data?.allItems||[];    // B3
  // Mapeo calles dashboard → letra WMS
  const DASH_TO_LETRA={C1:"B",C2:"C",C3:"D",C4:"E"};
  const invByModule=data?.invByModule||{};

  const calles=useMemo(()=>["C1","C2","C3","C4"].map(c=>{
    const letra=DASH_TO_LETRA[c];
    const mods=Array.from({length:42},(_,i)=>{
      const n=i+1;
      const modKey=`${letra}${String(n).padStart(2,"0")}`;

      const totalStock=rows.reduce((t,r)=>t+r.saldo,0);
      const totalComp=rows.reduce((t,r)=>t+(r.comp||0),0);
      const g=Math.max(0,totalComp-totalStock);

              const area=`${path} L ${pts[pts.length-1].x.toFixed(1)} ${H-pad} L ${pts[0].x.toFixed(1)} ${H-pad} Z`;

                          <button key={k} onClick={()=>setTrendGran(k)} style={{padding:"4px 9px",borderRadius:5,background:trendGran===k?C.teal:"transparent",color:trendGran===k?C.bg0:C.t3,border:"none",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>

                  </div>

                  {(()=>{

                        onTouchMove={e=>{const t=e.touches[0];const r=e.currentTarget.getBoundingClientRect();const sx=(t.clientX-r.left)*(W/r.width);let best=0,bd=1e9;pts.forEach((p,i)=>{const d=Math.abs(p.x-sx);if(d<bd){bd=d;best=i;}});setTrendHover(best);}}

                          {/* clip sobre y bajo promedio */}
                          <clipPath id="clipHi"><rect x="0" y="0" width={W} height={yProm}/></clipPath>
                          <clipPath id="clipLo"><rect x="0" y={yProm} width={W} height={H-yProm}/></clipPath>
                        </defs>
                        {/* Grid */}
                        {[0,0.25,0.5,0.75,1].map(f=>{const y=H-pad-(f*(H-pad*2));return(<line key={f} x1={pad} y1={y} x2={W-pad} y2={y} stroke={C.b0} strokeWidth={1}/>);})}

                        </div>
                      )}
                    </div>
                    );
                  })()}
                </div>

            })()}

                <thead><tr>{["#","Referencia","Descripción","Familia","Stock Piso","Comprometido","Gap","Días Cob.","Estado Op."].map(h=><TH key={h}>{h}</TH>)}</tr></thead>
                <tbody>
                  {(data?.allItems||[]).slice(0,60).map((s,i)=>{
                    const g=Math.max(0,s.comp-s.stock);

                        {l:"Vacíos",             v:calle.vacios,                          c:C.t3},
                        {l:"Con gap",            v:calle.conGap,                          c:calle.conGap>0?C.red:C.green},
                      ].map(m=>(
                        <div key={m.l} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5}}>
                          <span style={{color:C.t3}}>{m.l}</span>
                          <span style={{color:m.c,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{m.v}</span>
                        </div>
                      ))}
                      <div style={{marginTop:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.t3,marginBottom:3}}>
                          <span>% mezcla</span>
                          <span style={{color:pctMezcla>80?C.red:C.orange,fontWeight:700}}>{pctMezcla}%</span>
                        </div>
                        <div style={{height:4,background:C.b0,borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${pctMezcla}%`,height:"100%",background:pctMezcla>80?C.red:C.orange}}/>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Sec>

          </div>
        )}
      </div>
    </div>
  );
}
