<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>INDUCASOS · Dashboard Inteligente de Abastecimiento v6</title>
  <meta name="description" content="Centro de Control CEDI — Solo Cascos"/>
  <!-- PWA: instalable como app "CEDI" -->
  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#070b14"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CEDI"/>
  <link rel="apple-touch-icon" href="./icon-cedi-192.png"/>
  <link rel="icon" type="image/png" href="./icon-cedi-192.png"/>

  <!-- Favicon SVG inline -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23040c17'/><rect x='7' y='8' width='18' height='16' rx='3' fill='none' stroke='%2338bdf8' stroke-width='2'/><line x1='7' y1='14' x2='25' y2='14' stroke='%2338bdf8' stroke-width='1.5'/></svg>"/>

  <!-- React 18 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone (transpila JSX en el navegador) -->

  <!-- SheetJS (XLSX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin></script>
  <!-- ExcelJS: export con formato (colores, bordes, merges) para el Excel de Reposición -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js" crossorigin></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #040c17; max-width: 100%; }
    #root { min-height: 100vh; max-width: 100vw; }
    /* Loading screen mientras Babel transpila */
    #loading-screen {
      position: fixed; inset: 0;
      background: #040c17;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      font-family: 'JetBrains Mono', monospace;
      color: #4a6380; font-size: 13px;
    }
    #loading-screen .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #152236;
      border-top-color: #38bdf8;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Google Fonts preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <!-- Loading screen visible mientras carga -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div>Iniciando Dashboard CEDI...</div>
    <div id="loading-msg" style="font-size:10px;color:#253045">Cargando dependencias</div>
  </div>
  <script>
    // Si después de 6 s el dashboard no montó → probablemente Babel sigue compilando
    setTimeout(function(){
      var el=document.getElementById('loading-msg');
      var root=document.getElementById('root');
      if(el&&(!root||!root.firstChild)){
        el.textContent='Compilando interfaz (primera carga puede tardar ~20 s en móvil)…';
        el.style.color='#38bdf8';
      }
    },6000);
    // Si a los 35 s todavía no cargó, mostrar botón de recarga
    setTimeout(function(){
      var ls=document.getElementById('loading-screen');
      var root=document.getElementById('root');
      if(ls&&ls.style.display!=='none'&&(!root||!root.firstChild)){
        var btn=document.createElement('button');
        btn.textContent='Recargar página';
        btn.style.cssText='margin-top:12px;padding:10px 22px;background:#38bdf8;color:#040c17;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit';
        btn.onclick=function(){location.reload(true);};
        ls.appendChild(btn);
      }
    },35000);
  </script>

  <div id="root"></div>

  <script src="./shared/config.js"></script>
  <script src="./index.app.js"></script>
  <script>
    // Registrar service worker para habilitar la PWA (instalable como app "CEDI")
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
    }
  </script>

  <!-- ════════════ SEGURIDAD ════════════ -->
  <div id="sec-overlay" style="display:none;position:fixed;inset:0;z-index:2147483647;background:rgba(4,12,23,0.98);flex-direction:column;align-items:center;justify-content:center;gap:18px;font-family:'JetBrains Mono',monospace;text-align:center;padding:32px;">
    <div style="font-size:52px;">🔒</div>
    <div style="font-size:17px;font-weight:700;color:#38bdf8;letter-spacing:1px;">ACCESO RESTRINGIDO</div>
    <div style="font-size:12px;color:#4a6380;max-width:340px;line-height:1.7;">Esta plataforma es propiedad exclusiva de <span style="color:#38bdf8;font-weight:700;">INDUCASOS</span>.<br>El acceso no autorizado a su código fuente o estructura interna está prohibido.<br><br>Cierra las herramientas de desarrollador para continuar.</div>
  </div>
  <script>
  (function(){
    var ov=document.getElementById('sec-overlay');
    var _dt=false;

    // 1 · Bloquear clic derecho (impide "Inspeccionar" e "Ver código fuente")
    document.addEventListener('contextmenu',function(e){e.preventDefault();},true);

    // 2 · Bloquear atajos de teclado que exponen el código
    document.addEventListener('keydown',function(e){
      var c=e.ctrlKey||e.metaKey, s=e.shiftKey, k=(e.key||'').toLowerCase();
      // F12 → DevTools
      if(e.key==='F12'){e.preventDefault();e.stopImmediatePropagation();return false;}
      // Ctrl+Shift+I / J / C / K → DevTools / Consola / Inspector
      if(c&&s&&['i','j','c','k'].includes(k)){e.preventDefault();e.stopImmediatePropagation();return false;}
      // Ctrl+U → Ver código fuente
      if(c&&k==='u'){e.preventDefault();e.stopImmediatePropagation();return false;}
      // Ctrl+S → Guardar página (descarga el HTML)
      if(c&&k==='s'){e.preventDefault();e.stopImmediatePropagation();return false;}
      // Ctrl+P → Imprimir (puede revelar contenido)
      if(c&&k==='p'){e.preventDefault();e.stopImmediatePropagation();return false;}
    },true);

    // 3 · Bloquear arrastrar texto o elementos (drag-to-copy)
    document.addEventListener('dragstart',function(e){e.preventDefault();},true);

    // 4 · Detectar DevTools por diferencia de ANCHO (solo escritorio, lado/derecho)
    // NO se usa la altura: en móvil el teclado virtual agranda la diferencia y da falsos positivos
    var _isMob=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    if(!_isMob){
      setInterval(function(){
        var dw=window.outerWidth-window.innerWidth>160;
        if(dw&&!_dt){_dt=true;if(ov)ov.style.display='flex';}
        else if(!dw&&_dt){_dt=false;if(ov)ov.style.display='none';}
      },700);
    }
  })();
  </script>
  <!-- ═══════════════════════════════════ -->
</body></html>
