// ═══════════ SUPABASE (cliente REST sin dependencias externas) ═══════════
const SUPA_URL = "https://rfysmwpdzlxmadobdvzh.supabase.co";
const SUPA_KEY = "sb_publishable_LHZWmeFFmnua2j3y8dqqdw_rx0u3vad";
const _H = { apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, "Content-Type":"application/json" };
const _go = async (url, opts={}) => {
  for(let i=0;i<3;i++){
    try{
      const res=await fetch(url,{headers:_H,...opts});
      if(res.ok){const t=await res.text();return{data:t?JSON.parse(t):null,error:null};}
      if([400,403,404,409].includes(res.status)){const t=await res.text();return{data:null,error:{status:res.status,message:t}};}
      if(i<2)await new Promise(ok=>setTimeout(ok,(i+1)*2000));
      else{const t=await res.text();return{data:null,error:{status:res.status,message:t}};}
    }catch(err){
      if(i<2)await new Promise(ok=>setTimeout(ok,(i+1)*2000));
      else return{data:null,error:err};
    }
  }
};
const sb = {
  from: (table) => {
    const base = `${SUPA_URL}/rest/v1/${table}`;
    return {
      select: (cols="*") => ({
        eq: (col,val) => _go(`${base}?${col}=eq.${encodeURIComponent(val)}&select=${cols}`)
      }),
      insert: (body) => _go(base, {method:"POST", headers:{..._H,Prefer:"return=minimal"}, body:JSON.stringify(body)}),
      upsert:  (body) => _go(base, {method:"POST", headers:{..._H,Prefer:"resolution=merge-duplicates,return=minimal"}, body:JSON.stringify(body)}),
    };
  },
  channel: () => ({on:()=>({subscribe:()=>({})})}),
  removeChannel: ()=>{},
};

const C={
  bg0:"#070b14",bg1:"#0d1320",bg2:"#131b2e",bg3:"#1a2438",
  b0:"#1f2b42",b1:"#2a3854",
  t1:"#e8edf5",t2:"#a8b5cc",t3:"#6b7a96",t4:"#46546e",
  teal:"#2dd4bf",accent:"#3b82f6",green:"#22c55e",yellow:"#eab308",
  orange:"#f97316",red:"#ef4444",purple:"#a855f7",
};

// ═══════════ HELPERS (misma lógica que el master) ═══════════
const CAJA=9;
const toNum=v=>{const n=parseFloat(String(v).replace(/[^0-9.-]/g,""));return isNaN(n)?0:n;};
const CALLE_MAP={B:"C1",C:"C2",D:"C3",E:"C4"};
const CALLE_NOM={B:"Calle 1",C:"Calle 2",D:"Calle 3",E:"Calle 4"};
const TOPE_PISO=27; // máx 3 cajas del mismo SKU desde piso
const parseUbi=u=>{
  const m=/^([B-E])0?(\d{1,2})(\d)(\d)$/.exec(String(u).trim());
  if(!m)return null;
  return{calleKey:CALLE_MAP[m[1]],calleLetra:m[1],modulo:parseInt(m[2]),nivel:parseInt(m[3]),pos:parseInt(m[4])};
};
const esEXPO=d=>(d||"").toUpperCase().includes("EXPO");
const marcaDe=desc=>{const p=String(desc||"").trim().split(/\s+/);return p.length>=3?p[2].toUpperCase():"";};
const familia=d=>{const u=(d||"").toUpperCase();if(/\bT[- ]?10\b/.test(u))return "T-10";const m=u.match(/ICH[- ]?([0-9]{2,4})/);return m?m[1]:"OTRO";};
const esMDE=ciudad=>{const x=String(ciudad||"").toUpperCase().trim();return x==="MDE"||x.includes("MEDELL")||x==="ITAGUI"||x==="ITAGÜI"||x.includes("ITAGU");};
const tieneNota=n=>String(n||"").trim().length>0;

// ═══════════ PROCESAR DATOS (lógica idéntica al master) ═══════════
function procesar(wbInv,wbFact){
  const MARCAS=["ICH"];
  const toNum=v=>{const n=parseFloat(String(v).replace(/[^0-9.-]/g,""));return isNaN(n)?0:n;};


  // ── INVENTARIO ──
  const invSheet=wbInv.Sheets[wbInv.SheetNames[0]];
  const invRows=XLSX.utils.sheet_to_json(invSheet,{range:5,defval:""});
  const invCasco=invRows.filter(r=>{
    const linea=String(r["Linea"]||"").trim();
    const desc=String(r["Descripcion"]||"");
    return linea==="CASCO"&&!esEXPO(desc)&&MARCAS.includes(marcaDe(desc));
  });
  if(invCasco.length===0)throw new Error("No se encontraron SKUs CASCO ICH en el inventario.");

  const stockMap={};
  const invBySKU={};
  for(const r of invCasco){
    const ref=String(r["Referencia"]||"").trim();
    const desc=String(r["Descripcion"]||"").trim();
    const saldo=toNum(r["saldo"]);
    const ubi=String(r["ubicacion"]||"").trim();
    const cajap=String(r["cajap"]||"").trim();
    if(!ref)continue;
    const p=parseUbi(ubi);
    if(!stockMap[ref])stockMap[ref]={ref,desc,stock:0,stockAlt:0,stockTotal:0};
    stockMap[ref].stockTotal+=saldo;
    if(p&&p.nivel<=1) stockMap[ref].stock+=saldo;
    else              stockMap[ref].stockAlt+=saldo;
    if(p&&saldo>0){
      if(!invBySKU[ref])invBySKU[ref]=[];
      invBySKU[ref].push({ubi,saldo,nivel:p.nivel,pos:p.pos,calleLetra:p.calleLetra,modulo:p.modulo,cajap});
    }
  }
  const cascoRefs=new Set(Object.keys(stockMap));

  // Índice cajap → refs que lo contienen (para detectar multiproducto)
  const cajapRefs={};
  for(const [ref,posArr] of Object.entries(invBySKU)){
    for(const p of posArr){
      if(p.cajap){
        if(!cajapRefs[p.cajap])cajapRefs[p.cajap]=new Set();
        cajapRefs[p.cajap].add(ref);
      }
    }
  }
  const multiMap={};
  Object.keys(cajapRefs).forEach(k=>{if(cajapRefs[k].size>1)multiMap[k]=true;});

  // ── PEDIDOS — solo ITAGUÍ (lógica idéntica al master) ──
  const ws=wbFact.Sheets["ITAGUÍ"];
  if(!ws)throw new Error("No se encontró la hoja ITAGUÍ en la bandeja de pedidos.");
  const allWmsRows=XLSX.utils.sheet_to_json(ws,{range:5,defval:""});
  if(allWmsRows.length===0)throw new Error("La hoja ITAGUÍ está vacía.");

  const pedidosRaw={};
  for(const r of allWmsRows){
    const ref=String(r["referencia"]||"").trim();
    const cant=toNum(r["cantidad"]);
    const nota=r["notas"];
    const ciudad=String(r["ciudad"]||"").trim();
    const estado_val=String(r["Estado"]||"").trim();
    const picking=String(r["Picking"]||r["PedidoSiesa"]||"").trim();
    const cliente=String(r["NOMBRECLIENTE"]||"").trim();
    const pedidoSiesa=String(r["PedidoSiesa"]||"").trim();
    const fecha=r["F_pedido"]?String(r["F_pedido"]).slice(0,10):"";
    const desc=String(r["descripcion"]||"").trim();
    const tipoDocto=String(r["TipoDocto"]||"").trim().toUpperCase();
    // Mismo filtro que el master: solo refs que están en cascoRefs
    if(!ref||cant===0)continue;
    if(!pedidosRaw[picking]){
      pedidosRaw[picking]={
        id:picking,
        pedidoSiesa,
        est:estado_val==="5"?"planeado":estado_val==="3"?"en_picking":"sin_planear",
        cliente,ciudad,fecha,
        nota:tieneNota(nota),
        tipoDocto,
        rows:[],
      };
    }
    pedidosRaw[picking].rows.push({ref,desc,cant,nota:tieneNota(nota)});
  }

  // ── Construir pedidosActivos con cobertura (idéntico al master) ──
  const TOPE_PISO=27;
  const pedidosActivos=Object.values(pedidosRaw).map(p=>{
    const refs=p.rows.map(row=>{
      const pos=invBySKU[row.ref]||[];
      const stockPiso=pos.filter(x=>x.nivel<=1).reduce((t,x)=>t+x.saldo,0);
      const stockAlt =pos.filter(x=>x.nivel>=2).reduce((t,x)=>t+x.saldo,0);
      const limitePiso=Math.min(stockPiso,TOPE_PISO);
      const cubPiso=Math.min(limitePiso,row.cant);
      const restoTrasPiso=row.cant-cubPiso;
      const cubAlt=Math.min(stockAlt,restoTrasPiso);
      const hasPiso=cubPiso>=row.cant;
      const hasPisoParcial=cubPiso>0;
      const hasAlt=stockAlt>0;
      const sinStock=stockPiso===0&&stockAlt===0;
      return{...row,stockPiso,stockAlt,cubPiso,cubAlt,restoTrasPiso,hasPiso,hasPisoParcial,hasAlt,sinStock};
    });
    const lineas=refs.length;
    const uni=refs.reduce((t,r)=>t+r.cant,0);
    const uniPiso=refs.reduce((t,r)=>t+r.cubPiso,0);
    const uniAlt=refs.reduce((t,r)=>t+r.cubAlt,0);
    const pctPiso=uni>0?Math.round((uniPiso/uni)*100):0;
    const pctAlt=uni>0?Math.round((uniAlt/uni)*100):0;
    let clasificacion="ruptura";
    if(pctPiso===100)clasificacion="despachable";
    else if(pctPiso>=40)clasificacion="parcial";
    else if(uniAlt>0)clasificacion="reabasto";
    return{
      picking:p.id,
      pedSiesa:p.pedidoSiesa||"",
      cliente:p.cliente,
      ciudad:p.ciudad,
      estado:p.est,
      nota:p.nota,
      fecha:p.fecha,
      refs,
      nLineas:lineas,
      uni,uniPiso,uniAlt,pctPiso,pctAlt,
      clasif:clasificacion,
    };
  }).sort((a,b)=>{
    const aMDE=esMDE(a.ciudad)?1:0,bMDE=esMDE(b.ciudad)?1:0;
    if(aMDE!==bMDE)return bMDE-aMDE;
    const ord={sin_planear:0,planeado:1,en_picking:2};
    return(ord[a.estado]||0)-(ord[b.estado]||0)||b.uni-a.uni;
  });

  return{invBySKU,stockMap,pedidos:pedidosActivos,multiMap};
}

// ═══════════ RECORRIDO (Opción B: por calle ascendente) ═══════════
// Ordena posiciones por calle (B,C,D,E) → módulo ascendente → nivel
function ordenarRecorrido(posiciones){
  const ordenCalle={B:1,C:2,D:3,E:4};
  return [...posiciones].sort((a,b)=>
    (ordenCalle[a.calleLetra]||9)-(ordenCalle[b.calleLetra]||9)||
    (a.modulo||0)-(b.modulo||0)||
    (a.nivel||0)-(b.nivel||0)
  );
}

// ═══════════ LOGIN ═══════════
function LoginForm({onLogin}){
  const [nombre,setNombre]=useState("");
  const [cargando,setCargando]=useState(false);
  const submit=async()=>{
    const n=nombre.trim();
    if(!n||cargando)return;
    setCargando(true);
    await onLogin(n);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",padding:24,background:C.bg0}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#3b82f6,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px"}}>📦</div>
          <div style={{fontWeight:800,fontSize:22,letterSpacing:0.5,color:C.t1}}>INDUCASOS</div>
          <div style={{color:C.t3,fontSize:12,marginTop:4}}>Picking Móvil · CEDI ITAGUÍ</div>
        </div>
        <div style={{background:C.bg2,borderRadius:16,padding:24,border:`1px solid ${C.b0}`}}>
          <div style={{color:C.t2,fontSize:13,fontWeight:700,marginBottom:14}}>¿Cómo te llamas?</div>
          <input
            value={nombre}
            onChange={e=>setNombre(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="Tu nombre..."
            autoFocus
            style={{width:"100%",background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:10,padding:"12px 14px",fontSize:15,color:C.t1,outline:"none",marginBottom:14}}
          />
          <button
            onClick={submit}
            disabled={!nombre.trim()||cargando}
            style={{width:"100%",padding:"13px",background:nombre.trim()?`linear-gradient(135deg,#3b82f6,#2dd4bf)`:C.bg3,border:"none",borderRadius:10,color:nombre.trim()?C.bg0:C.t4,fontWeight:800,fontSize:14,cursor:nombre.trim()?"pointer":"not-allowed",transition:"all .2s"}}
          >
            {cargando?"Cargando datos...":"Entrar al picking →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════ COMPONENTE PRINCIPAL ═══════════
function PickingApp(){
  const [phase,setPhase]=useState("login"); // login | loading | ready | error
  const [operario,setOperario]=useState(null);
  const [asignaciones,setAsignaciones]=useState({}); // {picking:{operario,estado}}
  const [turnosEnviados,setTurnosEnviados]=useState({}); // {picking:true}
  const [err,setErr]=useState("");
  const [data,setData]=useState(null);
  const [busca,setBusca]=useState("");
  const [sel,setSel]=useState(null); // pedido seleccionado
  const [modo,setModo]=useState("piso"); // piso | altura (en el detalle)
  const [skuAbierto,setSkuAbierto]=useState({}); // SKUs expandidos para ver ubicaciones
  const [skuDetAbierto,setSkuDetAbierto]=useState({}); // SKUs expandidos en tab SKUs
  const [hechos,setHechos]=useState({}); // paradas completadas

  const cargar=useCallback(async()=>{
    setPhase("loading");setErr("");
    try{
      const fetchWb=async(url)=>{
        const r=await fetch(url,{cache:"reload"});
        if(!r.ok)throw new Error(`${url} → HTTP ${r.status}`);
        const buf=await r.arrayBuffer();
        if(buf.byteLength<100)throw new Error(`${url} llegó vacío`);
        return XLSX.read(new Uint8Array(buf),{type:"array",cellDates:true});
      };
      const [wbInv,wbFact]=await Promise.all([fetchWb("./Inventario.xlsx"),fetchWb("./Bandejadeplaneacion.xlsx")]);
      setData(procesar(wbInv,wbFact));
      setPhase("ready");
    }catch(e){setErr(e.message);setPhase("error");}
  },[]);

  useEffect(()=>{if(operario)cargar();},[cargar,operario]);

  // ── Supabase: asignaciones en tiempo real ──
  useEffect(()=>{
    if(!sb||!operario)return;
    const refrescar=async()=>{
      const{data:rows}=await sb.from("asignaciones").select("picking,operario,estado").eq("estado","en_proceso");
      if(rows){const m={};rows.forEach(r=>{m[r.picking]=r;});setAsignaciones(m);}
    };
    refrescar();
    const ch=sb.channel("asig-pipe").on("postgres_changes",{event:"*",schema:"public",table:"asignaciones"},refrescar).subscribe();
    return()=>sb.removeChannel(ch);
  },[operario]);

  // Búsqueda de pedido por picking o pedidoSiesa
  const resultados=useMemo(()=>{
    if(!data)return [];
    const q=busca.trim().toLowerCase();
    if(!q)return [];
    return data.pedidos.filter(p=>{
      const pick=String(p.picking||"").toLowerCase();
      const siesa=String(p.pedSiesa||"").toLowerCase();
      const cli=String(p.cliente||"").toLowerCase();
      return pick.includes(q)||siesa.includes(q)||cli.includes(q);
    });
  },[data,busca]);

  // Búsqueda de SKUs
  const [buscaSKU,setBuscaSKU]=useState("");
  const [tab,setTab]=useState("pedidos"); // pedidos | skus | viajes
  const [filtroClasif,setFiltroClasif]=useState(""); // "" | despachable | parcial | reabasto | ruptura

  // ── Plan Global de Viajes (Regla 1: cross-pedido) ──────────────────────────
  const planGlobal=useMemo(()=>{
    if(!data)return[];
    const needs=[];
    data.pedidos.forEach(ped=>{
      ped.refs.forEach(r=>{
        const falta=Math.max(0,r.cant-r.cubPiso);
        if(falta<=0)return;
        const altPos=(data.invBySKU[r.ref]||[]).filter(p=>p.nivel>=2&&p.saldo>0);
        if(!altPos.length)return;
        // Regla 2: preferir posición que cubre todo; Regla 3: mayor saldo
        const mejor=[...altPos].sort((a,b)=>{
          const ac=a.saldo>=falta?1:0,bc=b.saldo>=falta?1:0;
          return bc-ac||b.saldo-a.saldo;
        })[0];
        needs.push({
          ref:r.ref,desc:r.desc,pide:falta,
          cubre:Math.min(mejor.saldo,falta),
          falta:Math.max(0,falta-mejor.saldo),
          picking:ped.picking,pedSiesa:ped.pedSiesa,
          cliente:ped.cliente,clasif:ped.clasif,
          ubi:mejor.ubi,saldo:mejor.saldo,
          calleLetra:mejor.calleLetra,modulo:mejor.modulo,nivel:mejor.nivel,
        });
      });
    });
    // Regla 1: agrupar por UBI → un viaje por posición para TODOS los pedidos
    const map={};
    needs.forEach(n=>{
      if(!map[n.ubi])map[n.ubi]={ubi:n.ubi,calleLetra:n.calleLetra,modulo:n.modulo,nivel:n.nivel,pedidos:new Set(),items:[]};
      map[n.ubi].items.push(n);
      map[n.ubi].pedidos.add(n.picking);
    });
    return Object.values(map)
      .map(v=>({...v,nPedidos:v.pedidos.size}))
      .sort((a,b)=>b.nPedidos-a.nPedidos||b.items.length-a.items.length);
  },[data]);

  const resultadosSKU=useMemo(()=>{
    if(!data)return [];
    const q=buscaSKU.trim().toLowerCase();
    if(!q||q.length<2)return [];
    const refs=Object.keys(data.invBySKU);
    return refs.filter(ref=>{
      const sm=data.stockMap[ref];
      return ref.toLowerCase().includes(q)||(sm&&sm.desc.toLowerCase().includes(q));
    }).map(ref=>{
      const sm=data.stockMap[ref]||{stock:0,stockAlt:0,desc:""};
      const allPos=data.invBySKU[ref]||[];
      // Agrupar cajas por posición (ubi)
      const gruposPiso={};const gruposAlt={};
      for(const p of allPos){
        const g=p.nivel<=1?gruposPiso:gruposAlt;
        if(!g[p.ubi])g[p.ubi]={ubi:p.ubi,calleLetra:p.calleLetra,modulo:p.modulo,nivel:p.nivel,pos:p.pos,totalSaldo:0,cajas:[],esMulti:false};
        g[p.ubi].totalSaldo+=p.saldo;
        if(p.cajap)g[p.ubi].cajas.push({cajap:p.cajap,saldo:p.saldo,isMulti:!!data.multiMap[p.cajap]});
      }
      // Detectar MULTI por posición: altura con más de 1 SKU diferente se marca en procesar
      const pisoGrupos=ordenarRecorrido(Object.values(gruposPiso));
      const altGrupos=ordenarRecorrido(Object.values(gruposAlt));
      const posiciones=[...pisoGrupos,...altGrupos];
      // Comprometido: buscar en todos los pedidos
      let comprometido=0;
      const pedidosConRef=[];
      data.pedidos.forEach(p=>{
        const linea=p.refs.find(r=>r.ref===ref);
        if(linea){
          comprometido+=linea.cant;
          pedidosConRef.push({picking:p.picking,cliente:p.cliente,cant:linea.cant,clasif:p.clasif});
        }
      });
      const libre=Math.max(0,Math.min(sm.stock,TOPE_PISO)-comprometido);
      const gap=Math.max(0,comprometido-Math.min(sm.stock,TOPE_PISO));
      return{ref,desc:sm.desc,stockPiso:sm.stock,stockAlt:sm.stockAlt,posiciones,comprometido,pedidosConRef,libre,gap};
    });
  },[data,buscaSKU]);

  const abrirPedido=async(ped)=>{
    setSel(ped);setModo("piso");setSkuAbierto({});setHechos({});
    if(!sb||!operario)return;
    const yaAsig=asignaciones[ped.picking];
    if(!yaAsig||yaAsig.operario===operario){
      sb.from("asignaciones").upsert(
        {picking:ped.picking,pedido_siesa:ped.pedSiesa||"",cliente:ped.cliente||"",ciudad:ped.ciudad||"",operario,estado:"en_proceso"},
        {onConflict:"picking"}
      ).catch(()=>{});
    }
  };

  const agendarTurno=async()=>{
    if(!sb||!operario||!sel)return;
    const posiciones=viajesAltura.map(v=>({
      ubi:v.ubi,calleLetra:v.calleLetra,modulo:v.modulo,nivel:v.nivel,
      skus:v.skus.map(s=>({ref:s.ref,desc:s.desc,cant:s.pide,saldo:s.disp})),
      totalSaldo:v.totalDisp
    }));
    const{error}=await sb.from("turnos").insert({
      picking:sel.picking,pedido_siesa:sel.pedSiesa||"",
      cliente:sel.cliente||"",ciudad:sel.ciudad||"",
      operario_solicitante:operario,posiciones,
      estado:"pendiente",
      fecha_solicitud:new Date().toISOString(),
      prioridad:esMDE(sel.ciudad)?"urgente":"normal",
      es_mde:!!esMDE(sel.ciudad)
    });
    if(!error)setTurnosEnviados(o=>({...o,[sel.picking]:true}));
  };

  const clasifCol={despachable:C.green,parcial:C.yellow,reabasto:C.orange,ruptura:C.red};
  const clasifLbl={despachable:"DESPACHABLE",parcial:"PARCIAL",reabasto:"REABASTO",ruptura:"RUPTURA"};

  // ───────── construir recorrido del pedido seleccionado ─────────
  const recorrido=useMemo(()=>{
    if(!sel||!data)return {piso:[],altura:[]};
    const paradasPiso=[],paradasAlt=[];
    sel.refs.forEach(r=>{
      const pos=data.invBySKU[r.ref]||[];
      // PISO: posiciones nivel 1, hasta cubrir cant (con tope piso)
      const piso=pos.filter(p=>p.nivel<=1&&p.saldo>0);
      const alt=pos.filter(p=>p.nivel>=2&&p.saldo>0);
      const pisoDisp=piso.reduce((t,p)=>t+p.saldo,0);
      const tomarPiso=Math.min(r.cant,pisoDisp,TOPE_PISO);
      if(tomarPiso>0&&piso.length){
        // agrupar por ubicación
        const grupos={};
        piso.forEach(p=>{if(!grupos[p.ubi])grupos[p.ubi]={...p,saldo:0,cajas:[]};grupos[p.ubi].saldo+=p.saldo;if(p.cajap)grupos[p.ubi].cajas.push({cajap:p.cajap,saldo:p.saldo});});
        Object.values(grupos).forEach(g=>paradasPiso.push({...g,ref:r.ref,desc:r.desc,cant:r.cant,tipo:"piso"}));
      }
      // ALTURA: si el piso no alcanza
      const faltaTrasPiso=Math.max(0,r.cant-tomarPiso);
      if(faltaTrasPiso>0&&alt.length){
        const grupos={};
        alt.forEach(p=>{if(!grupos[p.ubi])grupos[p.ubi]={...p,saldo:0,cajas:[]};grupos[p.ubi].saldo+=p.saldo;if(p.cajap)grupos[p.ubi].cajas.push({cajap:p.cajap,saldo:p.saldo});});
        Object.values(grupos).forEach(g=>paradasAlt.push({...g,ref:r.ref,desc:r.desc,cant:r.cant,falta:faltaTrasPiso,tipo:"altura"}));
      }
    });
    return {piso:ordenarRecorrido(paradasPiso),altura:ordenarRecorrido(paradasAlt)};
  },[sel,data]);

  // ── Plan de Viajes altura: cada SKU asignado a UNA sola posición (la mejor) ──
  const viajesAltura=useMemo(()=>{
    if(!recorrido.altura.length)return[];

    // 1. Agrupar entradas de altura por SKU (un SKU puede tener stock en varias UBIs)
    const porSKU={};
    recorrido.altura.forEach(p=>{
      if(!porSKU[p.ref])porSKU[p.ref]=[];
      porSKU[p.ref].push(p);
    });

    // 2. Para cada SKU elegir la MEJOR posición única:
    //    - Primero las que cubren todo lo necesario (saldo >= pide)
    //    - Entre iguales, la de mayor saldo
    const asigs=[];
    Object.entries(porSKU).forEach(([ref,posArr])=>{
      const pide=posArr[0].falta||posArr[0].cant;
      const mejor=[...posArr].sort((a,b)=>{
        const ac=a.saldo>=pide?1:0, bc=b.saldo>=pide?1:0;
        return bc-ac||b.saldo-a.saldo;
      })[0];
      const cubre=Math.min(mejor.saldo,pide);
      asigs.push({
        ubi:mejor.ubi,calleLetra:mejor.calleLetra,modulo:mejor.modulo,nivel:mejor.nivel,
        ref,desc:mejor.desc,pide,disp:mejor.saldo,cubre,
        falta:Math.max(0,pide-mejor.saldo),cajas:mejor.cajas||[]
      });
    });

    // 3. Agrupar asigs por UBI → un viaje por posición
    const map={};
    asigs.forEach(a=>{
      if(!map[a.ubi])map[a.ubi]={ubi:a.ubi,calleLetra:a.calleLetra,modulo:a.modulo,nivel:a.nivel,skus:[],totalDisp:0};
      map[a.ubi].skus.push({ref:a.ref,desc:a.desc,pide:a.pide,disp:a.disp,cubre:a.cubre,falta:a.falta,cajas:a.cajas});
      map[a.ubi].totalDisp+=a.disp;
    });

    // 4. Ordenar: más SKUs por viaje primero → maximiza eficiencia por parada
    return Object.values(map).sort((a,b)=>b.skus.length-a.skus.length||b.totalDisp-a.totalDisp);
  },[recorrido.altura]);

  // Detectar si ya se recogió todo el piso (para prompt auto-agendar)
  const pisoTerminado=recorrido.piso.length>0&&recorrido.piso.every((_,i)=>hechos[`piso-${i}`]);

  // ═══════════ PANTALLAS ═══════════
  if(phase==="login")return(
    <LoginForm onLogin={async(nombre)=>{
      setOperario(nombre);
      if(sb){try{await sb.from("usuarios").insert({nombre,rol:"operario",activo:true,fecha_login:new Date().toISOString()});}catch(e){}}
      setPhase("loading");
    }}/>
  );

  if(phase==="loading")return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{width:40,height:40,border:`3px solid ${C.b1}`,borderTopColor:C.teal,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{color:C.t3,fontSize:13}}>Conectando con el repositorio...</div>
    </div>
  );

  if(phase==="error")return(
    <div style={{padding:24,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:14,textAlign:"center"}}>
      <div style={{fontSize:32}}>⚠️</div>
      <div style={{color:C.red,fontWeight:700,fontSize:15}}>No se pudo cargar</div>
      <div style={{color:C.t3,fontSize:12,fontFamily:"monospace",maxWidth:340}}>{err}</div>
      <button onClick={cargar} style={{marginTop:8,padding:"10px 22px",background:C.teal,border:"none",borderRadius:9,color:C.bg0,fontWeight:700,fontSize:14}}>↻ Reintentar</button>
    </div>
  );

  // ─── DETALLE DEL PEDIDO ───
  if(sel){
    return(
      <div style={{minHeight:"100vh",paddingBottom:30}}>
        {/* Header pedido */}
        <div style={{position:"sticky",top:0,zIndex:10,background:C.bg1,borderBottom:`1px solid ${C.b0}`,padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <button onClick={()=>{setSel(null);setSkuAbierto({});setHechos({});}} style={{background:C.bg3,border:`1px solid ${C.b0}`,color:C.t2,borderRadius:8,width:34,height:34,fontSize:18,flexShrink:0}}>‹</button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span className="mono" style={{color:C.teal,fontWeight:800,fontSize:16}}>{sel.picking}</span>
                <span style={{background:`${clasifCol[sel.clasif]}20`,color:clasifCol[sel.clasif],borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>{clasifLbl[sel.clasif]}</span>
              </div>
              <div style={{color:C.t2,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sel.cliente}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:14,fontSize:11,color:C.t3}}>
            <span>📍 {sel.ciudad}</span>
            <span>📋 {sel.nLineas} líneas</span>
            <span className="mono" style={{color:C.yellow}}>{sel.uni}u</span>
            {sel.pedSiesa&&<span>#{sel.pedSiesa}</span>}
            {tieneNota(sel.nota)?<span style={{color:C.orange}}>⚠ con nota</span>:<span style={{color:C.green}}>sin nota</span>}
          </div>
        </div>

        {/* ── Botón Agendar Turno (visible siempre que haya altura) ── */}
        {recorrido.altura.length>0&&operario&&(
          turnosEnviados[sel.picking]
            ?<div style={{margin:"8px 14px 4px",padding:"10px 14px",background:`${C.green}12`,border:`1px solid ${C.green}30`,borderRadius:11,display:"flex",alignItems:"center",gap:10}}>
               <span style={{fontSize:18}}>✅</span>
               <div>
                 <div style={{color:C.green,fontWeight:700,fontSize:12}}>Turno agendado</div>
                 <div style={{color:C.t3,fontSize:10}}>El montacarguista ya lo ve en su cola</div>
               </div>
             </div>
            :<div style={{padding:"8px 14px 4px"}}>
               {/* #2 Banner auto-prompt cuando piso terminado */}
               {pisoTerminado&&<div style={{background:`${C.purple}18`,border:`1px solid ${C.purple}40`,borderRadius:9,padding:"7px 12px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                 <span style={{fontSize:14}}>🎯</span>
                 <span style={{color:C.purple,fontSize:11,fontWeight:700}}>¡Piso completo! Agenda el viaje de altura.</span>
               </div>}
               <button onClick={agendarTurno} className={pisoTerminado?"btn-pulse":""} style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${C.purple},${C.accent})`,border:"none",borderRadius:11,color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"inherit"}}>
                 <span style={{fontSize:16}}>🔔</span>
                 <span>Agendar Turno al Montacarguista</span>
               </button>
             </div>
        )}

        {/* ── Resumen del pedido ── */}
        {(()=>{
          const cajasTotal=sel.refs.reduce((t,r)=>t+Math.floor(r.cant/CAJA),0);
          const sueltasTotal=sel.refs.reduce((t,r)=>t+r.cant%CAJA,0);
          const sinStock=sel.refs.filter(r=>r.sinStock).length;
          return(
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,padding:"8px 14px 4px"}}>
              {[
                {l:"Cajas ×9u",v:cajasTotal,sub:`${cajasTotal*CAJA}u en cajas`,c:C.green},
                {l:"U. sueltas",v:sueltasTotal,sub:sueltasTotal>0?"unidades sueltas":"sin sueltas",c:C.yellow},
                {l:"Total unids",v:sel.uni,sub:`${sel.nLineas} línea${sel.nLineas!==1?"s":""}`,c:C.teal},
                {l:"Viajes alt.",v:viajesAltura.length,sub:viajesAltura.length>0?`${sel.refs.filter(r=>!r.hasPiso&&r.hasAlt).length} SKUs`:"solo piso",c:C.purple},
              ].map(k=>(
                <div key={k.l} style={{background:C.bg2,borderRadius:9,padding:"8px 4px",textAlign:"center",border:`1px solid ${C.b0}`}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
                  <div style={{fontSize:7,color:C.t4,textTransform:"uppercase",fontWeight:700,margin:"3px 0 2px"}}>{k.l}</div>
                  <div style={{fontSize:7,color:C.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{k.sub}</div>
                </div>
              ))}
            </div>
          );
        })()}

        {/* Toggle piso/altura */}
        <div style={{display:"flex",gap:6,padding:"10px 16px 12px"}}>
          <button onClick={()=>setModo("piso")} style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${modo==="piso"?C.green:C.b0}`,background:modo==="piso"?`${C.green}18`:C.bg2,color:modo==="piso"?C.green:C.t3,fontWeight:700,fontSize:13}}>📦 Piso ({recorrido.piso.length} paradas)</button>
          <button onClick={()=>setModo("altura")} style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${modo==="altura"?C.purple:C.b0}`,background:modo==="altura"?`${C.purple}18`:C.bg2,color:modo==="altura"?C.purple:C.t3,fontWeight:700,fontSize:13}}>⬆ Altura ({viajesAltura.length} viajes)</button>
        </div>

        {/* Progreso */}
        {(()=>{
          const listaP=modo==="piso"?recorrido.piso:viajesAltura;
          const hechosCnt=listaP.filter((_,i)=>hechos[`${modo}-${i}`]).length;
          return(
            <div style={{padding:"0 16px 10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.t3,marginBottom:4}}>
                <span>Recorrido {modo==="piso"?"a pie · por calle":"montacargas · optimizado"}</span>
                <span>{hechosCnt}/{listaP.length} {modo==="piso"?"paradas":"viajes"}</span>
              </div>
              <div style={{height:5,background:C.b0,borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${listaP.length?hechosCnt/listaP.length*100:0}%`,background:modo==="piso"?C.green:C.purple,transition:"width .3s"}}/>
              </div>
            </div>
          );
        })()}

        {/* ── Plan de Viajes Altura (agrupado por posición UBI) ── */}
        {modo==="altura"&&viajesAltura.length>0&&(
          <div style={{padding:"0 12px 10px"}}>
            <div style={{background:C.bg2,border:`1px solid ${C.purple}40`,borderRadius:13,overflow:"hidden"}}>
              {/* Header */}
              <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.b0}`,background:`${C.purple}12`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:C.purple,fontWeight:800,fontSize:13}}>⬇ Plan de Viajes — Bajar de Altura</div>
                  <div style={{color:C.t3,fontSize:10,marginTop:2}}>Posiciones con más SKUs del pedido primero</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",color:C.purple,fontWeight:800,fontSize:22,lineHeight:1}}>{viajesAltura.length}</div>
                  <div style={{color:C.t4,fontSize:9}}>viajes</div>
                </div>
              </div>
              {/* KPIs rápidos */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderBottom:`1px solid ${C.b0}`}}>
                {[
                  {l:"Multi-SKU",v:viajesAltura.filter(v=>v.skus.length>1).length,c:C.yellow},
                  {l:"SKUs altura",v:viajesAltura.reduce((t,v)=>t+v.skus.length,0),c:C.teal},
                  {l:"Unids cubre",v:viajesAltura.reduce((t,v)=>t+v.skus.reduce((s,k)=>s+k.cubre,0),0),c:C.accent},
                ].map(k=>(
                  <div key={k.l} style={{padding:"7px 8px",textAlign:"center",borderRight:`1px solid ${C.b0}`}}>
                    <div style={{fontSize:8,color:C.t3,fontWeight:600,textTransform:"uppercase",marginBottom:2}}>{k.l}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:17,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
                  </div>
                ))}
              </div>
              {/* Viajes */}
              {viajesAltura.map((v,vi)=>{
                const isMulti=v.skus.length>1;
                const hecho=hechos[`altura-${vi}`];
                const totalCubre=v.skus.reduce((t,s)=>t+s.cubre,0);
                const cajasCompletas=Math.floor(totalCubre/CAJA);
                return(
                  <div key={v.ubi} style={{borderBottom:vi<viajesAltura.length-1?`1px solid ${C.b0}`:"none",background:hecho?`${C.green}08`:vi%2===0?C.bg1:"transparent",opacity:hecho?0.5:1,transition:"opacity .3s"}}>
                    {/* Cabecera del viaje */}
                    <div style={{padding:"10px 12px 6px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                        <div style={{width:26,height:26,borderRadius:"50%",background:`${isMulti?C.yellow:C.purple}20`,color:isMulti?C.yellow:C.purple,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,flexShrink:0}}>{vi+1}</div>
                        <div style={{minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:16}}>{v.ubi}</span>
                            {isMulti&&<span style={{background:`${C.yellow}20`,color:C.yellow,border:`1px solid ${C.yellow}40`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>{v.skus.length} SKUs</span>}
                          </div>
                          <div style={{color:C.t3,fontSize:9,marginTop:2}}>{CALLE_NOM[v.calleLetra]} · Mód {v.modulo} · Niv {v.nivel}</div>
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",color:C.green,fontWeight:800,fontSize:16,lineHeight:1}}>{totalCubre}u</div>
                        <div style={{color:C.t4,fontSize:9}}>{cajasCompletas>0?`${cajasCompletas} caja${cajasCompletas!==1?"s":""}`:""}{cajasCompletas>0&&totalCubre%CAJA>0?" + ":""}{totalCubre%CAJA>0?`${totalCubre%CAJA}u`:""}</div>
                      </div>
                    </div>
                    {/* SKUs de este viaje */}
                    <div style={{display:"flex",flexDirection:"column",gap:3,padding:"0 12px 8px 46px"}}>
                      {v.skus.map(s=>(
                        <div key={s.ref} style={{background:C.bg3,borderRadius:8,padding:"7px 10px",borderLeft:`3px solid ${s.falta>0?C.orange:C.green}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.accent,fontWeight:700,fontSize:12}}>{s.ref}</span>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.yellow,fontSize:11,fontWeight:700}}>pide {s.pide}u</span>
                          </div>
                          <div style={{color:C.t4,fontSize:9,marginBottom:5}}>{(s.desc||"").slice(0,40)}</div>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                            <span style={{background:`${C.green}18`,color:C.green,borderRadius:4,padding:"2px 7px",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>✓ {s.cubre}u disponibles</span>
                            {s.falta>0&&<span style={{background:`${C.orange}18`,color:C.orange,borderRadius:4,padding:"2px 7px",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>⚠ falta {s.falta}u</span>}
                            {s.cajas.length>0&&<span style={{background:`${C.teal}12`,color:C.teal,borderRadius:4,padding:"2px 7px",fontSize:9}}>{s.cajas.length} caja{s.cajas.length!==1?"s":""}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                    {/* Botón marcar viaje hecho */}
                    <button onClick={()=>setHechos(h=>({...h,[`altura-${vi}`]:!h[`altura-${vi}`]}))} style={{width:"100%",padding:"8px",background:hecho?`${C.green}15`:C.bg3,border:"none",borderTop:`1px solid ${C.b0}`,color:hecho?C.green:C.t2,fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                      {hecho?"✓ Viaje completado":"Marcar viaje completado"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Lista de paradas piso (solo en modo piso) */}
        {modo==="piso"&&<div style={{padding:"0 12px"}}>
          {recorrido.piso.length===0
            ?<div style={{textAlign:"center",color:C.t3,padding:30,fontSize:13}}>Sin paradas en piso — todo desde altura</div>
            :recorrido.piso.map((p,i)=>{
              const key=`piso-${i}`;const hecho=hechos[key];
              const skuKey=`piso-${p.ref}-${p.ubi}`;const abierto=skuAbierto[skuKey];
              const col=C.green;
              return(
                <div key={i} style={{background:hecho?C.bg1:C.bg2,borderRadius:12,marginBottom:8,border:`1px solid ${hecho?C.green+"30":C.b0}`,borderLeft:`4px solid ${hecho?C.green:col}`,opacity:hecho?0.5:1,animation:"fadeUp .25s ease both",transition:"opacity .3s"}}>
                  {/* Fila principal */}
                  <div style={{padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <div style={{width:26,height:26,borderRadius:"50%",background:`${col}20`,color:col,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{i+1}</div>
                        <div>
                          <div className="mono" style={{color:C.teal,fontWeight:800,fontSize:17}}>{p.ubi}</div>
                          <div style={{color:C.t3,fontSize:10}}>{CALLE_NOM[p.calleLetra]} · Mód {p.modulo} · Niv {p.nivel}</div>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div className="mono" style={{color:col,fontWeight:800,fontSize:18}}>{p.saldo}u</div>
                        <div style={{color:C.t4,fontSize:9}}>{Math.floor(p.saldo/9)} caja{Math.floor(p.saldo/9)!==1?"s":""}</div>
                      </div>
                    </div>
                    {/* SKU */}
                    <div onClick={()=>setSkuAbierto(o=>({...o,[skuKey]:!o[skuKey]}))} style={{background:C.bg1,borderRadius:8,padding:"8px 10px",cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                          <span style={{color:C.t3,fontSize:10,transform:abierto?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                          <span className="mono" style={{color:C.accent,fontWeight:700,fontSize:12}}>{p.ref}</span>
                          <span style={{color:C.t3,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.desc?.slice(0,28)}</span>
                        </div>
                        <span style={{color:C.yellow,fontSize:11,fontWeight:700,flexShrink:0}} className="mono">pide {p.cant}u</span>
                      </div>
                      {/* Detalle expandido */}
                      {abierto&&(
                        <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.b0}`}}>
                          {/* Familia */}
                          {(()=>{const f=familia(p.desc||"");return f&&f!=="OTRO"&&<div style={{marginBottom:8}}><span style={{background:`${C.teal}15`,color:C.teal,border:`1px solid ${C.teal}30`,borderRadius:5,padding:"2px 8px",fontSize:9,fontWeight:700}}>Familia ICH-{f}</span></div>;})()}
                          {/* Cajas en esta posición */}
                          {p.cajas&&p.cajas.length>0&&(
                            <div style={{marginBottom:10}}>
                              <div style={{fontSize:8,color:C.t4,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>📍 Cajas aquí</div>
                              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                                {p.cajas.map((cj,ci)=>(
                                  <div key={ci} style={{background:data.multiMap[cj.cajap]?`${C.yellow}15`:`${C.green}12`,border:`1px solid ${data.multiMap[cj.cajap]?`${C.yellow}40`:`${C.green}40`}`,borderRadius:6,padding:"4px 8px"}}>
                                    <div style={{fontFamily:"'JetBrains Mono',monospace",color:data.multiMap[cj.cajap]?C.yellow:C.green,fontSize:10,fontWeight:700}}>{cj.cajap}</div>
                                    <div style={{color:C.t4,fontSize:7}}>{cj.saldo}u · {data.multiMap[cj.cajap]?"MULTI":"ORI"}</div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                          {/* Chips Piso (visibles) + Altura (colapsada) */}
                          {(()=>{
                            const todas=ordenarRecorrido(data.invBySKU[p.ref]||[]);
                            const pisoU=todas.filter(u=>u.nivel<=1);
                            const altU=todas.filter(u=>u.nivel>=2);
                            const altSecKey=`altsec-${p.ref}-${p.ubi}`;
                            const altOpen=!!skuAbierto[altSecKey];
                            const Chip=({u,ui,prefijo,col})=>{
                              const esActual=u.ubi===p.ubi;
                              const isMulti=u.cajap&&data.multiMap[u.cajap];
                              const ck=`chip-${p.ref}-${prefijo}-${ui}`;
                              const co=!!skuAbierto[ck];
                              return(
                                <div key={ui}>
                                  <span onClick={e=>{e.stopPropagation();setSkuAbierto(o=>({...o,[ck]:!o[ck]}));}} style={{display:"inline-block",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",background:esActual?`${col}25`:isMulti?`${C.yellow}12`:C.bg0,color:esActual?col:isMulti?C.yellow:C.t3,border:`1px solid ${esActual?col:isMulti?`${C.yellow}40`:C.b0}`,borderRadius:5,padding:"2px 6px",fontSize:9,fontWeight:esActual?800:400}}>{u.ubi} {u.saldo}u{isMulti?" ⚠":""}</span>
                                  {co&&u.cajap&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:C.accent,background:`${C.accent}10`,borderRadius:3,padding:"1px 5px",marginTop:2,textAlign:"center"}}>📦 {u.cajap}</div>}
                                </div>
                              );
                            };
                            return(
                              <div>
                                {pisoU.length>0&&(
                                  <div style={{marginBottom:8}}>
                                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                                      <span style={{fontSize:8,color:C.green,fontWeight:700,textTransform:"uppercase"}}>📦 Piso</span>
                                      <span style={{fontSize:7,color:C.t4}}>{pisoU.length} pos · {pisoU.reduce((t,u)=>t+u.saldo,0)}u</span>
                                    </div>
                                    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{pisoU.map((u,ui)=><Chip key={ui} u={u} ui={ui} prefijo="p" col={C.green}/>)}</div>
                                  </div>
                                )}
                                {altU.length>0&&(
                                  <div>
                                    <div onClick={e=>{e.stopPropagation();setSkuAbierto(o=>({...o,[altSecKey]:!o[altSecKey]}));}} style={{display:"flex",alignItems:"center",gap:5,marginBottom:altOpen?5:0,cursor:"pointer",padding:"3px 0"}}>
                                      <span style={{fontSize:8,color:C.purple,fontWeight:700,textTransform:"uppercase"}}>⬆ Altura</span>
                                      <span style={{fontSize:7,color:C.t4}}>{altU.length} pos · {altU.reduce((t,u)=>t+u.saldo,0)}u</span>
                                      <span style={{fontSize:9,color:C.purple,marginLeft:"auto",display:"inline-block",transform:altOpen?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                                    </div>
                                    {altOpen&&<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{altU.map((u,ui)=><Chip key={ui} u={u} ui={ui} prefijo="a" col={C.purple}/>)}</div>}
                                  </div>
                                )}
                              </div>
                            );
                          })()}
                        </div>
                      )}
                    </div>
                  </div>
                  {/* Botón hecho */}
                  <button onClick={()=>setHechos(h=>({...h,[key]:!h[key]}))} style={{width:"100%",padding:"9px",background:hecho?`${C.green}15`:C.bg3,border:"none",borderTop:`1px solid ${C.b0}`,color:hecho?C.green:C.t2,fontWeight:700,fontSize:12,borderRadius:"0 0 11px 11px"}}>
                    {hecho?"✓ Recogido":"Marcar recogido"}
                  </button>
                </div>
              );
            })}
        </div>}
      </div>
    );
  }

  // ─── BUSCADOR ───
  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{background:C.bg1,borderBottom:`1px solid ${C.b0}`,padding:"16px 16px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📦</div>
          <div>
            <div style={{fontWeight:800,fontSize:15,letterSpacing:"0.5px"}}>INDUCASOS</div>
            <div style={{color:C.t3,fontSize:10}}>Picking Móvil · Bandeja ITAGUÍ{operario?` · ${operario}`:""}</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={cargar} style={{background:C.bg3,border:`1px solid ${C.b0}`,color:C.t3,borderRadius:8,padding:"7px 11px",fontSize:11}}>↻</button>
            <button onClick={()=>{setOperario(null);setPhase("login");setData(null);setAsignaciones({});}} style={{background:C.bg3,border:`1px solid ${C.b0}`,color:C.t3,borderRadius:8,padding:"7px 10px",fontSize:11}} title="Cambiar operario">⇦</button>
          </div>
        </div>
        {/* Tabs */}
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          <button onClick={()=>setTab("pedidos")} style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${tab==="pedidos"?C.teal:C.b0}`,background:tab==="pedidos"?`${C.teal}18`:C.bg2,color:tab==="pedidos"?C.teal:C.t3,fontWeight:700,fontSize:11}}>🗂 Pedidos</button>
          <button onClick={()=>setTab("skus")} style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${tab==="skus"?C.accent:C.b0}`,background:tab==="skus"?`${C.accent}18`:C.bg2,color:tab==="skus"?C.accent:C.t3,fontWeight:700,fontSize:11}}>🔍 SKUs</button>
          <button onClick={()=>setTab("viajes")} style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${tab==="viajes"?C.purple:C.b0}`,background:tab==="viajes"?`${C.purple}18`:C.bg2,color:tab==="viajes"?C.purple:C.t3,fontWeight:700,fontSize:11,position:"relative"}}>
            ⬆ Viajes
            {planGlobal.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.purple,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:8,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{planGlobal.length}</span>}
          </button>
        </div>
        {tab==="pedidos"
          ?<>
            <input value={busca} onChange={e=>{setBusca(e.target.value);}} placeholder="🔍 Picking, pedido o cliente..." autoFocus style={{width:"100%",background:C.bg3,color:C.t1,border:`1px solid ${C.b1}`,borderRadius:11,padding:"13px 15px",fontSize:15,marginBottom:8}}/>
            {/* #4 Filtros rápidos por clasificación */}
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[
                {k:"",l:"Todos",c:C.t3},
                {k:"despachable",l:"✅ Desp.",c:C.green},
                {k:"parcial",l:"⚡ Parcial",c:C.yellow},
                {k:"reabasto",l:"⬆ Reab.",c:C.orange},
                {k:"ruptura",l:"❌ Rupt.",c:C.red},
              ].map(f=>{
                const cnt=data?data.pedidos.filter(p=>!f.k||p.clasif===f.k).length:0;
                return(
                  <button key={f.k} onClick={()=>setFiltroClasif(f.k)}
                    style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${filtroClasif===f.k?f.c:C.b0}`,background:filtroClasif===f.k?`${f.c}20`:C.bg2,color:filtroClasif===f.k?f.c:C.t3,fontSize:10,fontWeight:700,cursor:"pointer"}}>
                    {f.l} <span style={{opacity:.6}}>({cnt})</span>
                  </button>
                );
              })}
            </div>
          </>
          :<input value={buscaSKU} onChange={e=>setBuscaSKU(e.target.value)} placeholder="🔍 Referencia o descripción..." autoFocus style={{width:"100%",background:C.bg3,color:C.t1,border:`1px solid ${C.b1}`,borderRadius:11,padding:"13px 15px",fontSize:15}}/>
        }
      </div>

      <div style={{padding:"14px 12px"}}>
        {/* ── TAB PEDIDOS ── */}
        {tab==="pedidos"&&(()=>{
          const base=busca.trim()?resultados:(filtroClasif?data?.pedidos||[]:[]);
          const lista=filtroClasif?base.filter(p=>p.clasif===filtroClasif):base;
          if(!busca.trim()&&!filtroClasif)return(
            <div style={{textAlign:"center",color:C.t3,padding:"40px 20px"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔎</div>
              <div style={{fontSize:14,marginBottom:6}}>Busca o filtra un pedido</div>
              <div style={{fontSize:11,color:C.t4}}>Usa la barra de búsqueda o los filtros de arriba</div>
              <div style={{marginTop:18,fontSize:11,color:C.t4}}>{data?.pedidos.length||0} pedidos disponibles</div>
            </div>
          );
          if(lista.length===0)return<div style={{textAlign:"center",color:C.t3,padding:30,fontSize:13}}>Sin resultados{busca?` para "${busca}"`:""}</div>;
          return lista.map((p,i)=>{
                const cajasP=Math.floor(p.uniPiso/CAJA);
                const sueltosP=p.uniPiso%CAJA;
                const skusAlt=p.refs.filter(r=>!r.hasPiso&&r.hasAlt).length;
                const sinSt=p.refs.filter(r=>r.sinStock).length;
                const asig=asignaciones[p.picking];
                const esMio=asig&&asig.operario===operario;
                const esOtro=asig&&asig.operario!==operario;
                return(
                <div key={i} onClick={()=>abrirPedido(p)} style={{background:C.bg2,borderRadius:12,marginBottom:8,border:`1px solid ${esOtro?C.orange+"40":C.b0}`,borderLeft:`4px solid ${clasifCol[p.clasif]}`,padding:"13px 15px",animation:"fadeUp .2s ease both",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:15}}>{p.picking}</span>
                      <span style={{background:`${clasifCol[p.clasif]}20`,color:clasifCol[p.clasif],borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>{clasifLbl[p.clasif]}</span>
                      {esMio&&<span style={{background:`${C.teal}18`,color:C.teal,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>MÍO</span>}
                      {esOtro&&<span style={{background:`${C.orange}18`,color:C.orange,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>→ {asig.operario}</span>}
                    </div>
                    <span style={{color:C.t3,fontSize:18}}>›</span>
                  </div>
                  <div style={{color:C.t2,fontSize:12,marginBottom:7,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.cliente}</div>
                  {/* Mini KPIs */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:7}}>
                    {[
                      {l:"Cajas piso",v:cajasP,sub:sueltosP>0?`+${sueltosP}u`:"",c:C.green},
                      {l:"Unids total",v:p.uni,sub:`${p.nLineas}L`,c:C.teal},
                      {l:"SKUs alt.",v:skusAlt,sub:skusAlt>0?"altura":"solo piso",c:skusAlt>0?C.purple:C.t4},
                      {l:"Sin stock",v:sinSt,sub:sinSt>0?"gestionar":"ok",c:sinSt>0?C.red:C.t4},
                    ].map(k=>(
                      <div key={k.l} style={{background:C.bg1,borderRadius:6,padding:"4px 3px",textAlign:"center"}}>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
                        <div style={{fontSize:7,color:C.t4,fontWeight:600,marginTop:2}}>{k.l}</div>
                        {k.sub&&<div style={{fontSize:7,color:C.t3}}>{k.sub}</div>}
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:12,fontSize:10,color:C.t3}}>
                    <span>📍 {p.ciudad}</span>
                    <span>📋 {p.nLineas} líneas</span>
                    {p.pedSiesa&&<span style={{fontFamily:"'JetBrains Mono',monospace"}}>#{p.pedSiesa}</span>}
                    {p.nota&&<span style={{color:C.orange}}>⚠ nota</span>}
                  </div>
                </div>
                );
              });
        })()}

        {/* ── TAB SKUs ── */}
        {tab==="skus"&&(
          !buscaSKU.trim()||buscaSKU.trim().length<2
            ?<div style={{textAlign:"center",color:C.t3,padding:"40px 20px"}}>
              <div style={{fontSize:36,marginBottom:12}}>📦</div>
              <div style={{fontSize:14,marginBottom:6}}>Busca cualquier SKU</div>
              <div style={{fontSize:11,color:C.t4}}>Ingresa la referencia o parte de la descripción</div>
              <div style={{marginTop:18,fontSize:11,color:C.t4}}>{data?Object.keys(data.invBySKU).length:0} SKUs en inventario</div>
            </div>
            :resultadosSKU.length===0
              ?<div style={{textAlign:"center",color:C.t3,padding:30,fontSize:13}}>Sin resultados para "{buscaSKU}"</div>
              :resultadosSKU.map((s,i)=>{
                const abierto=skuDetAbierto[s.ref];
                return(
                  <div key={i} style={{background:C.bg2,borderRadius:12,marginBottom:8,border:`1px solid ${C.b0}`,animation:"fadeUp .2s ease both"}}>
                    {/* Cabecera SKU */}
                    <div onClick={()=>setSkuDetAbierto(o=>({...o,[s.ref]:!o[s.ref]}))} style={{padding:"13px 15px",cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                            <span className="mono" style={{color:C.teal,fontWeight:800,fontSize:14}}>{s.ref}</span>
                            <span style={{color:C.t3,fontSize:10,transform:abierto?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                          </div>
                          <div style={{color:C.t2,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.desc}</div>
                        </div>
                      </div>
                      {/* Métricas: piso / altura / comprometido / libre */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:8}}>
                        <div style={{background:C.bg1,borderRadius:7,padding:"6px 0",textAlign:"center"}}>
                          <div className="mono" style={{color:C.green,fontWeight:800,fontSize:14}}>{s.stockPiso}</div>
                          <div style={{color:C.t4,fontSize:8}}>PISO</div>
                        </div>
                        <div style={{background:C.bg1,borderRadius:7,padding:"6px 0",textAlign:"center"}}>
                          <div className="mono" style={{color:C.purple,fontWeight:800,fontSize:14}}>{s.stockAlt}</div>
                          <div style={{color:C.t4,fontSize:8}}>ALTURA</div>
                        </div>
                        <div style={{background:C.bg1,borderRadius:7,padding:"6px 0",textAlign:"center"}}>
                          <div className="mono" style={{color:s.comprometido>0?C.orange:C.t3,fontWeight:800,fontSize:14}}>{s.comprometido}</div>
                          <div style={{color:C.t4,fontSize:8}}>COMPROM.</div>
                        </div>
                        <div style={{background:C.bg1,borderRadius:7,padding:"6px 0",textAlign:"center"}}>
                          <div className="mono" style={{color:s.gap>0?C.red:C.green,fontWeight:800,fontSize:14}}>{s.gap>0?`-${s.gap}`:s.libre}</div>
                          <div style={{color:C.t4,fontSize:8}}>{s.gap>0?"GAP":"LIBRE"}</div>
                        </div>
                      </div>
                      <div style={{fontSize:10,color:C.t3}}>📍 {s.posiciones.length} ubicaciones · {s.stockPiso+s.stockAlt}u total · {s.pedidosConRef.length} pedido{s.pedidosConRef.length!==1?"s":""}</div>
                    </div>
                    {/* Detalle expandido */}
                    {abierto&&(
                      <div style={{borderTop:`1px solid ${C.b0}`,padding:"10px 15px 13px"}}>
                        {/* Pedidos comprometidos */}
                        {s.pedidosConRef.length>0&&(
                          <div style={{marginBottom:12}}>
                            <div style={{color:C.orange,fontSize:9,fontWeight:700,marginBottom:6}}>📋 COMPROMETIDO EN PEDIDOS</div>
                            {s.pedidosConRef.map((pc,pi)=>(
                              <div key={pi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:C.bg0,borderRadius:7,marginBottom:4,borderLeft:`3px solid ${clasifCol[pc.clasif]||C.t3}`}}>
                                <div>
                                  <span className="mono" style={{color:C.teal,fontSize:12,fontWeight:700}}>{pc.picking}</span>
                                  <span style={{color:C.t3,fontSize:10,marginLeft:6,overflow:"hidden",textOverflow:"ellipsis"}}>{pc.cliente?.slice(0,18)}</span>
                                </div>
                                <span className="mono" style={{color:C.orange,fontWeight:800,fontSize:13}}>{pc.cant}u</span>
                              </div>
                            ))}
                          </div>
                        )}
                        {/* Piso agrupado */}
                        {s.posiciones.filter(u=>u.nivel<=1).length>0&&(
                          <div style={{marginBottom:10}}>
                            <div style={{color:C.green,fontSize:9,fontWeight:700,marginBottom:6}}>📦 PISO</div>
                            {s.posiciones.filter(u=>u.nivel<=1).map((g,gi)=>{
                              const gkey=`piso-${s.ref}-${g.ubi}`;
                              const abiertoCajas=skuDetAbierto[gkey];
                              const hasMulti=g.cajas.some(c=>c.isMulti);
                              return(
                                <div key={gi} style={{background:C.bg1,borderRadius:8,marginBottom:5,borderLeft:`3px solid ${C.green}`,overflow:'hidden'}}>
                                  <div onClick={()=>setSkuDetAbierto(o=>({...o,[gkey]:!o[gkey]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",cursor:'pointer'}}>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                      <span style={{color:C.t3,fontSize:10,transform:abiertoCajas?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                                      <span className="mono" style={{color:C.green,fontWeight:800,fontSize:15}}>{g.ubi}</span>
                                      <span style={{color:C.t3,fontSize:10}}>{CALLE_NOM[g.calleLetra]} · Mód {g.modulo}</span>
                                      {hasMulti&&<span style={{background:`${C.yellow}25`,color:C.yellow,borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700}}>MULTI</span>}
                                    </div>
                                    <div style={{textAlign:"right"}}>
                                      <span className="mono" style={{color:C.t1,fontWeight:700,fontSize:14}}>{g.totalSaldo}u</span>
                                      <div style={{color:C.t4,fontSize:9}}>{g.cajas.length} caja{g.cajas.length!==1?"s":""}</div>
                                    </div>
                                  </div>
                                  {abiertoCajas&&g.cajas.length>0&&(
                                    <div style={{borderTop:`1px solid ${C.b0}`,padding:"6px 10px 8px"}}>
                                      {g.cajas.map((cj,ci)=>(
                                        <div key={ci} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0'}}>
                                          <span className="mono" style={{color:C.accent,fontSize:11}}>📦 {cj.cajap}</span>
                                          <span style={{background:cj.isMulti?`${C.yellow}25`:`${C.green}20`,color:cj.isMulti?C.yellow:C.green,borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700}}>{cj.isMulti?'MULTI':'ORI'}</span>
                                          <span style={{color:C.t3,fontSize:10,marginLeft:'auto'}}>{cj.saldo}u</span>
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                        {/* Altura agrupada */}
                        {s.posiciones.filter(u=>u.nivel>=2).length>0&&(
                          <div>
                            <div style={{color:C.purple,fontSize:9,fontWeight:700,marginBottom:6}}>⬆ ALTURA</div>
                            {s.posiciones.filter(u=>u.nivel>=2).map((g,gi)=>{
                              const gkey=`alt-${s.ref}-${g.ubi}`;
                              const abiertoCajas=skuDetAbierto[gkey];
                              const hasMulti=g.cajas.some(c=>c.isMulti);
                              return(
                                <div key={gi} style={{background:C.bg1,borderRadius:8,marginBottom:5,borderLeft:`3px solid ${C.purple}`,overflow:'hidden'}}>
                                  <div onClick={()=>setSkuDetAbierto(o=>({...o,[gkey]:!o[gkey]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",cursor:'pointer'}}>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                      <span style={{color:C.t3,fontSize:10,transform:abiertoCajas?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                                      <span className="mono" style={{color:C.purple,fontWeight:800,fontSize:15}}>{g.ubi}</span>
                                      <span style={{color:C.t3,fontSize:10}}>{CALLE_NOM[g.calleLetra]} · Mód {g.modulo} · Niv {g.nivel}</span>
                                      {hasMulti&&<span style={{background:`${C.yellow}25`,color:C.yellow,borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700}}>MULTI</span>}
                                    </div>
                                    <div style={{textAlign:"right"}}>
                                      <span className="mono" style={{color:C.t1,fontWeight:700,fontSize:14}}>{g.totalSaldo}u</span>
                                      <div style={{color:C.t4,fontSize:9}}>{g.cajas.length} caja{g.cajas.length!==1?"s":""}</div>
                                    </div>
                                  </div>
                                  {abiertoCajas&&g.cajas.length>0&&(
                                    <div style={{borderTop:`1px solid ${C.b0}`,padding:"6px 10px 8px"}}>
                                      {g.cajas.map((cj,ci)=>(
                                        <div key={ci} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0'}}>
                                          <span className="mono" style={{color:C.accent,fontSize:11}}>📦 {cj.cajap}</span>
                                          <span style={{background:cj.isMulti?`${C.yellow}25`:`${C.green}20`,color:cj.isMulti?C.yellow:C.green,borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700}}>{cj.isMulti?'MULTI':'ORI'}</span>
                                          <span style={{color:C.t3,fontSize:10,marginLeft:'auto'}}>{cj.saldo}u</span>
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })
        )}

        {/* ── TAB VIAJES (Plan Global cross-pedido) ── */}
        {tab==="viajes"&&(
          planGlobal.length===0
            ?<div style={{textAlign:"center",color:C.t3,padding:"40px 20px"}}>
              <div style={{fontSize:36,marginBottom:12}}>✅</div>
              <div style={{fontSize:14,marginBottom:6}}>Sin viajes de altura pendientes</div>
              <div style={{fontSize:11,color:C.t4}}>Todos los pedidos se cubren desde piso</div>
            </div>
            :<div>
              {/* Resumen global */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
                {[
                  {l:"Viajes",v:planGlobal.length,c:C.purple},
                  {l:"Pedidos",v:[...new Set(planGlobal.flatMap(v=>v.items.map(i=>i.picking)))].length,c:C.teal},
                  {l:"Líneas",v:planGlobal.reduce((t,v)=>t+v.items.length,0),c:C.yellow},
                ].map(k=>(
                  <div key={k.l} style={{background:C.bg2,borderRadius:9,padding:"10px 6px",textAlign:"center",border:`1px solid ${C.b0}`}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
                    <div style={{fontSize:8,color:C.t4,fontWeight:700,textTransform:"uppercase",marginTop:4}}>{k.l}</div>
                  </div>
                ))}
              </div>
              {/* Tarjetas de viaje */}
              {planGlobal.map((v,vi)=>{
                const isMultiPed=v.nPedidos>1;
                // Agrupar items por SKU para mostrar consolidado
                const porSKU={};
                v.items.forEach(it=>{
                  if(!porSKU[it.ref])porSKU[it.ref]={ref:it.ref,desc:it.desc,pedidos:[],totalPide:0,totalCubre:0};
                  porSKU[it.ref].pedidos.push({picking:it.picking,pedSiesa:it.pedSiesa,cliente:it.cliente,clasif:it.clasif,pide:it.pide,cubre:it.cubre,falta:it.falta});
                  porSKU[it.ref].totalPide+=it.pide;
                  porSKU[it.ref].totalCubre+=it.cubre;
                });
                const skuList=Object.values(porSKU).sort((a,b)=>b.totalPide-a.totalPide);
                const totalUnids=skuList.reduce((t,s)=>t+s.totalPide,0);
                const cajasTotal=Math.floor(totalUnids/CAJA);
                const vKey=`viaje-${v.ubi}`;
                const abierto=skuDetAbierto[vKey];
                return(
                  <div key={v.ubi} style={{background:C.bg2,borderRadius:12,marginBottom:8,border:`1px solid ${isMultiPed?C.yellow+"40":C.b0}`,borderLeft:`4px solid ${isMultiPed?C.yellow:C.purple}`,animation:"fadeUp .2s ease both"}}>
                    {/* Cabecera viaje */}
                    <div onClick={()=>setSkuDetAbierto(o=>({...o,[vKey]:!o[vKey]}))} style={{padding:"12px 14px",cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                          <div style={{width:26,height:26,borderRadius:"50%",background:`${isMultiPed?C.yellow:C.purple}20`,color:isMultiPed?C.yellow:C.purple,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,flexShrink:0}}>{vi+1}</div>
                          <div style={{minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                              <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontWeight:800,fontSize:16}}>{v.ubi}</span>
                              {isMultiPed&&<span style={{background:`${C.yellow}20`,color:C.yellow,border:`1px solid ${C.yellow}40`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>{v.nPedidos} pedidos</span>}
                              <span style={{background:`${C.purple}18`,color:C.purple,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>{skuList.length} SKU{skuList.length!==1?"s":""}</span>
                            </div>
                            <div style={{color:C.t3,fontSize:9,marginTop:2}}>{CALLE_NOM[v.calleLetra]} · Mód {v.modulo} · Niv {v.nivel}</div>
                          </div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
                          <div>
                            <div style={{fontFamily:"'JetBrains Mono',monospace",color:C.green,fontWeight:800,fontSize:15,lineHeight:1}}>{totalUnids}u</div>
                            <div style={{color:C.t4,fontSize:8}}>{cajasTotal>0?`${cajasTotal} caja${cajasTotal!==1?"s":""}`:""}{cajasTotal>0&&totalUnids%CAJA>0?"+":""}{totalUnids%CAJA>0?`${totalUnids%CAJA}u`:""}</div>
                          </div>
                          <span style={{color:C.t3,fontSize:16,transform:abierto?"rotate(90deg)":"none",transition:"transform .2s"}}>▶</span>
                        </div>
                      </div>
                      {/* SKUs resumen (colapsado) */}
                      {!abierto&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                        {skuList.slice(0,4).map(s=>(
                          <span key={s.ref} style={{display:"inline-flex",alignItems:"center",gap:3,background:C.bg3,borderRadius:4,padding:"2px 7px",fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:C.accent,border:`1px solid ${C.accent}25`}}>
                            <span style={{fontSize:7,background:`${C.accent}25`,borderRadius:2,padding:"0 3px",fontWeight:800,letterSpacing:.5}}>SKU</span>
                            {s.ref}
                          </span>
                        ))}
                        {skuList.length>4&&<span style={{color:C.t3,fontSize:9}}>+{skuList.length-4} más</span>}
                      </div>}
                    </div>
                    {/* Detalle expandido */}
                    {abierto&&(
                      <div style={{borderTop:`1px solid ${C.b0}`,padding:"8px 14px 12px"}}>
                        {skuList.map(s=>(
                          <div key={s.ref} style={{background:C.bg3,borderRadius:8,padding:"8px 10px",marginBottom:6,borderLeft:`3px solid ${s.totalCubre<s.totalPide?C.orange:C.green}`}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                              <div style={{display:"flex",alignItems:"center",gap:5}}>
                                <span style={{fontSize:8,background:`${C.accent}25`,color:C.accent,borderRadius:3,padding:"1px 5px",fontWeight:800,letterSpacing:.5}}>SKU</span>
                                <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.accent,fontWeight:700,fontSize:13}}>{s.ref}</span>
                              </div>
                              <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.yellow,fontSize:11,fontWeight:700}}>total {s.totalPide}u</span>
                            </div>
                            <div style={{color:C.t4,fontSize:9,marginBottom:6}}>{(s.desc||"").slice(0,42)}</div>
                            {/* Pedidos que necesitan este SKU */}
                            {s.pedidos.map((p,pi)=>(
                              <div key={pi} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderTop:pi>0?`1px solid ${C.b0}`:"none"}}>
                                <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                                  <span style={{fontSize:7,background:`${C.teal}20`,color:C.teal,borderRadius:3,padding:"1px 4px",fontWeight:800,letterSpacing:.5}}>PED</span>
                                  <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.teal,fontSize:10,fontWeight:700}}>{p.picking}</span>
                                </div>
                                <span style={{color:C.t3,fontSize:9,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(p.cliente||"").slice(0,18)}</span>
                                <span style={{background:`${clasifCol[p.clasif]}18`,color:clasifCol[p.clasif],borderRadius:3,padding:"1px 5px",fontSize:8,fontWeight:700}}>{clasifLbl[p.clasif]?.slice(0,4)}</span>
                                <span style={{fontFamily:"'JetBrains Mono',monospace",color:p.falta>0?C.orange:C.green,fontSize:10,fontWeight:700}}>{p.pide}u</span>
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PickingApp/>);
</script>
</body>
</html>
