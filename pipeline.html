const SUPA_KEY = "sb_publishable_LHZWmeFFmnua2j3y8dqqdw_rx0u3vad";
const _H = {
  apikey: SUPA_KEY,
  Authorization: `Bearer ${SUPA_KEY}`,
  "Content-Type": "application/json"
};
const _go = async (url, opts = {}) => {
  for (let i = 0; i < 3; i++) {
    try {
      const res = await fetch(url, {
        headers: _H,
        ...opts
      });
      if (res.ok) {
        const t = await res.text();
        return {
          data: t ? JSON.parse(t) : null,
          error: null
        };
      }
      if ([400, 403, 404, 409].includes(res.status)) {
        const t = await res.text();
        return {
          data: null,
          error: {
            status: res.status,
            message: t
          }
        };
      }
      if (i < 2) await new Promise(ok => setTimeout(ok, (i + 1) * 2000));else {
        const t = await res.text();
        return {
          data: null,
          error: {
            status: res.status,
            message: t
          }
        };
      }
    } catch (err) {
      if (i < 2) await new Promise(ok => setTimeout(ok, (i + 1) * 2000));else return {
        data: null,
        error: err
      };
    }
  }
};

// ═══════════ HELPERS (misma lógica que el master) ═══════════
const CAJA = 9;
const toNum = v => {
  const n = parseFloat(String(v).replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? 0 : n;
};
const CALLE_MAP = {
  B: "C1",
  C: "C2",
  D: "C3",
  E: "C4"
};
const CALLE_NOM = {
  B: "Calle 1",
  C: "Calle 2",
  D: "Calle 3",
  E: "Calle 4"
};
const TOPE_PISO = 27; // máx 3 cajas del mismo SKU desde piso
const parseUbi = u => {
  const m = /^([B-E])0?(\d{1,2})(\d)(\d)$/.exec(String(u).trim());
  if (!m) return null;
  return {
    calleKey: CALLE_MAP[m[1]],
    calleLetra: m[1],
    modulo: parseInt(m[2]),
    nivel: parseInt(m[3]),
    pos: parseInt(m[4])
  };
};
const esEXPO = d => (d || "").toUpperCase().includes("EXPO");
const marcaDe = desc => {
  const p = String(desc || "").trim().split(/\s+/);
  return p.length >= 3 ? p[2].toUpperCase() : "";
};
const familia = d => {
  const u = (d || "").toUpperCase();
  if (/\bT[- ]?10\b/.test(u)) return "T-10";
  const m = u.match(/ICH[- ]?([0-9]{2,4})/);
  return m ? m[1] : "OTRO";
};
const esMDE = ciudad => {
  const x = String(ciudad || "").toUpperCase().trim();
  return x === "MDE" || x.includes("MEDELL") || x === "ITAGUI" || x === "ITAGÜI" || x.includes("ITAGU");
};
const tieneNota = n => String(n || "").trim().length > 0;
const fmtHora = ts => {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("es-CO", {

};

// ═══════════ PROCESAR DATOS (lógica idéntica al master) ═══════════
function procesar(wbInv, wbFact) {
  const MARCAS = ["ICH"];
  const toNum = v => {
    const n = parseFloat(String(v).replace(/[^0-9.-]/g, ""));
    return isNaN(n) ? 0 : n;
  };

  // ── INVENTARIO ──
  const invSheet = wbInv.Sheets[wbInv.SheetNames[0]];
  const invRows = XLSX.utils.sheet_to_json(invSheet, {
    range: 5,
    defval: ""
  });
  const invCasco = invRows.filter(r => {
    const linea = String(r["Linea"] || "").trim();
    const desc = String(r["Descripcion"] || "");
    return linea === "CASCO" && MARCAS.includes(marcaDe(desc));
  });
  if (invCasco.length === 0) throw new Error("No se encontraron SKUs CASCO ICH en el inventario.");
  const stockMap = {};
  const invBySKU = {};
  for (const r of invCasco) {
    const ref = String(r["Referencia"] || "").trim();
    const desc = String(r["Descripcion"] || "").trim();
    const saldo = toNum(r["saldo"]);
    const ubi = String(r["ubicacion"] || "").trim();
    const cajap = String(r["cajap"] || "").trim();
    if (!ref) continue;
    const p = parseUbi(ubi);
    if (!stockMap[ref]) stockMap[ref] = {
      ref,
      desc,
      stock: 0,
      stockAlt: 0,
      stockTotal: 0
    };
    stockMap[ref].stockTotal += saldo;
    if (p && p.nivel <= 1) stockMap[ref].stock += saldo;else stockMap[ref].stockAlt += saldo;
    if (p && saldo > 0) {
      if (!invBySKU[ref]) invBySKU[ref] = [];
      invBySKU[ref].push({
        ubi,
        saldo,
        nivel: p.nivel,
        pos: p.pos,
        calleLetra: p.calleLetra,
        modulo: p.modulo,
        cajap
      });
    }
  }
  const cascoRefs = new Set(Object.keys(stockMap));

  // Índice cajap → refs que lo contienen (para detectar multiproducto)
  const cajapRefs = {};
  for (const [ref, posArr] of Object.entries(invBySKU)) {
    for (const p of posArr) {
      if (p.cajap) {
        if (!cajapRefs[p.cajap]) cajapRefs[p.cajap] = new Set();
        cajapRefs[p.cajap].add(ref);
      }
    }
  }
  const multiMap = {};
  Object.keys(cajapRefs).forEach(k => {
    if (cajapRefs[k].size > 1) multiMap[k] = true;
  });

  // ── PEDIDOS — solo ITAGUÍ (lógica idéntica al master) ──
  const ws = wbFact.Sheets["ITAGUÍ"];
  if (!ws) throw new Error("No se encontró la hoja ITAGUÍ en la bandeja de pedidos.");
  const allWmsRows = XLSX.utils.sheet_to_json(ws, {
    range: 5,
    defval: ""
  });
  if (allWmsRows.length === 0) throw new Error("La hoja ITAGUÍ está vacía.");
  const pedidosRaw = {};
  for (const r of allWmsRows) {
    const ref = String(r["referencia"] || "").trim();
    const cant = toNum(r["cantidad"]);
    const nota = r["notas"];
    const ciudad = String(r["ciudad"] || "").trim();
    const estado_val = String(r["Estado"] || "").trim();
    const picking = String(r["Picking"] || r["PedidoSiesa"] || "").trim();
    const cliente = String(r["NOMBRECLIENTE"] || "").trim();
    const pedidoSiesa = String(r["PedidoSiesa"] || "").trim();
    const fecha = r["F_pedido"] ? String(r["F_pedido"]).slice(0, 10) : "";
    const desc = String(r["descripcion"] || "").trim();
    const tipoDocto = String(r["TipoDocto"] || "").trim().toUpperCase();
    // Mismo filtro que el master: solo refs que están en cascoRefs
    if (!ref || cant === 0) continue;
    if (!pedidosRaw[picking]) {
      pedidosRaw[picking] = {
        id: picking,
        pedidoSiesa,
        est: estado_val === "5" ? "planeado" : estado_val === "3" ? "en_picking" : "sin_planear",
        cliente,
        ciudad,
        fecha,
        nota: tieneNota(nota),
        tipoDocto,
        rows: []
      };
    }
    pedidosRaw[picking].rows.push({
      ref,
      desc,
      cant,
      nota: tieneNota(nota)
    });
  }

  // ── Construir pedidosActivos con cobertura (idéntico al master) ──
  const TOPE_PISO = 27;
  const pedidosActivos = Object.values(pedidosRaw).map(p => {
    const refs = p.rows.map(row => {
      const pos = invBySKU[row.ref] || [];
      const stockPiso = pos.filter(x => x.nivel <= 1).reduce((t, x) => t + x.saldo, 0);
      const stockAlt = pos.filter(x => x.nivel >= 2).reduce((t, x) => t + x.saldo, 0);
      const limitePiso = Math.min(stockPiso, TOPE_PISO);
      const cubPiso = Math.min(limitePiso, row.cant);
      const restoTrasPiso = row.cant - cubPiso;
      const cubAlt = Math.min(stockAlt, restoTrasPiso);
      const hasPiso = cubPiso >= row.cant;
      const hasPisoParcial = cubPiso > 0;
      const hasAlt = stockAlt > 0;
      const sinStock = stockPiso === 0 && stockAlt === 0;
      return {
        ...row,
        stockPiso,
        stockAlt,
        cubPiso,
        cubAlt,
        restoTrasPiso,
        hasPiso,
        hasPisoParcial,
        hasAlt,
        sinStock
      };
    });
    const lineas = refs.length;
    const uni = refs.reduce((t, r) => t + r.cant, 0);
    const uniPiso = refs.reduce((t, r) => t + r.cubPiso, 0);
    const uniAlt = refs.reduce((t, r) => t + r.cubAlt, 0);
    const pctPiso = uni > 0 ? Math.round(uniPiso / uni * 100) : 0;
    const pctAlt = uni > 0 ? Math.round(uniAlt / uni * 100) : 0;
    let clasificacion = "ruptura";
    if (pctPiso === 100) clasificacion = "despachable";else if (pctPiso >= 40) clasificacion = "parcial";else if (uniAlt > 0) clasificacion = "reabasto";
    return {
      picking: p.id,
      pedSiesa: p.pedidoSiesa || "",
      cliente: p.cliente,
      ciudad: p.ciudad,
      estado: p.est,
      nota: p.nota,
      fecha: p.fecha,
      refs,
      nLineas: lineas,
      uni,
      uniPiso,
      uniAlt,
      pctPiso,
      pctAlt,
      clasif: clasificacion
    };
  }).sort((a, b) => {
    const aMDE = esMDE(a.ciudad) ? 1 : 0,
      bMDE = esMDE(b.ciudad) ? 1 : 0;
    if (aMDE !== bMDE) return bMDE - aMDE;
    const ord = {
      sin_planear: 0,
      planeado: 1,
      en_picking: 2
    };
    return (ord[a.estado] || 0) - (ord[b.estado] || 0) || b.uni - a.uni;
  });

  // Índice UBI → SKUs (para buscador de posiciones)
  const ubiMap = {};
  for (const [ref, posArr] of Object.entries(invBySKU)) {
    const desc = (stockMap[ref] || {}).desc || "";
    for (const p of posArr) {
      if (!ubiMap[p.ubi]) ubiMap[p.ubi] = {
        ubi: p.ubi,
        calleLetra: p.calleLetra,
        modulo: p.modulo,
        nivel: p.nivel,
        skus: []
      };
      if (p.saldo > 0) ubiMap[p.ubi].skus.push({
        ref,
        desc,
        saldo: p.saldo,
        cajap: p.cajap || ""
      });
    }
  }
  return {
    invBySKU,
    stockMap,
    pedidos: pedidosActivos,
    multiMap,
    ubiMap
  };
}

// ═══════════ RECORRIDO (Opción B: por calle ascendente) ═══════════
// Ordena posiciones por calle (B,C,D,E) → módulo ascendente → nivel
function ordenarRecorrido(posiciones) {
  const ordenCalle = {
    B: 1,
    C: 2,
    D: 3,
    E: 4
  };
  return [...posiciones].sort((a, b) => (ordenCalle[a.calleLetra] || 9) - (ordenCalle[b.calleLetra] || 9) || (a.modulo || 0) - (b.modulo || 0) || (a.nivel || 0) - (b.nivel || 0));
}

function PickingApp() {
  const [phase, setPhase] = useState("login"); // login | loading | ready | error
  const [operario, setOperario] = useState(null);
  const [asignaciones, setAsignaciones] = useState({}); // {picking:{operario,estado}}
  const [turnosEnviados, setTurnosEnviados] = useState({}); // {picking:true}
  const [err, setErr] = useState("");
  const [data, setData] = useState(null);
  const [busca, setBusca] = useState("");
  const [sel, setSel] = useState(null); // pedido seleccionado
  const [modo, setModo] = useState("piso"); // piso | altura (en el detalle)
  const [skuAbierto, setSkuAbierto] = useState({}); // SKUs expandidos para ver ubicaciones
  const [skuDetAbierto, setSkuDetAbierto] = useState({}); // SKUs expandidos en tab SKUs
  const [hechos, setHechos] = useState({}); // paradas completadas
  const [turnoActivo, setTurnoActivo] = useState(null);
  const [notifs, setNotifs] = useState([]); // notificaciones en tiempo real del montacarguista
  const prevTurnoRef = useRef(null);
  const cargar = useCallback(async () => {
    setPhase("loading");
    setErr("");
    try {
      const fetchWb = async url => {
        const r = await fetch(url, {
          cache: "reload"
        });
        if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
        const buf = await r.arrayBuffer();
        if (buf.byteLength < 100) throw new Error(`${url} llegó vacío`);
        return XLSX.read(new Uint8Array(buf), {
          type: "array",
          cellDates: true
        });
      };
      const [wbInv, wbFact] = await Promise.all([fetchWb("./Inventario.xlsx"), fetchWb("./Bandejadeplaneacion.xlsx")]);
      setData(procesar(wbInv, wbFact));
      setPhase("ready");
    } catch (e) {
      setErr(e.message);
      setPhase("error");
    }
  }, []);
  useEffect(() => {
    if (operario) cargar();
  }, [cargar, operario]);

  // ── Supabase: asignaciones en tiempo real ──
  useEffect(() => {
    if (!sb || !operario) return;
    const refrescar = async () => {
      const {
        data: rows
      } = await sb.from("asignaciones").select("picking,operario,estado").eq("estado", "en_proceso");
      if (rows) {
        const m = {};
        rows.forEach(r => {
          m[r.picking] = r;
        });
        setAsignaciones(m);
      }
    };
    refrescar();
    const ch = sb.channel("asig-pipe").on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "asignaciones"
    }, refrescar).subscribe();
    return () => sb.removeChannel(ch);
  }, [operario]);

  // Polling + Realtime: turno activo del pedido seleccionado
  useEffect(() => {
    if (!sel) {
      setTurnoActivo(null);
      prevTurnoRef.current = null;
      return;
    }
    const url = `${SUPA_URL}/rest/v1/turnos?picking=eq.${encodeURIComponent(sel.picking)}&order=fecha_solicitud.desc&limit=1`;
    const poll = async () => {
      const {
        data: rows
      } = await _go(url);
      const nuevo = rows && rows.length ? rows[0] : null;
      const prev = prevTurnoRef.current;
      // Detectar cambios y generar notificaciones
      if (nuevo && prev && nuevo.id === prev.id) {
        const nBaj = (nuevo.posiciones || []).filter(p => p.bajada).length;
        const pBaj = (prev.posiciones || []).filter(p => p.bajada).length;
        if (nBaj > pBaj) {
          const nuevasBaj = (nuevo.posiciones || []).filter((p, i) => p.bajada && !((prev.posiciones || [])[i] || {}).bajada);
          const ubis = nuevasBaj.map(p => p.ubi).join(', ');
          setNotifs(n => [...n, {
            id: Date.now(),
            tipo: 'bajada',
            msg: `⬇ Bajado: ${ubis}`,
            by: nuevo.montacarguista || "Montacargas"
          }]);
        }
        // Detectar fallos por posición nuevos
        const nFalloPos = (nuevo.posiciones || []).filter(p => p.fallo).length;
